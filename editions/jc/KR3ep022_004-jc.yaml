body:
  text: 評選繼志堂醫案兩卷右繼志堂醫案兩卷曹仁伯先生所著也先生諱存心字仁伯別號樂山係常熟之福山人幼時讀書穎悟長老咸目為令器顧以家道不豐一衿不足裕衣食遂謀習醫從薛性天先生游薛故郡中名宿得先生劇嘗之謂將來光吾道者必曹生也先生居薛所十年幃燈焠掌上自靈素下逮薛喻諸家無不研求貫串乃出應病者之求輒奏奇效先生嘗言醫者存心須視天下無不可治之病其不治者皆我之心未盡耳故其臨病人也研精覃思直以一心貫乎病者之食息起居而曲折無不周至每有劇病他人所棄而不治者先生獨能運以精思而以數劑愈之古人謂生死肉骨先生誠有之焉先生又言每遇病機叢雜治此礙彼他人莫能措手者必細意研求或於一方中變化而損益之或合數方為一方而融貫之思之思之鬼神通之苦心所到必有一恰合之方投之而輒效者以是知醫者之於病稍涉危疑即目為不治而去之者其不盡心之過為不少也嗟乎先生之言如此即先生居心之篤厚與藝事之精能蓋皆即是而可見矣先生所著有琉球百問繼志堂語錄過庭錄延陵弟子紀略諸書經先生之孫博泉玉年裒集鋟行楊太常濱石序之先生之行誼備詳於許君廷誥所撰家傳中先生以醫名著繼葉薛諸公而起德被吳中名馳海外至今人能道之特其所著醫案於過庭錄延陵弟予紀略外未有傳本今年夏偶於友人處得見其門弟子所錄存者借中多闕誤因假歸鈔錄為之次第整理刪其繁亂擷其精粹間或贅以評語以發明其用意之所在鈔成上下兩卷俾後人讀之猶可想見其診病時危坐構思旁若無人之概云光緒二十六年庚子八月江陰柳寶詒識
