body:
  text: 內傷雜病門心營與腎水交虧肝氣挾肝陽上逆胸中氣塞口內常乾手震舌掉心煩不寐即有寐時神魂遊蕩自覺身非己有甚至便溏納少脾胃亦衰脈形細小無神而有歇止之象逐證施治似乎應接不暇因思精神魂魄必令各安其所庶得生機勃勃否則悠悠忽忽恐難蔔其旋元吉擬許學士真珠母丸法石決明鹽水煅一兩人參一錢歸身錢半犀角五分龍齒三錢茯神三錢生地四錢麥冬二錢棗仁二錢炙草三分淮藥三錢沉香磨沖三分另珠粉四分先服詒按此方於肝氣一層嫌少理會愚意去山藥甘草加木香陳皮則胸中之氣塞亦平矣鄧評心煩不寐心火亢矣何又脈小便溏大都火被濕痰所遏也於清心安神內務參辛燥開痰俾濕化痰豁乃能木達風清也若滋寒太過恐多弊而少利耳孫評所述病情均因痰火上蒙致病即便溏脈歇亦為痰滯於中脾營胃衛不調和之症若損證而至見此則正氣垂絕決無生理胸中氣塞非氣之不通是痰之上逆也又接服方生地自芍人參丹皮橘紅茯神棗仁石決明龍齒秫米佛手鄧評選藥較前方為勝故能稍獲效機再診脈之歇止向和便之溏泄不作氣塞稍平手震亦定但寤多寐少內藏之魂魄未安胸痞脘悶上壅之濁痰未降容將通陽鎮逆法參入前方冀相與有成耳真珠母丸真珠母熟地當歸人參棗仁柏子仁茯神犀角龍齒沉香去柏子仁當歸加旋覆花一錢五分代赭石三錢陳皮七分冬朮七錢炙草五分白芍二錢麥冬三錢甘瀾水煎竹瀝一兩沖服詒按案云通陽鎮逆方中用旋赭鎮逆而朮芍麥草則未可謂之通陽也鄧評脈之歇止是亦疫之咎歟所謂胸痞脘悶上壅之濁痰未降此語中的而方內仍用地麥未免議論雖確而用藥失當擬更參溫膽之法如半夏枳實菖蒲竹茹之屬三診夜半得寐心腎已交肺魄肝魂自能各安其臟無如心易煩動神反疲乏氣猶短促胸還痞悶脈仍細小兩足不安脈虛證虛是謂重虛而兼有濕痰從之為患夫痰即有形之火火即無形之痰也法當固本為主消痰佐之人參固本丸加龜板五錢炙茯神三餞棗仁二餞白芍三錢淮麥三錢陳皮一餞旋覆花一錢五分柏子仁一錢五分去油冬朮錢半另珠粉二分竹油二十匙雞子黃一枚和服詒按於痰病重投冬地得無嫌其滋膩否鄧評柳師破的諸般苦況無非為濕痰阻塞案云濕痰從之為患又謂痰即有形之火火即無形之痰何仍重於滋補蓋終被陰虛二字橫於胸中也孫評痰火二旬近人安能見得如此真切既如是云云當以清火化痰為法矣四診風火痰三者之有餘留滯肝經以致臥血歸肝魂不能與之俱歸筋惕肉目閏而醒前次氣短等證莫不因此而又起於有年病後氣血兩虧何堪磨耐所治之方不出許學士法加減現在脈息細小帶弦雖無止歇之形尚有不靜之意究屬難免風波未可以能食為足恃也石決明鹽水煅三錢麥冬二錢犀角五分柏子仁三錢龍齒三錢棗仁鹽水炒三錢歸身七分大熟地浮石粉拌炒六錢羚羊角一錢冬朮一錢五分白芍三錢陳皮一錢人參二錢茯神三錢銀花一錢薄荷五分另金箔二張竹瀝一兩真珠粉三分薑汁一匙沖服詒按方中用銀花薄荷兩味不識其意何居鄧評痰火為患每每能食統觀四方雖有祛邪之藥而實多滋痰之品是以絕少奏效孫評起於有年病後必病時誤補蠻澀所致故痰熱內戀而起也五診前夜熟睡昨又變為少寐寐之時適在子時以後肝膽兩經尚有餘邪可知更兼痰火阻氣時逆時平其氣逆時必面赤心悸甚則肉目閏筋惕煩熱不安脈亦隨之變異所謂心火一動相火隨之是也調治之外必須靜養俾心火凝然不動方可漸入坦途人參丹參麥冬玄參各二錢旋覆花冬朮各一錢五分橘紅一錢小麥五餞棗仁川連煎汁拌炒茯神川貝各三錢炙草四分枇杷葉竹茹各三錢珠粉沖三分詒按相火屬少陽即膽火也方中川連竹茹恰合病機鄧評謂肝膽有餘邪更兼痰火阻氣此語誠然此方補而不滯於清化痰火一面較能著力宜其小奏效也六診所患小恙無一不除蓋以清之化之補之養之無微不至而得此小效耳所嫌者寐非其時寤非其時心陽太旺神氣外馳是衛氣獨行於陽陽蹻脈滿滿則不入於陰陰分之虛明矣將滋陰之品參入前方未識能弋獲否前方加大生地五錢陳膽星五分另真珠母丸朱砂安神丸各五十粒詒按此證不寐乃肝膽有痰火所致案中引內經陽蹻脈滿之文本屬強為牽合至以經言陰虛指為陰血之虛尤非經文本旨鄧評生地唯恐礙痰孫評細閱是病必痰火擾亂肝膽神志因之不靜所服之藥滋則助痰補則滯氣前後九方惟此方最靈用藥心思亦新穎熨貼所嫌化痰熄風之味臟腑未得貼切是以病不即除也如枇杷葉川貝與肝膽不宜是消肺經之痰也丹參祛瘀珠粉清心麥冬養肺均失確切之旨易以天麻膽汁炒半夏黑梔鉤鉤蒺藜則得之矣玄參雖清火不若生牡蠣為佳加白芍以攝肝陰無滋膩之弊擬方於下煨天麻鹽半夏茯苓人參炒白芍薑汁炒山梔鉤鉤白蒺藜生牡蠣川連炒棗仁竹茹枳實南星燥烈能祛風痰以牛膽罩之去燥烈就柔和並引入膽經與此病最合巧思豈可多得七診人可以參天地之干者莫貴於眠食如常今食能知味眠則未安昨夜忽寐忽醒醒則不爽寐則不安以昭衛氣不得入於陰獨留行於陽之意柳按案語牽合支離總由誤認經文陰字故說來總不入理是陽蹻脈滿營血不能充足肌肉不能潤澤苟非陽生陰長陰足戀陽何以漸入佳境然營中之血既不生之於心烏能藏之於肝統之於脾而欲藉草木之無情俾血肉之有情者以生以長談何容易況當此痰火易煩得食暫安以及虛風內動筋惕肉目閏支體牽搖大便難通之候更難為力矣急宜加意調理前方去玄參旋覆珠粉丹參加黃耆一錢遠志三分歸身一錢半夏一錢五分豬膽汁炒木香三分圓眼肉三枚另真珠母丸四十粒朱砂安神丸三十粒詒摶黃耆與此證不甚合膽汁炒半夏思路新穎鄧評不爽不安無非痰火為患所引陽蹻脈滿經文一節自是勉強八診徹夜好眠神魂己定是佳兆也但脈形細小而兼滑數數為有火滑為有痰細屬陰虛小屬氣弱虛弱之中兼有痰火有時面紅有時咳嗽有時氣痞而短有時煩熱不安更兼大便燥而小便短筋惕肉目閏支體動搖神情困倦語言無力等證均未平復還宜謹慎小心前方加柏子仁三錢另朱砂安神丸三十粒真珠母丸四十粒詒按此好眠是痰蒙所致未必定是佳兆鄧評偶得好眠未足憑也要知虛中夾實當先治其實孫評論脈確合病機得其要領評語真得神髓九診臟之為言藏也心之神肝之魂脾之魄脾之意腎之志無不各得其藏五臟和矣即有不和因藏真不足蓋有待也而與臟相表裏者為腑腑以通為補與臟之以塞為補者有間因思胃主下行腸主津液津液不充下行失令故大便燥結而難通此際不以滋養營陰俾得施潤澤非計也目前之治如此將來或痰或火或感或傷偶有違和事難逆料斷無預定之理隨時斟酌為囑麻仁郁李仁柏子仁松子仁各三錢桃仁七分陳皮人參蘇子各二錢另朝服膏滋藥晚服丸藥此王江涇王姓病也是人素有肝火上升之病想熱病之後必有餘邪餘火留於肝膽乘虛竊發氣塞而不能臥起者中有實痰加於短氣不足以息之體神魂搖盪身非己有虛之甚矣用真珠母丸法先以犀角治實火參地補氣血俾相火得清而奠安第二方即參入陳皮竹油赭石旋覆花挾補挾化第三方人參固本入龜板耆芍雞黃第四方加入羚羊銀花清藥與補藥俱加倍用之第五六方竟是十味溫膽吃重痰火一層用藥心細手和既沉著亦靈敏洵可法可師之作鄧評腑以通為補是至理名言及觀其立法究屬背謬蓋大便之燥結並非陰虛液涸仍由痰火煅煉腸液不生豈徒滋養營陰所能通耶陽絡重傷咳無虛日而於五更為甚口乾盜汗溺赤便溏脈數而身熱欲成損證也咽中已癰慮其加喘生變權以清熱存陰黃芩湯合豬膚湯加牡蠣鄧評咳於五更為重是木火旺於寅卯也溺赤便溏大都挾濕熱內蘊此方尚稱平善孫評失血之後而得是證非損之難治者乎再診所見病情與前無異喜食藕汁咽中乾痛稍輕大便溏泄更甚雖屬肺熱下移於大腸而實則中氣已虛失其所守也六味丸加牡蠣川貝玄參淡芩詒按大便溏泄虛證中所最忌者此證始終大便不堅故再三反復終不復元也鄧評藕汁雖能清熱亦不免助濕濕勝故大便溏泄更甚方內萸地等味恐有所礙孫評大便不堅是中無砥柱損怯末傳已露安能望愈且玄參雖清陰分之熱便不堅者究宜避之滑潤故也三診溏泄已止咳嗽未除咽痛盜汗脈數肺經尚有熱邪補肺阿膠散加白芍生地淡芩玄參山藥鄧評阿膠生地究非有邪者所宜進四診便泄稀身熱輕咽喉乾痛亦漸向愈而咳嗽腹鳴神疲納少脈小帶數想是風熱遞減氣陰兩虧而脾中之濕又從而和之為患補三陰通三陽之外更以崇土化濕佐之六味丸加牡蠣淡芩於朮防風陳皮炙草詒按陰虛而挾脾濕陽虛而挾肺火邪實正虛彼此相礙凡治此等證總須權其輕重緩急又須心靈手敏方能奏效若稍涉呆滯則效未見而弊先滋如此證屢用六味雖於證情亦合究嫌落筆太重少靈動之機括也鄧評既知有脾中之濕而六味丸之萸地豈不相礙孫評脾濕是誤認乃脾陰傷而中氣無權也清潤治肺則礙睥固氣溫養則傷肺故虛證遇此大為棘手然脾土為萬物之母中氣為諸氣之主但得方法靈動究以先立中氣為要葉氏每以小建中湯加減治之良有以也柳氏云虛證便溏為最忌真是治虛者歷練有得之言學者記之五診氣陰得補漸和不意又有燥風外感襲入濕痰之中微有寒熱咽痛咳嗽不止權以清養法六味丸去萸加桑葉杏仁陳皮川貝炙草鄧評緣濕熱之邪本屬留郁於內鬱極必發故不免寒熱再至六診發熱惡風汗多是屬傷風之象但傷於壯者氣行則已傷於怯者難免不著而為患也大為棘手六味丸合玉屏風散加桑葉玄參川貝橘紅甘草鄧評熱蒸故多汗濕遏則惡風亦未必傷風乃然且既已傷風何堪再用熟地七診多汗惡風之象漸輕新風解矣而咳嗽咽痛大便溏飲食少仍是脾肺腎三臟皆虛之候幸未氣喘玉竹飲子玉竹茯苓甘草桔梗陳皮川貝紫菀薑合豬膚湯玉屏風散加麥冬山藥鄧評似乎有效實則未必效也八診脾虛則便溏肺虛則咳嗽腎虛則虛火上炎咽喉乾痛脈弱無力元氣傷矣急宜補氣育陰人參二冬二地黃耆陳皮阿膠杏仁百合甘草詒按此方究非便溏所宜鄧評濕不化脾何以健熱不解陰亦難復一味滋補徒截其濕熱去路況二冬二地豈便溏所宜服耶孫評葉氏於此等證總以後天脾胃先天腎主治用異功建中以培中溫養攝納以治下從根本設法而力辟清寒肅肺之非學者宜宗之九診精生於穀腎之精氣皆賴穀食以生之而穀食之化又賴脾土以運之今便溏納少脾失運矣急宜補脾為要都氣丸合四君子湯百花膏另八仙長壽丸參湯下詒按此方亦嫌少靈活之致又按此證前後方案九則議論頗有精當處惟用藥未能面面照顧總緣陰虛而兼便溏彼此相礙難於安置妥貼也鄧評此病因屬重症而始終鮮效者為過慮其陰虛也至此而云急宜補脾用四君而仍以都氣牽合總由陰虛二字橫亙胸中故爾孫評此等證惟於葉案細加參究或有把握還須將陰虛便溏打成一氣貫穿乃有生機先生之病素稟濕熱又挾陰虛之病也濕者何地之氣也熱者何天之氣也天地鬱蒸濕熱生焉濕熱稟於先天者與元氣混為一家較之內傷外感之濕熱屬在後天者豈可用日語哉設使薄滋味遠房幃不過生瘍出血而已乃從事膏粱更多嗜欲斯濕熱外增陰精內耗臟腑營衛但有春夏之發而無秋冬之藏無怪乎風火相煽而耳為之苦鳴也當斯時也靜以養之猶可相安無事何又喜功生事火上添油致陡然頭暈面赤其一派炎炎之勢蓋無非肝經之火督脈之陽上冒而為患近聞用引火歸原之法以為甘溫能除大熱嗟乎未聞道也夫甘溫除大熱者良以下極陰寒真陽上越引其火歸其原則坎離交媾太極自安若陰虛濕熱蒸動於上者投以清滋尚難對待況敢以火濟火明犯一誤再誤之戒乎逮後清已有法滋亦頻投飲食能增身體能胖而坐立獨不能久者明是外盛中空下虛上實用藥殊難嘗見東垣之清燥湯丹溪之虎潛丸潤燥兼施剛柔並進張氏每贊此兩方謂必互用始克有濟何故而不宗此耶然猶有進於此者治病必資藥力而所以載行藥力者胃氣也胃中濕熱薰蒸致吐血痰嗽鼻塞噫氣二便失調所謂九竅不和都屬胃病也然則欲安內臟先清外腑又為第一要著矣至秋末冬初病甚者十月坤卦純陰天已靜矣而濕熱反動腎欲藏矣而濕熱仍露能勿令病之加劇乎附方謹復青鹽四兩甘草八兩荸薺一斤海蛇二斤萆薢一兩飴糖八兩刺蝟皮一兩五錢霞天曲一兩五錢十大功勞葉一斤橘葉五兩共為末竹瀝和水泛丸每朝四錢服完後合虎潛丸全料同合常服柳按方中海蟲宅荸薺飴糖不能作丸此必有誤愚意用東垣清燥湯方合青鹽以下數味為末而用荸薺海蟲宅煮汁和飴糖竹瀝泛丸乃合原注起手提清濕熱之病陰虛之體發明先天素稟濕熱之故第二段一折折出嗜欲膏粱因此更加陰虛第三段再折折出動火傷陰第四段直辟用熱之謬下乃歸到治病先治胃通篇說理既精筆力道老僥有古文筆意詒按推論病原指陳治法言言切實絕無模糊影響之談最後推出先清胃腑一層尤為洞中窾要深合機宜凡治陰虛濕熱者於此可悟出法門矣鄧評分明先後天濕熱自屬高見將甘溫除大熱之旨解得了然明白世醫動輒用引火歸源者當以此三復焉體胖而不耐坐立明是外盛中空亦知生痰濕必多兩方如清燥湯與虎潛丸互用潤燥兼施殊稱靈妙但何以以後竟舍清燥而獨取虎潛不知何所據而如此鈥安內臟先清外腑亦是要言此案竟是一篇大議論非平日有功夫者不能道隻字方藥輕清鮮弊惟飴糖一味不免與濕熱有礙身熱手心熱少力神倦遊利脈濡此睥陽下陷陰火上乘甘溫能除大熱正為此等證設也補中益氣湯加鱉甲詒按此脾虛內熱證也用東垣法最合鄧評苟其陰陽並損進此方不效者可與景岳理陰煎此與前案互參則甘溫能除大熱之旨自了然於心胸矣勞倦而招風濕右脈濡小左脈浮弦舌苔薄白溺赤便溏肢體疫楚神倦嗜臥少納口乾升陽益胃湯參朮耆草夏陳苓澤羌獨防柴連芍薑棗加川朴青皮詒按此與前證略同故用藥亦相似鄧評耆柴黃連宜去之胃虛則納食無味脾虛則運化無常六君子湯合治中湯加熟地益智仁杭米詒按脾喜溫升宜香燥胃喜清降宜柔潤脾陽健則能運胃陰充則能納凡脾胃同治者用藥須識此意愚意去熟地加石斛似與胃虛者更宜鄧評熟地最能窒滯脾胃即使腎虛似宜加杞子沙苑等類孫評柳氏言之親切有味藥亦確切不移五腑六腑皆有營衛營衛不調則寒熱分爭此病分爭之後肌肉暗消因思脾主肌肉肌肉暗消正所以昭脾之營衛虛也無怪乎脘痞納少力乏嗜臥脈形軟弱有種種脾虛見象於法當健脾為主而八八已過之年陽氣必衰又宜兼壯元陽使火土合德尤為要務烏龍丸合香砂六君丸加首烏當歸鄧評凡寒熱之後肌肉暗消者必有伏熱耗陰也心脈宜大者反小腎脈宜沉者反浮浮則為傷小則為虛想是讀書攻苦心腎不交失其封藏之職夫心腎即嬰兒姹女欲其交者須得黃婆為之媒合黃屬中央脾土所主舍補中宮之外皆屬徒然歸脾湯詒按借丹訣以談醫理原一貫也此案說理頗精惜未能指列病狀鄧評腎脈浮者宜補真陰須得黃婆為之媒合者不果於交心腎之中參以疏補中官為黃婆媒合之義也孫評此是中虛不寐之症晝為陽陽旺應不惡寒夜為陰陰旺應不發熱茲乃日間惡寒夜間發熱何以陰陽相反若是耶此無他陽虛則惡寒於日陰虛則發熱予夜陰陽之正氣既虛所有瘧後餘邪無處不可為患足為之浮腹為之滿溺為之短一飲一食脾為之不運生飲生痰肺為之咳嗽脈從內變而為細弦夫形瘦色黃舌白陽分比陰分更虧極易致喘桂枝加厚朴杏仁湯加附子乾薑冬朮半夏橘紅原注案則一線穿成藥則理中去參以理其本桂枝以和其標二陳朴杏以化其邪乃絲絲入筘之方鄧按似乎陰陽兩虛之證實是濕遏熱伏之候蓋陽被濕困而莫振陰為熱迫而不勝也今立方仍以祛邪為先使濕開而熱達之意脾為陰土胃為陽土陽土病則見嘔惡陰土病則見泄瀉二者互相為患此平則彼發令人應接不暇現在嘔止而泄似脾病而胃不病不知脾胃屬土木必乘之不乘胃土而嘔必乘脾土而泄治病必求其本本在木當先平木必使陽土陰土皆不受所乘方為正治理中湯烏梅丸吳仙散吳蔸茯苓加白芍詒按推究病機既能融會貫徹斟酌治法自然入彀鄧評凡診雜病皆當如此深一層想此病當腹痛孫評宜用木瓜舌乃心之苗舌上之苔剝落不生者久矣是心陰不足心陽有餘也黃連阿膠湯去芩加大生地詒按胃陰枯涸者每有此病心陰不足之說亦可備一法也鄧評苔之剝落不歸咎胃陰而獨責心陰想其舌必絳色中風門類中之餘足不任身手難舉物尺脈無力陰陽並弱擬用河間地黃飲子法熟地蓯蓉川附牛膝石斛遠志巴戟甘菊鄧評尺脈無力陰陽並弱為地黃飲子的對題旨但類中之症於本虛之中更必有風痰濕熱錯雜其間觀其膏方加萆薢三診加蠍尾亦從可知矣再診手之舉動稍和足之步履如舊蓋緣陽氣難於充足耳六君子湯加熟地巴戟白芍川附虎骨又膏方歸芍六君子丸加虎骨巴戟菟絲蓯蓉首烏杜仲萆薢三診足部有力步履不艱補方得力可知仍以前法地黃飲子地巴蓯萸麥斛菖芩遠薄味附桂去麥味菖合異功散加當歸芍藥蠍尾竹油詒按此病之由乎虛者故用藥專以補養收功從前並未用疏風化痰之藥案中亦無見證至末方諸恙就痊而忽加蠍尾竹油二味想必另有風痰見證也鄧評既以補方得力而忽又插入蠍尾竹油自屬可怪怒則氣上痰即隨之陡然語言蹇澀口角流涎月餘不愈所謂中痰中氣也然痰氣為標陽虛為本所以脈息遲弦小水甚多肢麻無力法宜扶陽為主運中化痰佐之六君子湯加川附白芍麥冬竹油蠍梢詒按立方虛實兼到所謂看似尋常最奇特也勿以平易忽之鄧評病因怒起究屬肝陽內盛其小水多者陽火主乎疏泄也今反以扶陽為主恐非善法倘將附子易沉香似較妥左肢痿而不用口歪流涎舌苔起膩便溏溺少脈形弦遲以中虛濕勝之體易於生痰動風內風既動未有不招外風者也牽正散白附蠍梢合二陳湯加川附桂枝白芍制蠶鄧評因便溏脈遲故立方以溫化濕痰作主兼疏外風議論病源具見卓識再診肢體稍和流涎略減仍以前方增減前方去芍加首烏川斷竹油詒按方案均切實不浮痿痹門膝骨日大上下漸形細小是鶴膝風證乃風寒濕三氣合而為病痹之最重者也三氣既痹又挾肺金之痰以痹肘所謂肺有邪其氣留於兩肘肘之痹偏於左屬血屬陰陰久虧無怪乎腰脊突出接踵而來至於咳嗽鼻流清涕小水色黃肌肉暗削行步無力脈形細小左關獨見弦數是日久正虛風寒濕三氣漸見化熱之象擬用痹門羚羊角散加減羚羊角歸身白芍杏仁羌活知母桂枝薏米秦艽制蠶茯苓竹瀝桑枝詒按由膝而肘而脊病情漸引漸深方中於膝肘之邪已能兼治於脊突一層似未能兼顧及之擬再加鹿角霜川懷牛膝等味鄧評膝肘腰脊等患皆風痰所注用痹門羚羊角散加減合法或加虎脛骨牛膝亦可孫評咳嗽鼻涕溺黃並非正虛因日久化熱或由新感外風所致脊突肌削是肝腎二陰大傷誠如柳氏加法為要至於新感宜另治若非新感則不必兼治蓋正氣充足稍有微邪不治自去也知杏可不用素患鼻衄入夏又發下體痿軟無力咳嗽口乾溺黃膚熱想是鼻衄屢發上焦陰液久耗而胃中濕熱之邪薰蒸於肺肺熱葉焦則生痿躄也清燥湯參耆草朮歸橘柴麻羌地連豬茯麥味蒼柏瀉去朮升柴加白芍茅花枇杷葉詒按此證自當滋清營液為主東垣清燥湯立法未純前人頗有議之者用者當審之案語闡發病情極其熨貼鄧評如此加減便能中裒孫評咳嗽口乾溺黃膚熱由於肺熱葉焦則陰液久耗宜去麻蒼連豬傷陰耗液之品細考自知人年四十陰氣自半從古至今如是惟尊體獨異者蓋以濕熱素多陽事早痿耳近又患臂痛之證此非醫書所載之夜臥臂在被外招風而痛乃因久臥竹榻寒涼之氣漸入筋骨較之被外感寒偶傷經絡者更進一層所以陽氣不宣屈伸不利痛無虛日喜熱惡寒仲景云一臂不舉為痹載在中風門中實非真中而為類中之機豈容忽視現在治法首重補陽兼養陰血寓之以祛寒加之以化痰再通其經絡而一方中之制度自有君臣佐使焉熟地八兩當歸四兩白芍二兩虎掌一對阿膠三兩半夏四兩橘紅二兩枳殼二兩沉香五錢黨參四兩於朮四兩茯苓八兩熟附一兩炙草一兩風化硝一兩桂枝一兩羌活一兩綿耆兩薑黃一阿海桐皮一兩共為末用竹瀝薑汁和蜜水泛丸詒按立方清切周到可法可師鄧評立方從黃耆五物而擴充之孫評兩層對勘最啟心思神志門神識不清自言自語起坐無常寤寐失度脈形小滑舌苔白膩此痰熱內鬱心包無路可出而作心風也久久歸入癲癇毋忽導痰湯苓夏枳星梅橘薑草加菖蒲遠志另白金丸詒按病情已屬癲證再加犀角龍牡等清鎮之品似更得力鄧評見證屬痰痰中有火理固然也立方宜從柳師加味更參竹油薑汁所用烏梅去之為是孫評導痰古方無梅薑二味想是後人誤加導痰之品加烏梅收攝大相背謬萬無此理即薑亦嫌溫燥陽明之脈環於唇唇起紅筋即發牽動而厥厥醒吐沫咳血鼻衄二便失調脈弦滑數顯係胃有積熱動血生痰又被肝火所沖激乃癇證之根毋忽六味丸加川貝石決明另虎睛丸虎睛一對制軍一兩遠志五錢犀角一兩黑梔一兩蜜丸每服二十一粒詒按既日胃有積熱似非六味所能勝任且方中如萸肉之酸溫亦宜避去又按積熱者蓄積之熱也與積滯之積不同虎睛丸中大黃黑梔即為泄熱而設鄧評此兩丸方並用甚妙一以滋養肝腎陰氣一以清泄陽明營熱孫評吐沫是胃中濕熱蒸痰咳血是胃中熱瘀不化用方不合惟虎睛丸足以當之癇證之因未有不由乎龍雷之火上升此則更有濕熱之痰從而和之為患六味丸加龍齒石決明橘紅黑梔川貝川連竹茹詒按連讀癇證數案皆以六味丸為主查六味為通補三陰之方先生習於內經重陰者癲一語謂癇證必挾龍雷之火而以滋水柔木為主故用藥如此其實癇證有因於胎驚者有因於先天陰虛者亦有因於驚痰內擾者當隨所因而治之初非可執一端以論也鄧評陰分虛者六味丸固為主方若由乎鬱痰驚痰痰火內盛者地萸究非所宜孫評古人云川貝治肺經燥痰既云濕熱蒸痰宜用半夏燥濕二字適相反用藥何不分析如此驚則氣亂神出舍空痰涎襲入此心悸形呆善忘不語所由來也至月事不至血從內並用藥亦須兼及茯苓香附沉香半夏橘紅遠志膽星牛膝另驚氣丸白花蛇蠍蠶腦麝辰砂白附麻黃天麻橘紅南星蘇子詒按擬加丹參琥珀歸須等兼顧血分乃與案語相合鄧評心火亦宜兼清清其火調其氣即所以行其血而通其經也柳師所加亦妥孫評細察案意由血瘀於內夾痰熱上衝致病柳加甚合法宜宗之心悸初從驚恐得之後來習以為常經年不愈手振舌糙脈芤帶滑不耐煩勞此係心血本虛痰涎襲入也人參玄參丹參棗仁天冬麥冬菖蒲茯苓茯神當歸遠志五味桔梗半夏生地橘紅枳殼柏仁炙草竹茹原注此天王補心丹合十味溫膽法也心血本虧補心丹主之痰涎襲入十味溫膽湯主之鄧評手振心悸每多風痰錯雜鉤鉤天麻防風等均宜加入孫評肢振有風動之象宜加熄風之品如天麻之類濕熱生痰留於手足少陽之府累及心包心驚膽怯性急善忘多慮多思舌苔濁膩帶黃胸脘內熱清化為宜黃連溫膽湯加洋參枇杷葉原注舌苔濁膩帶黃加入黃連一味苦燥化濕再加洋參補陰枇杷葉清肺想是火旺之體肺液必虧且以救二陳之過燥也鄧評證見苔濁脘悶方用清化極是若拘乎壯水養血滋補頻投其病必難脫體神蒙善忘包絡之病為多然左寸脈息上浮關部獨帶弦數右寸與關小而帶弦白苔滿布大便久溏肢體無力倦怠嗜臥脾經之濕痰被肝火所沖激累及心包也藿梗黨參於朮半夏陳皮香附砂仁木香沉香遠志枳殼葛根菖蒲竹油治按此必兼有脹滿之候故方中多香燥和脾之品用葛根藿梗乃兼清暑濕之意鄧評推論病情殊透徹惟此方與病源不甚中窾宜以導痰湯加遠志薑連白朮竹油宜易竹茹孫評便溏體倦嗜臥想腹中必痛故用諸多香燥和脾之品兼入藿梗葛根者清暑而並升清氣之意也再診痰因濕釀濕自脾生脾若健運則無濕以生痰所患善忘等證自可化為烏有然則健脾一法在所必需矣香砂六君子湯加沙苑遠志穀芽原注苔白便溏乏力嗜臥皆脾倦見證故用健脾化濕法鄧評案語倜儻所加沙苑不如益智子為切當痰火門胃為貯痰之器上逆心包輕則胸悶重則神蒙導痰湯合溫膽湯另白金丸詒按此治痰蒙之正法也在此證尚屬輕劑鄧評此必痰重火輕之候孫評神蒙宜參入芳香宣竅之味如菖蒲遠志之類曾經失血現在內熱吐痰夜來大魘脈象滑數陰虛挾痰所致十昧溫膽湯加麥冬歸身詒按陰虛挾痰之證用藥最難恰好十味溫膽湯即溫膽湯去竹茹加參地棗仁遠志五味治寒涎沃膽膽寒肝熱心悸不寐鄧評脈象既已滑數當必痰火內盛所用參地五味恐有礙於痰火孫評十味溫膽之用前人未嘗如此清晰足見柳氏讀書曾皆細玩痰飲門積飲成囊平陳湯另丸方茅朮一斤芝麻半斤棗肉丸如便血山梔湯下詒按此病不易除根煎丸兩方極為熨貼特未識能奏膚功否鄧評用茅朮佐以芝麻者想因便血腸燥故耳鼻血遺精肺腎俱病寒熱盜汗營衛並傷必須大補為是無如脈息細弦舌苔滿布二便失調飲食不舒脾家又有濕痰為患先宜化濕健脾再商補劑枳砂二陳湯加烏梅生薑詒按方中烏梅一味似不入格查醫通載二陳湯古方本有烏梅取斂護胃陰之意先生用此其意或在是乎鄧評精血與汗之不攝亦痰火濕熱內擾之故孫評用烏梅想因盜汗之故斂陰和陽較五味次一層動則氣喘言則亦然是下虛也宜其俯仰不適矣至於脘中拒按隱隱作疼築築而跳脈息中部太弦必有濕熱痰濁交阻於胃失下行為順之常未便獨以虛治川貝陳皮茯苓白芍牛膝海蛇荸薺另水泛資生丸詒按此必挾有痰飲阻於中脘宜從飲門用意鄧評病既下虛上實用藥須兩不相礙此方固稱平妥擬再加蔞連桑皮可也蓋脈息中部太弦必挾木火為患耳再診俯仰自如漸通之兆所見言動之氣喘脘腹之拒按已日輕一日大妙事也動氣攻築獨不能除且兼氣墜少腹臥則可安此則非胃氣之能降而實脾氣之不升也香砂六君丸合雪羹加神麯另資生丸詒按立論精當明瞭惟用藥尚不甚得力鄧評不特脾氣之不升抑且木氣之鬱陷矣咳喘門年逾古稀腎氣下虛生痰犯肺咳喘脈微當與峻補金水六君煎麥地橘夏苓草合生脈散加核桃肉另八仙長壽丸腎氣丸原注補命門之火以生土清其生痰之原則肺之咳喘自寧煎方金水六君煎以治脾腎生脈以養肺桃肉以補命門其奠安下焦之劑另用丸藥常服斟酌可謂盡善矣鄧評此陰陽兩虛之法氣喘痰升胸痞足冷是中下陽虛氣不納而水泛也已進腎氣湯可以通鎮之法繼之旋覆代赭湯去薑棗合蘇子降氣湯去桂前草薑加薤白車前茯苓枳殼治按於腎氣後續進此方更加旋赭以鎮逆薤白以通陽用意極為周到鄧評納腎氣如沉香蛤殼等當可加入薤白為胸中之痞車苓其小水必少交冬咳嗽素慣者也今春未罷延及夏間當春已見跗腫入夏更增腹滿口燥舌剝火升氣逆右脈濡數左脈浮弦風邪濕熱由上而及下由下而及中即經所云久咳不已三焦受之三焦咳狀咳而腹滿是也際此天之熱氣下行小便更短足部尚冷其中宮本有痞象亦從而和之為患用藥大為棘手姑擬質重開下法佐以和胃泄肝之品豬苓雞金白朮石膏寒水石雪羹肉桂枇杷葉原注風邪歸併於肺肺氣素虛者由肺而陷入於脾尚是一線加以口燥舌剝陰虛有火之體更屬難治用河問甘露之意質重開下方則極妙未識效否詒按病情紛錯實難著手以桂苓法增減出之已屬苦心經營特於痞滿一層尚恐與兩石有礙方中茯苓滑石似不可少鄧評交冬必咳腎氣自虧況以跗腫起見其脾腎之虛尤必相關今用二石治痰火之標恐適以妨脾腎之本特此本為不治之症孫評陰虛火旺宜用成寒若二石直清實火反傷其陰矣寒熱後咳嗽痰濃頭疼口渴舌紅脈數大便溏泄冬溫之邪鬱於肺分而從燥化當泄之清之葳蕤湯葳蕤石膏青木香薇麻芎葛羌草杏原注此冬溫咳嗽也麻杏開泄外罩之涼風蕪活葛根佐之石膏清內伏之溫熱白薇玉竹佐之冬溫必頭痛便泄青木香治便泄之藥也病比傷寒多一溫字方比麻黃去桂枝一味加入石膏以治熱有因方成矽遇圓為壁之妙詒按此病既見痰濃口渴則已有邪鬱化熱之徵方中羌防葛根似宜酌用鄧評咳嗽起於寒熱之後當是餘邪留戀殆不必方劑如此之重葛根一味怕其性升助咳原注辨寒溫二字殊屬界限清楚孫評冬溫已經化熱較化燥略減一層何以用諸多燥品古人於溫病未能分清界限治法均是如此今則大不然矣且便泄為熱之去路何得用木香止之青木香與木香二種用法不同寒必傷營亦必化熱咳嗽不止嘔吐紫血咽中乾痛苔白邊青脈緊而數近更咳甚則嘔氣息短促肺胃兩經皆失其清降也郁咳成勞最為可怕荊芥杏仁紫菀桑皮地骨皮蘇子麥冬金沸草玉竹鄧評旋覆花湯加蘆根枇杷葉名瘀熱湯係先生所著此病當有瘀熱內阻今反舍而不用何哉孫評舌青脈緊病情甚惡用藥平淡大不可法再診白苔已薄舌邊仍青痰出雖稀咳逆未止觀其喘急嘔逆多見於咳甚之時正所謂肺咳之狀咳而喘胃咳之狀咳而嘔也桑皮骨皮知母川貝淡芩浮石桔梗甘草紫菀麥冬蘆根萊菔汁原注風寒之邪郁於肺胃久而化火遂至見血先用金沸草散瀉自散以搜剔其邪第二案即加入蘆根知母清營中之熱用法轉換層次碧清詒按此證先曾吐瘀加以舌邊色青似有瘀血鬱阻方案中何以並不理會及此鄧評舌邊之青為寒傷血瘀起見雖則經久化熱而其本氣究屬寒邪故其苔色亦自前方有疏邪之力故自苔已薄無導瘀之功故舌邊仍青孫評舌苔青紫都係寒證從無熱鬱之說此而瘀血內阻而見青苔另是一格惟瘀阻者紫舌最多傷風不醒咳嗽嘔惡所見之痰或薄或濃或帶血色左關脈獨見浮弦且數小有寒熱此損徵之根也千金法治之蘇葉黨參川連烏梅橘紅川貝柴胡杏仁桑皮地骨皮原注此用柴前連梅煎意千金法也咳嗽由來十八般只因邪氣入於肝即是此方之歌訣此方效轉方加竹茹一味詒按弦數獨見於左關故知其病專在肝鄧評苟無寒熱見證柴胡便難輕用恐其肝陽太旺也孫評邪未清者不可用收斂之品雖與疏散並用病癒必有留邪為害生變矣咳嗽吐出青黃之痰項強惡風音爍寒熱分爭是名勞風服秦艽鱉甲而更甚者當進一層治之柴前連梅煎柴胡前胡黃連烏梅薤白豬膽汁童便豬脊髓附秦艽鱉甲煎秦艽鱉甲地骨皮柴胡青蒿歸身知母烏梅鄧評進秦艽鱉甲而更甚易是方而見效同有柴梅二味其效驗必在前胡能疏風痰黃連能泄木火也再診進前方咳嗽大減所出之痰仍見青黃之色身熱雖輕咽中苦痛脈形弦細數風邪未盡中下兩虛制小前方之外參入豬膚法一治身熱一治咽痛柴前連梅煎合豬膚湯加黨參花粉原注此方治傷風不醒成勞比秦艽鱉甲又進一層其見證每以咳吐黃綠青痰為據鄧按一治身熱指柴胡連梅說足見治此方之要旨不僅在咳吐青黃痰也今身熱雖輕反加咽中苦痛大都陰氣內竭恐歸不治孫評熱雖輕而咽痛邪因斂而入肺變證起矣先生用此方想曾有損症近者曾效過遂一概用之誤事不小咳嗽時盛時衰粉紅痰後變為青黃勞風之根也柴胡前胡烏梅川連薤白童便豬膽汁豬脊筋詒按童便易秋石甚妙再診進勞風法咳嗽大減紅痰亦無但痰色尚帶青黃左關脈息弦硬不和肝膽留邪容易犯肺胃俞也毋忽麥冬沙參淡芩炙草白芍川貝青黛廣皮原注此方極玲瓏先生用之每靈大約風喜傷肝風鬱於肝久而不出必有青黃之痰所謂勞風是也詒按先生案中治勞風一證必用柴前連梅煎自云法本千金用之神效查千金方所載勞風治法及所敘病原與此不同即所用之柴前連梅煎僅見於吳鶴皋醫方考千金方中並無此方先生偶誤記耳鄧評前方斂陰疏邪此方清金制木自屬兩途想必有肝陽不和之意怕難任柴胡之升也右脈弦滑而數滑為痰弦為風風鬱為熱熱鬱為痰阻之於肺清肅不行咳嗽自作金沸草前胡半夏荊芥甘草赤苓川芎枳殼紫菀杏仁桑白皮萎皮竹瀝原注方中芎枳二味是升降法也必有一團寒風化熱鬱閉於肺用芎之升枳之降以挑松其火若火重者不可用有陰火者更不可用恐火升則血易動耳詒按此金沸草散去麻芍加芎枳以擾動之菀杏以宣洩之桑萎以清降之細玩其加減可識其心思之細密用意之周到矣案語亦簡煉老潔鄧評川芎辛竄升散非有風寒者不宜蓋此病由於寒鬱化熱敬用之耳孫評風熱痰三者一線串成見解獨具川芎之宜用與慎用明白曉暢矣晨起咳嗽勞倦傷脾積濕生痰所致久而不已氣喘畏風金水因此而虛補中寓化一定章程現在身熱口乾苔白脈息細弦而緊緊則為寒寒風新感必須先治新邪權以疏化法香蘇飲合二陳加枳殼桔梗杏仁通草又接服方麥門冬湯合二陳加旋覆冬朮牛膝詒按此即六君加麥冬旋覆牛膝也恰台脾虛有濕痍而傷及金水者之治鄧評久咳氣喘金水自虛方用香蘇飲桔梗究恐太升散孫評先後層次亦是一定章程新邪清然後補虛內經云秋傷於濕冬生咳嗽喻氏改作秋傷於燥冬生咳嗽豈知初秋之濕本從夏令而來原為正氣若論其燥則在中秋以後其氣亦為正令二者相因理所固然勢所必至仲景早已立方獨被飛疇看破今人之用功不如古人遠矣麥冬半夏甘草玉竹紫菀瀉白散原注此麥門冬湯也先生以肺燥胃濕四字提之故此案以燥濕二字為言鄧評此方治秋燥咳嗽較喻氏清燥救肺湯為平善孫評讀書不用格致功夫者必非善讀書者也去冬咳嗽今春寒熱至秋令而咳嗽或輕或重惟喉癢則一所謂火逆上氣咽喉不利此等證是也最易成勞未可以脈未促氣未喘為足恃麥門冬湯合瀉白散加橘紅茯苓甘草玉竹鄧評寒熱喉癢當有風邪鬱於肺絡鬱熱傷陰陰虛成勞於方中尚可參疏邪之品再診內熱已除咳嗽亦減氣火之逆上者漸有下降之意靜養為佳前方加枇杷葉原注此病必有舌苔而不夜咳所以與四陰煎證有異鄧評加入枇杷葉亦為清澈肺邪之用乎肺經咳嗽咳則喘息有音甚則吐血血已止咳未除右寸脈息浮弦弦者痰飲也良以飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺而肺氣虛者不能通調水道下輸膀胱聚液為痰積濕為飲一俟誦讀煩勞咳而且嗽自然作矣補肺健脾以絕生痰之源以清貯痰之器麥門冬湯合異功散加薏仁百合原注此曲曲寫出痰飲之所由來用二陳以化痰佐以薏米用麥冬以養肺佐以百合用白朮以健脾住以黨參味味切當熨貼看似尋常實是功夫純熟之候詒按以上數案均是麥門冬湯證乃燥濕互用之法鄧評此病必有木火乘於肺絡故一經誦讀勞頓則火自升動痰隨火逆宜乎其咳而且嗽也方內尚須參桑皮蛤黛之類並降痰火孫評聚液為痰二句見透之言附錄咳嗽證治括要咳者和諧聲也其音開口而出仿佛亥字之音故有聲無痰為咳嗽則如水之灌漱然有物在喉漾漾欲出故從口從敕後人遂以有痰為嗽然則咳嗽之病胡從生也日病有萬變要不出內傷外感兩端請先明外感外感者風寒暑濕燥火六者盡之論其常則各主一時為病論其變則四時皆可以受六淫之邪今則即風寒論感風者鼻塞身重惡風清涕此證也左脈浮弦此脈也感寒者惡寒體痛發熱脈緊此寒之證與脈也而風之中又有辨春則為溫風肝木用事受風者必傷肝而又有中血中氣之別風傷衛則參蘇飲風傷營則芎蘇飲夏則為熱風傷心包而亦有涼熱之別涼風香薷飲熱風雞蘇散秋為涼風傷肺敗毒散金沸草散冬為寒風傷膀胱桂枝厚朴杏仁湯麻黃湯儻冬時天熱而感寒風則當用葳蕤湯陽旦湯此冬溫之邪也惟秋分以後少暑濕春夏無燥氣他如先傷風而後傷熱為熱包寒葳蕤湯肺素熱而感寒風為寒包熱金沸草散一嗽而痰出稠黏者脾濕勝二陳之類連嗽無痰者肺燥甚清燥救肺湯此皆外感咳也言風一端而六氣可類推矣若夫內傷大法惟痰飲津傷兩種痰飲多陽虛津傷多陰虛其陽虛痰飲尚淺者六安二陳之類有火者溫膽湯夾陰虛者金水六君煎陽虛甚兼夾痰火不可攻者玉竹飲子成降法喘者降氣湯貞元飲此陽虛痰飲一端也他如陰虛者陰火易於上升胃氣不清者麥門冬湯曾見血者四陰煎痰多而濃無胃氣者六君子湯痰少而嗌乾胃氣未絕者六味丸都氣丸八仙長壽丸此粗舉內傷之一端也此外又有勞風一門咳吐濁涕青黃之痰由勞碌傷風戀而不化最為難治淺者秦艽鱉甲表虛汗多者黃耆鱉甲深則柴前連梅煎千金法也此皆勞風之治也至於芎枳二味以治寒鬱化火之咳合二母以瀉肺之母瀉白散以清泄肺臟四物桔梗湯以引清血分皆在所常用也似此某證某方條分縷析須平日有格致功夫試觀先生臨證之方似乎夾雜合之病人之證則無一味可以增減先生嘗曰吾門之病如時文割截隔章隔節之題他人無處下手左支右拙余能以心思靈空貫串合湊一方令病安穩此無他外感多與內傷同病內傷每因外感而發更遇雜藥亂投之醫治絲而棼愈難就緒治此者不能不兼采眾方就中另出一方其立方之意在案中宣露明白噫執此意以尋先生之門徑思過半矣鄧評若葉氏論風溫由口鼻入而肺胃受邪者則又宜銀翹桑菊之類矣寒都火邪亦能令人乾咳便宜辛散帶潤如甘桔蜜炙薑橘之類秦艽鱉甲與黃耆鱉甲總須有骨蒸寒熱者乃合治寒鬱化火之類而將成肺痿者莫若葛氏保和湯為最妙孫評治雜症根本透徹失血門飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也此乃飲歸於肺失其通調之用飲食之飲變而為痰飲之飲痰飲之貯於肺也已非一日今當火令又值天符相火加臨兩火相爍金病更甚於前然則痰之或帶血或兼臭鼻之或乾無涕口之或苦且燥小水之不多大便之血沫何一非痰火為患乎旋覆花桑皮川貝橘紅浮石炙草沙參茯苓麥冬竹葉絲瓜絡詒按此證乃素有濁痰鬱熱壅結薰蒸於內再受時令火邪熏灼肺胃所致如此立論似亦直捷了當何必用飲食入胃及天符相火如許大議論耶可參用葦莖湯鄧評是病看題尚清而用藥未有把握故不能如劈竹而下矣再診接閱手書知咳血夢遺畏火三者更甚於前因思天符之火行於夏時可謂火之淫矣即使肺金無病者亦必暗受其傷而況痰火久踞肺金久傷再受此外來之火而欲其清肅下降也難矣肺不下降則不能生腎水腎水不生則相火上炎此咳逆夢遺之所由來也至於畏火一條內經載在陽明脈解篇中是肝火乘胃之故法宜瀉肝清火不但咳血夢遺畏火等證之急者可以速平而且所患二便不通亦可從此而愈懸而擬之未識效否鮮生地蛤殼青黛桑皮龍膽草川貝地骨皮黑梔竹葉大黃鹽水炒鄧評咳逆夢遺由相火之上淫下迫非連柏知母等不足以瀉之豈是生地之甘寒大黃之攻導所宜三診陽明中土萬物所歸現在盯經濕熱之邪大半歸於陽明以著順乘之意而逆克於肺者猶未盡平所以睡醒之餘每吐青黃綠痰或帶血點其色非紫即紅右脅隱隱作痛脈形滑數獨見肺胃兩部宜從此立方小生地桑皮羚羊角阿膠冬瓜子薏米蛤殼川貝杏仁忍冬藤青黛功勞露蘆根絲瓜絡原注肝經久病克於土者為順乘犯於肺者為逆克詒按前方實做不若此方之空靈活潑也鄧評病由相火內亢更多痰濕夾雜用生地以助痰則火反受遏竄於絡脈故脅痛四診痰即有形之火火即無形之痰痰色漸和血點漸少知痰火暗消大可望其病癒不料悲傷於內暑加於外內外交迫肺金又傷傷則未盡之痰火攻逆經絡右偏隱隱作疼旁及左脅上及子肩似乎病勢有加無已細思此病暑從外來悲自內生七情外感萃於一身不得不用分頭而治之法庶一舉而兩得焉桑皮骨皮知母川貝阿膠枳殼金針菜薑黃綠豆衣藕汁佛手原注痰帶血點鼻乾口燥小水不多大便血沫總屬痰火為患第一方用清金化痰不效第二方案加咳血夢遺畏火三證歸於肝火一派清肝略加養胃第三方從肺胃立方略佐清肝之意第四方全以輕淡之筆消暑化痰詒按統觀前後四案議病用藥均能層層熨貼面面周到於此道中自屬老手惟所長者在乎周到穩實而所短者在乎空靈活潑此則囿乎天分非人力所能勉強矣第一方就病敷衍毫無思路第二方清泄肝火力量頗大第三四方則用藥空靈不滯是深得香岩師心法者鄧評至此須責重開痰通絡方內擬去阿膠加旋覆花橘絡則庶乎近矣孫評統閱四案肝火夾痰橫逆於絡肺受火荊木鬱不達是其病根所擬四方柳氏謂其得葉氏心傳者適相背謬姑從葉案備錄一方待政博雅金石斛粉丹皮杜蘇子蛤黛散鉤鉤生薏仁苦杏仁生白芍枇杷葉旋覆花藕汁冬瓜子咳嗽而見臭痰絡血或夜不得眠或臥難著枕大便乾結白苔滿布時輕時重已病半年有餘所謂熱在上焦者因咳為肺痿是也左寸脈數而小正合脈數虛者為肺痿之訓而右關一部不惟數疾而且獨大獨弦獨滑陽明胃經必有濕生痰痰生熱薰蒸於肺母病及子不獨肺金自病此所進之藥所以始效而總不效也夫肺病屬虛胃病屬實一身而兼此虛實兩途之病苟非按部就班循循調治必無向愈之期紫菀一錢麥冬二錢桑皮錢半地骨皮錢半阿膠一錢薏仁五錢忍冬藤一兩川貝錢半蛤殼一兩橘紅一錢茯苓三餞炙草三分詒按論病選藥俱極精到此方亦從葦莖湯套出可加蘆根鄧評凡咳嗽脈之弦滑見於右關者必多痰濕濁邪壅聚於胃熱被濕遏濕為熱蒸閱案中議論亦極清正惟方內膠麥地骨似太遏邪欲清胃熱不如易蘆根知母為善孫評右關大弦數之胃脈熱遏於中不得肅化阿膠生地滋陰補血熱得補而愈壅宜去當從柳氏用葦莖湯加肅清之味再診諸恙向安右脈亦緩藥能應手何其速也再守之觀其動靜前方加水飛青黛三分鄧評因寒遏而患其薰蒸之勢故藥之應手甚速然而病終不愈三診右關之大脈已除弦滑未化數之一字與寸相同濕熱痰三者尚有薰蒸之意肺必難於自振前方加大生地蛤粉炒三錢沙參三錢蜜陳皮一錢鄧評右關仍見弦滑是鬱熱又復薰蒸矣再加生地愈覺背謬四診迭進張氏法肺金薰蒸日輕一日金性漸剛頗為佳兆然須振作以著本來之清肅乃可前方去薏米加麻仁五診夜來之咳嗽尚未了了必得肺胃漸通乃愈前方去蛤殼茯苓加川斛百合鄧評夜來之咳每由於厥陰肝火內動是其肺胃之火有以乘之乎蛤殼正宜參用今何反去之六診肺虛則易招風偶然咳嗽加劇而今愈矣脈數右寸空大陰氣必虛自當養陰為主然陽明胃經濕熱薰蒸之氣不能不兼理之前方去百合加知母七診右脈小中帶數肺陰不足肺熱有餘其所以致此者仍由胃中之濕熱薰蒸也前方加絲瓜絡冬瓜仁葦莖八診肺屬金金之母土也胃土濕熱未清上焦肺部焉得不受其薰蒸所謂母病及子也肺用在右右胸當咳作疼未便徒補必使其清肅乃可前方加薏仁杏仁九診來示已悉因思動則生火火刑於金則咳逆火入於營則吐血此十七日以後之病失於清化以致毛竅又開風邪又感咳嗽大作欲嘔清痰血絡重傷也事難逆料信然懸擬以復桑皮地骨皮杏仁甘草淡芩茅根知母川貝葦莖忍冬藤兩劑後去淡芩加麥冬沙參生地又丸方大生地白芍丹皮澤瀉沙參茯苓山藥麥冬阿膠用忍冬藤十斤煮膏蜜丸原注此病道理盡具於第一案中先生平日所言起手立定根腳以下遂如破竹大約此病拈定胃火薰蒸四字方中得力尤在忍冬藤一味鄧評不待咳止而遂立丸方想緣診次太多聊以應酬世故耳宿積黑血從吐而出胸之痞塞少和肺之咳嗽略減是瘀血也從上出者為逆究非善狀瘀熱湯旋降蔥葦枇葉參三七磨沖詒按可加酒炙大黃炭數分研末沖服以導血下行鄧評立方簡潔老當蓋病歸一路用藥亦宜精專耳再診所瘀之血從下而行尚屬順證因勢導之原是一定章程當歸丹參桃仁靈脂蒲黃茯神遠志詒按仍宜加牛膝三七等導下之品鄧評因何前方一味不用是復診時未帶原方乎昨日所溢之血盈盆成塊而來無怪乎其厥矣幸得厥而即醒夜半得寐其氣稍平今日仍然上吐脈來芤數火升顴紅咳逆時作大便不爽而黑陽明胃腑必有伏熱防其再冒再厥犀角地黃湯加三七牡蠣龜板枇杷露詒按此與下條皆木火亢盛陰血沸騰之證鄧評此為陽明有蓄血伏熱盈盆成塊而吐者立法久嗽失血鮮而且多脈數左弦苔黃心嘈金受火刑木寡於畏以致陽絡被傷也防冒犀角地黃湯加二母側柏葉另歸脾丸原注吳鶴皋日心火也肺金也火為金之畏心移熱於肺乃咳嗽甚則吐血面赤名日賊邪是方也犀角能解心熱生地能涼心血丹皮芍藥性寒而酸寒則勝熱酸則入肝用之者以木能生火故使二物入肝而瀉肝此拔本塞源之治鄧評此必陰虛成勞為難治之症或可以瓊玉膏繼之至於另用歸脾丸則失之遠矣孫評凡血症之急者總宜導之下達乃順古所云天下無倒行之水人身無倒上之血由乎氣導之使下者即是順氣也陽絡頻傷胸前窒塞咳逆不爽舌紅苔黃脈形弦數此係瘀血內阻鬱而為熱肺胃受傷極易成損慎之旋覆猩降蔥管蘆根枇杷葉忍冬藤蘇子桑皮川貝知母廣鬱金參三七竹油地骨皮原注前五味名瘀熱湯是先生自製之方治瘀血內阻化火刑金而咳不去其瘀病終不愈此為先生獨得之秘詒按合二母瀉白以清肺佐蘇鬱三七以通痹立方周到之至鄧評脈弦數而苔黃當有風熱鬱戀所用方藥亦非背謬脘脅痞結作痛形寒如瘧苔濁不納渴欲熱飲神情憊乏此血絡凝泣濕邪附之欲化熱而未能透出也瘀熱湯加香附川連歸須青皮白芍橘絡鄧評病偏於痰濕閉遏何不加薤白芥子以辛通陽氣或曾患吐血故知其血絡凝泣但既已形寒如瘧蘆根似非所宜瘀血先阻於中一經補味胸中遂痞紫黑之血從此而來瘀熱湯加鬱金汁原注此方大效詒按再加三七磨沖更妙鄧評確係瘀血並無別邪夾雜宜其效若桴鼓也孫評所云不去其瘀病終不愈若誤補之變生不測矣此段柳批用藥切實可法學者宜熟玩而記之虛損門痧子之後咳嗽四月頸旁鬁串咳甚則嘔納少形瘦膚熱脈細想是餘邪內戀陰分大虛欲成損證也四物湯加香附川貝玄參牡蠣麥冬蘇子一本作蘇葉詒按方中玄參牡蠣為項鬁而設無此證者可減也鄧評咳甚則嘔內必多痰方中之地似宜酌用孫評咳而膚熱脈細餘邪內戀熱未清也芎歸不宜況痧後久咳明明是餘熱留戀入肺傷陰所致溫邪發痧之後咳嗽失血血止而咳嗽不減所吐之痰或黃或白或稠或稀舌質深紅其苔滿白喉癢嗌乾脈弦帶數漸作痧勞之象四物湯加紫蘇桑皮骨皮川貝知母前胡淡芩原注此痧後餘邪留戀營分而成咳也先生嘗云余自製兩方一為瘀熱湯一為此湯尚未立名以治痧後咳嗽極效蓋四物是血分引經之藥將溫散化痰之品納入其中引入營血中散邪清熱每用必靈此可悟用四物之法鄧評據此苔脈邪鬱尚重還當著意疏邪孫評熱戀於營已見咳血則陰被劫而熱內鬱當清熱安營為治若以芎桂辛溫上升熱愈甚而血益溢今原注云每用必靈者恐無是理抑係夾冒寒邪或得見效是必先生之誤認也方中蘇葉亦太溫散細考葉氏溫熱論自知必嗽輕不失血者宜之若嗽重失血有火內服芎桂辛溫不宜咳嗽五月有餘黃昏為甚肌肉暗削肢體無力容易傷風或頭脹或溺黃總由陰分下虛浮火夾痰上擾所致四物桔梗湯四物加桔柏加桑皮地骨皮川貝知母甘草青黛蛤殼枇杷葉原注此方之眼在咳嗽黃昏為甚畢竟風邪陷入陰分為劇余目睹效者甚多詒按此四物合瀉白加二母蛤黛法也鄧評頭脹一症亦由風陽上浮所致石決明或可參用孫評傷風頭脹夾冒風寒此方頗妙金能克木木火太旺反侮肺金金藏尚受木克則其吸取腎水疏泄腎精更屬易易此夢遺咳嗽之所由作也天冬生地黨參黃柏甘草砂仁白芍龍膽草原注此三才封髓丹加白芍龍膽也其人面必黑瘦有一團陰火熾甚克肺傷腎用之極效詒按此方以清泄肝火為主竟不兼用肺藥所謂治病必求其本也鄧評論病透徹用藥切當孫評病分上下而以肝火聯絡之心思尖巧又屬至情至理古人於清陰火一門每云知柏苦寒傷脾敗胃多去而不用況可加以膽草乎子後咳嗽天明而緩脈形弦數聲音不揚肝膽之火未清金受其刑水必暗虧也補肺阿膠湯合四陰煎瀉白散加川貝青黛海浮石橘紅竹茹詒按此與前案均屬木火刑金之證前方治肝而絕不及肺想因咳勢不甚而下注遺泄之證卻急故用藥如彼此證則咳甚音低肺金受損已深故於清火之中偏重補肺觀乎此而臨證用藥之權衡可識矣鄧評子後咳嗽的係肝膽之火亦診脈之關鍵處此症似可偏治其肝舍去補肺湯增入蛤殼蓋欲保肺金莫若沙參玉竹紫菀旋覆之類咳嗽失血音爍咽乾近來小有寒熱頭痛喉疼脈浮促而數肺陰久傷又兼燥氣加臨補肺之中當參以辛散補肺阿膠湯加桑葉枇杷葉鄧評知其兼受燥氣外邪金在頭痛得之孫評燥邪當用辛涼清之辛散不宜且補肺阿膠是補中兼疏甘寒帶辛非辛散之法再診頭痛咽疼已止寒熱亦輕新受之燥邪漸得清散無如金水兩虛失血久嗽音爍嗌乾等證仍如損象即使靜養猶恐不及四陰煎合瀉白散加川貝杏仁阿膠茯苓石決明原注此病肺臟已損再受燥邪小有寒熱頭痛咽疼是其的據先用補肺阿膠湯以其中有牛蒡杏仁加桑葉枇杷葉去其燥邪外證後用四陰煎加味以圖其本鄧評此久嗽音爍亦得無客邪留於肺絡否陽絡頻傷之後咳嗽痰濃內熱嗌乾脈芤數左關獨弦此肝火刑金金氣不清之候容易成損慎之四陰煎加二母羚羊另瓊玉膏地冬參蜜沉香珀原注肝火刑金於左關獨弦見之所以四陰更加羚羊鄧評惟形體未瘦者尚可投此法而愈孫評清肝火究不宜羚羊當用決明牡蠣之類所云選藥如選將非量敵而行不克也失血後咳嗽夢遺脈數左關弦急必有肝火在裏既犯肺金又泄腎氣也久延勢必成勞四陰煎加陳皮川貝海浮石青黛龍膽草六味湯原注肝火上下交徵故加龍膽以泄之詒按六味湯想係轉方增入者但其中有萸肉之酸溫專補肝陽尚宜酌用鄧評欲保肺腎須清肝火所謂源清則流自潔也失血久咳陰分必虛虛則不耐熱蒸食西瓜而稍退脈數左弦唇乾苔白色滯溺黃加以咽痛久而不愈想是水不涵木陰火上衝胃氣不清也勢欲成勞早為靜養以冀氣不加喘脈不加促庶幾可圖生地白芍茯苓澤瀉丹皮花粉元參甘草豬膚青蒿露枇杷葉露鄧評苔白色滯而斷其為陰虛者良以脈數左弦故也蓋一病須有一病之著眼處參以青蒿枇杷露不免有暑氣內侵也再診濁痰雖少咳逆仍然陰分之火上衝於肺肺屬金金受火刑水之生源絕矣能不慮其脈促氣喘乎知命者自能靜以養之八仙長壽丸加玄參阿膠陳皮甘草枇杷葉露鄧評所敘病證已犯正虛邪實之戒雖有良劑恐亦難矣三診咳嗽夜來有或重或輕之象想是陰火靜躁不同耳前方加洋參龜板杏仁鄧評夜來咳嗽總為陰火升動之確據四診所進飲食不化為津液而變為痰涎一俟水中火發咳嗽作焉權以化法玉竹飲子玉竹苓草桔橘菀貝薑合麥門冬湯加阿膠百合款冬原注前兩方六昧加減法也脈數左弦咽痛水不涵木陰火上衝惟苔白二字為胃氣不清之證此病頭緒甚繁方中一一還他的對之藥詒按此等證本無必效之方似此斟酌妥帖即使難期必效亦覺心苦為分明矣鄧評論理透徹此方則兼治其實矣然尚須參蛤黛桑皮知母等以降陰火孫評苔白非胃氣之不清若紅乃胃陰之已涸脈形細數細屬陰虧數為有火火上刑金水即絕其生源未可以咳嗽小恙目之幸而氣息未喘脈象未促如能靜養猶可以作完人生地麥冬沙參石決明地骨皮桑皮阿膠枇杷葉露詒按此清滋金水兩臟之平劑但患陰虛而不挾別項邪機者可仿此調之鄧評未見潮熱失血亦尚幸事苟至氣喘脈促更且臨危矣
