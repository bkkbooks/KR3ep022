body:
  text: 評選靜香樓醫案上卷長洲尤怡在涇著內傷雜病門陰虧於下陽浮於上服八味丸不效者以附子走竄不能收納耳宜加減法桂都氣丸詒按議論精細可為用藥者開一悟境鄧評附子既已不合則桂亦恐礙浮陽何不參介類以潛之肝陽盛肝陰虛吸引及腎腎亦傷矣益肝體損肝用滋養腎陰俾水木相榮病當自愈生地白芍小薊赤芍當歸血餘丹皮阿膠甘草茅根詒按此必因肝火而見血者故方藥如此鄧評論病明透茅根似與肝陽不宜左關獨大下侵入尺知肝陽亢甚下吸腎陰陰愈虧則陽益張矣滋水清肝乃正法也知柏八味丸加天冬龜板杞子詒按方中似宜再增清肝之品鄧評核參方案此病當有遺精淋濁之類孫評知柏天冬皆清肝之品何必再增陰不足者陽必上亢而內燔欲陽之降必滋其陰徒恃清涼無益也生地知母甘草黑梔麥冬玄參丹皮地骨皮詒按案語精粹有名雋氣鄧評治病求本此之謂歟孫評必陰大傷而熱熾者但清其熱則陰愈傷腎陰不足肝火乘之故有筋攣骨痿耳竅二陰氣出等證夫肝火宜泄腎精宜閉於一方之中兼通補之法庶幾合理然非旦夕所能奏功也生地川楝子茯苓阿膠丹皮女貞子詒按論病深中肯綮方中可增白芍牡蠣鄧評此屬痿症方從虎潛丸脫胎而來肝陰不足肝火偏勝傷肺則咳自傷則脅痛阿膠兜鈴丹參炙草歸身白芍玉竹川斛詒按既有脅痛見證似當兼與通絡清肝宜加丹皮山梔青皮橘絡旋覆等味鄧評咳由肝火正於脅痛見出如此看病則目無難題矣清金以制木是亦一法兼與通絡尤為盡善咯血脅痛項下有核脈數惡熱咽痛便溏此肝火乘脾之證反能食者脾求助於食而又不能勝之則痞耳治在制肝益脾白芍茯苓川連牡蠣炙草木瓜益智阿膠詒按論病明快方中擬加丹梔夏枯草鄧評此必陰虛而抉痰濕滋燥最難偏任惟有主用制肝足以取勝選藥尚稱平善或以丹梔易川連孫評咽痛有虛火上逆益智恐嫌燥宜扁豆山藥之類飲食既少血去過多陰氣之傷蓋已甚矣茲復憂勞驚恐志火內動陰氣益傷致有心煩體痛頭疼等證是當滋養心肝血液以制浮動之陽者也生地石斛麥冬丹皮玄參知母茯苓甘草詒按肝陰既虧肝火上升宜再加歸芍以滋養之羚羊菊梔以清泄之鄧評層層推測則病無遁情矣柳師加味較原方切實若脈非弦大惟羚羊去之肝藏失調侵脾則腹痛侮肺則乾咳病從內生非外感客邪之比是宜內和藏氣不當外奪衛氣者也但脈弱而數形瘦色稿上熱下寒根本已漓恐難全愈歸身白芍炙草茯苓桂枝飴糖詒按此內補建中法宜於腹痛而不宜於乾咳宜加清肝保肺之味乃為周匝鄧評議病確鑿方內惟桂枝不妥參入吳萸炒桑白皮蜜炙陳皮較為勝著烏梅桔梗亦可參用孫評此方與葉氏並駕齊驅清肝保肺如石斛麥冬亦頗相宜形盛脈充兩尺獨虛下體麻痹火浮氣急此根本不固枝葉雖盛未足恃也熟地山藥沙苑杞子丹皮茯苓桑椹牛膝詒按如此脈證似可參用腎氣法以溫攝之鄧評能於虛實疑似之間探出真諦胸中既能了了筆下自無餘蘊真陽以腎為宅以陰為妃腎虛陰衰則陽無偶而蕩矣由是上炎則頭耳口鼻為病下走則膀胱二陰受傷白春及秋屢用滋養清利之劑欲以養陰而適以傷陽不能治下而反以戕中內經所謂熱病未已寒病復起者是也鄙意擬以腎氣丸直走少陰據其窟宅而招之同聲相應同氣相求之道也所慮者病深氣極藥入不能制病而反為病所用則有增劇耳腎氣丸詒按立論透切醫案中僅見之作鄧評要知滋清大過每有是症緣虛陽遊行於三焦經絡非陽火亢盛上充下斥之比此案洵屬可法非閲歷有得者不能道隻字反為病所用者恐其杜附助陽耳病至深權每有此弊孫評議論非名大家其孰能之真陽氣弱不榮於筋則陰縮不固於裏則精出不衛於表則汗泄此三者每相因而見其病在三陰之樞非後世方法可治古方八味丸專服久服當有驗也八味丸詒按見識老到議論明確此為可法可傳之作鄧評金匱桂枝龍牡湯似與此症適合記出以資博雅胃寒背冷食入則倦喜溫惡清以背為陽位胃為陽土土寒則食不運陽傷則氣不振也治宜溫養陽氣人參桂枝益智仁厚朴炮薑茯苓炙草白朮詒按此溫中和氣平正通達之方鄧評一派虛寒溫養奚疑中氣虛寒得冷則瀉而又火升齒衄古人所謂胸中聚集之殘火腹內積久之沉寒也此當溫補中氣俾土厚則火自斂四君子湯加益智仁乾薑詒按議病立方均本喻氏近時黃坤載亦有此法鄧評辨真假之關鍵處學者最宜留意若屬夫腎者又須八味丸治之乾薑宜易炮薑類中門類中偏左於法為逆猶幸病勢尚輕可以緩圖取效原方補少通多最為合理惟是陽脈則緩陰脈則急所以指節能屈不能伸此亦病之關鍵處刁可忽也經云肝苦急宜食甘以緩之於前方中增進陰藥之甘潤者一二更為完備人參茯苓半夏白朮炙草橋紅麥冬竹瀝薑汁詒按此六君加麥冬竹瀝薑汁也鄧評左半屬陰血病機較深故為逆指節屈不能伸病在厥陰肝經是陰脈則急之義若治痿取陽明即陽脈則緩者矣再診加當歸脈虛而澀左半手足麻痹食不知味此氣血不能運行周體乃類中之漸也桂枝茯苓歸身半夏炙草黃耆天麻首烏詒按滋養疏化虛實兼到鄧評此從金匱血痹例治內風本皆陽氣之化然非有餘也乃二氣不主交合之故今形寒跗冷似宜補陽為是但景嶽云陽失陰而離者非補陰無以攝既散之元陽此證有升無降舌絳牽掣瘩不出聲足蹴不堪行動當與河間肝腎氣厥同例參用丹溪虎潛法熟地萸肉牛膝鎖陽虎骨龜板詒按持論明通立方筒當鄧評此少陰不至則為痔厥下虛上實之候也堪為妄用附桂動輒謂引火歸源者告虎骨易蓯蓉較與舌絳無礙孫評此等句今不得而見之矣再診地黃飲子去附子加鹿鞭子煎膠打丸鄧評方內溫潤益陽之品足矣何必再加此味熱風中絡口歪舌蹇咽痛治以清滋羚羊角玄參鉤藤甘菊甘草石菖蒲生地竹瀝再診生地阿膠麥冬知母貝母甘菊甘草玄參三診咽喉乾痛滋清不愈宜從降導腎氣丸淡鹽湯送下詒按先清之繼滋之終用引火下行之法步伐井然淩躐急功者可取法焉鄧評統閲三方第一方偏於清火第二方專重滋陰第三方復參溫導雖似有步伐究未能認真病源歸於一律方書每以左癱屬血虛右瘓屬氣虛據述頻年已來齒疼舌赤常有精濁納穀如昔卒然右偏肢痿舌強口喁語蹇脈浮數動此乃肝腎兩虛水不涵木肝風暴動神必昏迷河間所謂肝腎氣厥舌瘩不語足痱無力之證伹腎屬坎水真陽內藏宜溫以攝納而肝藏相火內寄又宜涼以清之溫腎之方參入涼肝是為復方之用地黃飲子去桂附加天冬阿膠詒按即古法而化裁之參詳脈證斟酌盡善鄧評以各證推之雖偏中於右而精水亦自虧也此即臨證之活潑處肝陽旺者溫腎不用桂附腎氣虛者涼肝只以天冬斯為斟酌盡善之法孫評案語分析爽快惟葉氏開此一解振千古之聾贖寒熱後邪走手少陰之絡猝然不語肩背牽引不舒宜辛以通之菖蒲遠志甘草木通當歸丹皮丹參茯苓詒按方法輕靈恰合餘邪入絡治法鄧評此症必有痰火竄閉絡脈再加鉤鉤薑汁竹瀝於痰火一層稍為著力孫評似宜兼用萬氏牛黃清心丸脈濡按之則弦右肩及手指麻木兩腿酸癢難以名狀此脾飲肝風相合為病乃類中之漸不可不慎首烏天麻刺蒺藜羚羊角炙草茯苓半夏白芍丹皮廣皮薑汁和竹瀝泛丸詒按以二陳薑汁竹瀝除痰飲以丹芍羚蒺首烏天麻治肝風兩層俱到就見證論歸身牛膝橘絡亦可加入鄧評脈濡屬濕弦則為風風與濕合放麻木酸癢所謂飲者正由濕化也羚羊宜與桂枝並用始妥即木瓜薏仁亦可參入孫評牛膝橘絡既可導之下行又能通絡心思靈通惟肢麻腿癢是痰流入絡筋為痰滯宜加桑枝絲瓜絡通之為要痿痹門脈虛而數兩膝先軟後腫不能屈伸此濕熱乘陰氣之虛而下注久則成鶴膝風矣生地牛膝茯苓木瓜丹皮薏仁山藥萸肉澤瀉萆薢詒按正虛著邪故補散宜並用濕而兼熱故滋燥不可偏此以六味治陰虛增入牛膝木瓜薏仁茸蘚以除濕熱所謂虛實兼顧也鄧評此確屬陰虛濕熱竟能由痹成痿立方殊妥善再加廣皮或生薑則著痹之邪較克流行孫評柳氏指點分明可為讀書者開一便徑於初學大有補益也內風門肢麻頭運此肝病也便溏食減脾亦病矣宜節勞養氣毋致風動為佳羚羊角白朮刺蒺藜茯苓炙草天麻白芍廣皮詒按肝脾兩治方法周到鄧評方論俱朗朗無片云纖翳惟羚羊尚恐礙脾陽入牡蠣較妥孫評可增木瓜牡蠣之類既可於肝熄風又能止溏不滯眩運嘔惡胸滿小便短而數口中乾水虧於下風動於上飲積於中病非一端也羚羊角細生地鉤鉤天麻茯苓廣皮半夏竹茹詒按病非一端方欲打成一片非熟於制方之義者不能擬再增生牡蠣鄧評即陰虛挾痰飲之候治嘔惡不用川連殆忌以水虧飲積故耶抑肝陽已經化風耶孫評病來三端打成一片是最難之事嘔惡胸滿可加川楝子枳實或左金丸再診前方去生地加麥冬鄧評麥冬較生地為勝三診人參茯苓麥冬羚羊角天麻半夏炙草石斛廣皮肝陰不足則火動生風脾失健運則液聚成痰調理肝脾當漸愈也半夏茯苓廣皮鉤鉤生地竹瀝麻仁汁詒按案屬通論方中宜加用白芍方能顧到肝經鄧評苟非過於陰虧者宜將生地易首烏鉤鉤易木瓜既能柔息肝陽卻無妨中之害即方內之竹瀝麻仁總不利於脾病想用之者亦出於不得已耳再診和養中氣人參陳皮生穀芽石斛茯苓木瓜鄧評想已胃疲食少故其轉方如此肝陽化風逆行脾胃之分胃液成痰流走肝膽之絡右腿麻痹胸膈痞悶所有來也而風火性皆上行故又有火升氣逆鼻衄等證此得之飢飽勞郁積久而成非一朝一夕之故也治法清肝之火健脾之氣亦非旦夕可圖也羚羊角廣皮天麻甘草枳實半夏茯苓白朮麥冬詒按持論明通立方周匝看似平淡無奇實非老手不辦亦當加入白芍鄧評尚無痰走肝膽見證此肝風挾痰上逆之證肢冷自汗有似陽脫實非脫也目與唇口牽引時復歌笑治宜先卻邪氣而後養正羚羊角白茯苓竹茹鬱金半夏甘草鉤鉤橘紅詒按治法的當時復歌笑是心臟受邪之象菖蒲遠志膽星清心牛黃丸之類均可選入鄧評想必舌絳脈盛是以不顧厥汗而直任羚羊似可參入生脈兼治其虛柳師亦在應加之例肝屆風木性喜沖逆其變動為振搖強直其治法宜柔木熄風細生地鉤鉤歸身茯苓阿膠天麻羚羊角山藥柏豫仁刺蒺藜詒按此方可加木瓜白芍鄧評至理名言脾失運而痰生肝不柔而風動眩運食少所由來也白朮天麻首烏廣皮半夏羚羊角茯苓鉤鉤詒按案語簡煉方亦純淨鄧評此等方案既松靈又周匝學到如此庶幾目無難題四肢稟氣於脾胃脾胃虛衰無氣以稟則為振顫土虛木必搖故頭運也歸芍六君子湯加黃耆天麻詒按案語説理朴實立方以扶正為主似宜再加熄風之品其所加之黃耆恐非肝風升動者所宜鄧評此培土以禦木法柳評尤屬精細木旺乘土土氣不宣痰涎鬱聚傳走經絡故頭旋腳弱有似虛象實則未可徒補也首烏橘紅茯苓薏仁木瓜鉤藤刺蒺藜半夏炙草詒按首烏似嫌其澀不如用生於朮為妥擬再加牛膝竹瀝薑汁鄧評勢將延為類中原方已平妥加減更切實神志門驟爾觸驚神出於舍舍空痰入神不得歸是以有恍惚昏亂等證治當逐痰以安神藏半夏膽星鉤藤竹茹茯神橘紅黑梔枳實詒按敘病如話如畫此等方案非有切實功夫者不能所謂成如容易卻艱辛也鄧評論正方切驚悸易泄腰疼足軟有似虛象而實因痰火蓋脈不弱數形不枯瘁未可遽與補也半夏炙草秫米橘紅茯苓竹茹遠志石菖蒲詒按此秫夏合溫膽加味也認證既確立方自然入彀鄧評易當作遺牡蠣白芍尚宜加入抽搦厥逆合目則發此肝膽痰熱得之驚恐病名癇厥半夏橘紅竹茹膽星炙草石菖蒲枳實茯苓詒按痰火之邪因驚恐而直犯肝膽故見證如此臥則陽氣入於陰合目則發是陽氣擾動陰臟致痰火猝發而病作也方中擬加羚羊角黃連鄧評柳評加羚單黃連與否總須以舌苔脈象為憑驟驚恐懼手足逆冷少腹氣衝即厥陽縮汗出下元素虧收攝失司宜乎助陽以鎮納第消渴心悸忽然腹中空洞此風消肝厥見象非桂附剛劑所宜炒黑杞子舶茴香當歸紫石英細辛桂枝詒按風消肝厥之證當於溫養中佐以滋陰方中細辛一味不識何意愚意再加牛膝白芍牡蠣鄧評既屬風消肝厥用藥仍嫌溫燥與案語不甚和洽柳注加味極妥孫評細辛或細生地之誤肝火挾痰上逆為厥顛疾半夏鉤藤茯苓枳實廣皮竹茹鬱金羚羊角詒按方極清穩痰飲門肺飲紫苑半夏桑皮白前杏仁詒按飲邪在肺不及於胃故專用肺藥鄧評以此與後案較量有輕重淺深之不同飲邪射肺為咳半夏杏仁乾薑北五味白芍炙草茯苓桂枝詒按此治飲正法也秋冬咳嗽春暖啓安是腎氣收納失司陽不潛藏致水液變化痰沫隨氣射肺擾喉喘咳不能臥息入夜更重清晨稍安蓋痰飲乃水寒陰濁之邪夜為陰時陽不用事故重也仲景云飲病當以溫藥和之金匱飲門短氣倚息一條分外飲治脾內飲治腎二臟陰陽含蓄自然潛藏固攝當以腎氣丸方減牛膝肉桂加骨脂以斂精氣若以他藥發越陽氣恐有暴厥之慮矣腎氣丸減牛膝肉桂加補骨脂詒按此案推闡病原極其精鑿往昔壯年久寓閩粵南方陽氣易泄中年以來內聚痰飲交冬背冷喘嗽必吐痰沫胸脘始爽年逾六旬惡寒喜暖陽分之虛亦所應爾不宜搜逐攻劫當養少陰腎臟仿前輩水液化痰阻氣以致喘嗽之例腎氣丸減牛膝肉桂加北五味沉香詒按議論明確立方亦極精當鄧評牛膝本能納降腎氣今反減去者想為腎氣失固嫌其有滑泄之力耳孫評喘不得臥徐批葉案桂膝二味是最要之藥細按亦是有理此二案均去之未用想因痰沫甚多恐溫攝則痰束於內而喘反甚也後遺精門有喘而危坐者加桂膝可知也凡讀書總須彼此對勘方有進境若徒恃高唱遙吟無益也久遺下虛秋冬咳甚氣衝於夜上逆不能安臥形寒足冷顯然水泛而為痰沫當從內飲門治若用肺藥則謬矣桂枝茯苓五味炙草白芍乾薑詒按古人云內飲治腎據此證情似可兼服腎氣丸以攝下元鄧評擬加菟絲子牡蠣丹皮肝風與痰飲相搏內壅臟腑外閉竅隧以致不寐不飢肢體麻痹迄今經年脈弱色悴不攻則病不除攻之則正益虛最為棘手鉤藤菖蒲刺蒺藜遠志竹瀝鬱金膽星天竺黃另指迷茯苓丸臨臥服詒按病屬難治而立方卻周匝平穩非學有本原者不能辦此鄧評白朮茯苓牡蠣等味似宜參入用之孫評茯苓半夏是宜於入湯劑之中肝陽因勞而化風脾陰因滯而生痰風痰相搏上攻旁溢是以昏運體痛等證見也茲口膩不食右關微滑當先和養胃氣蠲除痰飲俟胃健能食然後培養陰氣未為晚也半夏秫米麥冬橘紅茯苓詒按審察病機以為立方步伐臨證者宜取法焉鄧評至理名言再增薑汁竹茹菊花菖蒲根似更美備咳喘門風熱不解襲人肺中為咳為喘日哺發熱食少體倦漸成虛損頗難調治勉擬錢氏阿膠散冀其肺寧喘乎方可再商他治阿膠茯苓馬兜鈴薏米杏仁炙草糯米芡實孫評虛中夾實須看其虛實兼顧之妙鄧評用芡實者想有遺精故也再診青蒿丹皮鱉甲茯苓石斛甘草歸身廣皮白芍詒按此正虛而兼感外邪之證乃內傷挾外感病也鄧評前方專治咳喘此方偏理晡熱亦足見其掣肘矣久嗽脈不數口不乾未必即成損證此為肺飲鬱伏不達故也厚朴煨薑桑皮杏仁廣皮甘草半夏詒按此屬飲寒傷肺乃內因之實證也鄧評聚飲之源因寒因濕鼓立方輕靈可喜非老手不辦之作柳師所謂食古能化者此之謂也體虛邪滯肺絡不清脈泫而細幸不數耳沙參桑葉杏仁茯苓馬兜鈴貝母甘草粳米詒按案語得看病之竅最宜留意鄧評養肺不留邪疏風不礙虛用補肺阿膠法而剪裁之也肺陰不足肺熱有餘咳則涕出肌體惡風此熱從竅泄而氣不外護也他臟雖有病宜先治肺阿膠貝母沙參馬兜鈴杏仁茯苓炙草糯米詒按此等證虛實錯雜若粗工為之或與疏散或與補澀均足致損鄧評熱從竅泄故咳則涕出氣不外護放肌體惡風如此直斷無疑洵有卓識肺病以中氣健旺能食便堅為佳茲喘咳已久而大便易溏能食難運殊非所宜診得脈象與前無異但能節飲食慎寒暖猶可無虞沙參貝母炙草杏仁苡仁橘紅枇杷葉鄧評肺病本宜清潤而脾則惡之至此脾土已弱故云殊非所宜孫評開口如開門見山有一目了然之妙又丸方六味丸加五味子肉桂詒按不刊之論讀者最宜記好鄧評此二方看似平常卻已不易辦到咳嗽食後則減此中氣虛餒所致治宜培中下氣法人參半夏秫米南棗麥冬炙草枇杷葉詒按此證不甚多見學者須記之鄧評此審病之關鍵處蓋有不易之理也方即麥門冬湯加枇杷葉久嗽便溏脈虛而數脾肺俱病培補中氣為要恐後泄不食則瘦削日增也人參自芍扁豆薏仁廣皮茯苓炙草山藥蜜炙炮薑炭冶按此亦脾肺兩治之法較前數方為切實亦以此證中氣虛寒無咽乾溺澀等虛熱亢炎之證故用藥稍可著力耳然欲求效難矣鄧評柳師評語精確陰虛於下陽浮於上咳嗆火升甚於暮夜治肺無益法當補腎熟地杞子天冬白芍茯苓山藥丹皮龜板詒按此方即胡桃五味均可加入鄧評審病既確方亦當效所加胡桃五味恐於火升有礙似不如沉香蛤殼乾咳無痰是肝氣衝肺非肺本病仍宜治肝兼滋肺氣可也黃連白芍烏梅甘草歸身牡蠣茯苓詒按方中少潤肺之品擬加北沙參桑白皮再肝之犯肺必挾木火梔丹亦應用之藥也鄧評原方已屬切實柳師加味尤覺盡善孫評木火刑金咳而無痰為乾咳須究其因而治之如鬱火有用加味逍遙散者風傷於上濕傷於下上為咳嗽痰多下為跗腫酸痛宜先治上而後治下薄荷杏仁桔梗旋覆花甘草象貝連翹前胡詒按肺主一身之治節故以治肺為先鄧評此屬脾肺同病何不參用桑白皮薏仁苓橘等味為雙關咳甚於夜間肌熱於午後此陰虧也濁痰咳唾鼻流清涕是肺熱也病本如是奏功刁二易擬甘鹹潤燥法阿膠燕窩沙參海浮石瓜蔞霜川貝杏仁甘草詒按此證痰必乾黏故用藥如是鄧評制劑乎穩惜少清陰之品內熱與外熱相合肺胃受之則咳而不能食頭脹肌熱心煩宜清上中二焦竹葉蘆根花粉杏仁貝母知母桔梗橘紅詒按此外感溫燥之咳故專用清泄鄧評病屬肺胃風熱方極輕靈中竅脈細數促是肝腎精血內耗咳嗽必吐嘔清涎濁沫此衝脈氣逆自下及上氣不收納喘而汗出根本先撥藥難奏功醫若見血為熱見嗽治肺是速其凶矣人參秋石制熟地五味子紫衣胡桃詒按此難治之證在咳嗽門中亦別是一種也鄧評切要之言此下虛上實之候斯時喘汗為急急者先治故立方如是若待其脫象已定仍需兼平痰火孫評坎氣紫石英亦宜增入惟葉氏開此法門或可挽回脈虛數顴紅聲低咳甚吐食晡時熱升多煩躁此肝腎陰虧陽浮於上精液變化痰沫病已三年是為內損非消痰治嗽可愈固攝下焦必須絶欲以飲食如故經年可望其愈都氣丸加女貞子枸杞子天冬詒按用藥頗為切實鄧評虛勞重症迭見胡所恃而不恐也猶謂經年可望其愈惟所恃者在乎飲食如故蓋人以胃氣為本也風消息賁想亦未見脈微小形寒久嗽失音是氣餒陽損議固胃陽取甘溫之屬蜜炙生薑炙草白芍黃耆大棗詒按此亦虛咳中另一法門鄧評此必有寒飲內閉故以蜜炙生薑為主藥咽痛聲啞有肺損肺閉之分所謂金破不鳴金實亦不鳴也此證從外感風熱而來當作閉治溫補非宜所慮者邪不外達而內並耳阿膠杏仁桔梗貝母牛蒡玄參甘草粳米馬兜鈴詒按此錢氏補肺之類乃虛實兼治之法鄧評此乃暴病屬肺閉故潤肺散邪以清全金虛則鳴矣與虛勞見是證者不得混看孫評果以風熱內閉宜麻杏甘石湯以清疏之用復脈甘潤法嗆止音出得益水濡潤之力也無如胃弱便溏此藥不宜再用仿金匱麥門冬湯義取養土之陰以生肺金麥門冬湯詒按此用藥轉換法也鄧評此係虛勞失音但已胃弱便溏雖見效亦云難矣孫評葉氏用復脈每去麻仁者因此久咳便溏腹滿脾肺同病已屬難治況脈數口乾潮熱肝腎之陰亦不足耶白芍薏仁茯苓蓮肉炙草廣皮扁豆詒按病重藥輕恐難奏效且於肝腎亦未顧到擬加用水泛六味丸一兩絹包入煎鄧評病既危矣方亦聊盡人事煎丸並進此法極妙孫評心靈活潑時邪便溏邪得下行即是去路本病便溏則中氣先傷人以胃氣為本本不固治豈易易哉咳而吐沫食少噁心動作多喘中氣傷矣非清肺治咳所能愈也人參半夏麥冬炙草茯苓粳米大棗詒按此胃虛咳嗽也方宗金匱大半夏麥門冬兩湯之意鄧評方法合度倘能兼納沖氣似較周匝納沖氣如沉香蛤殼紫石英等咳而衄陰不足火內動也噁心不食宜先治胃竹茹粳米廣皮石斛貝母杏仁治按既有火動而衄見證宜兼清降鄧評擬增桑白皮地骨皮蘆根以清降肺胃孫評當增入側柏葉茅花之類浮腫咳喘頸項強大飲不得下溺不得出此肺病也不下行而反上逆治節之權廢矣雖有良劑恐難奏效葶藶大棗瀉肺湯詒按此痰氣壅阻之證故重用瀉肺之劑鄧評擬參風水治法脈寸關大而尺小口乾上氣不下足冷不溫此陽氣不潛當用陰中陽藥治之六味丸加牛膝車前五味肉桂詒按此兼腎氣都氣兩方之意鄧評陽既失潛參以介類潛陽可也須脈大而豁然者桂味始合孫評足冷膝冷是虛陽上越不潛之象宜以補中佐引陽歸原之法如此方是也宜切記之脈數減咳亦緩但浮氣不得全歸根本宜補益下焦以為吸受之地六味丸加五味子菟絲子又丸方六味丸加五味子杜仲芡實蓮須菟絲子杞子蜜丸每服五錢詒按議論穩實方亦妥貼鄧評上病下取治病必求其本也看此方當有腰酸精濁之證喘足冷至膝唇口乾鼻塞脈虛小下氣上逆病在根本勿以結痰在項而漫用清克也腎氣丸三錢鹽花湯送下詒按識見老當鄧評口乾鼻塞不免兼有外感今用腎氣丸直任無疑者以脈之虛小故也急則先治耳久咳喘不得臥顴赤足冷胸滿上氣飢不能食此肺實於上腎虛於下脾困於中之候也然而實不可攻姑治其虛中不可燥姑溫其下且腎為胃關火為土母或有小補未可知也金匱腎氣丸詒按擬再用旋覆代赭湯送下則上中兩層亦可關會矣鄧評腎氣丸內有溫中逐飲之義再合旋赭湯光能上下同治虛實兼到孫評議論豈浮泛者能道兩寸浮大關尺沉小氣上而不下喘咳多痰肝腎之氣上衝於肺宜以腎氣丸補而下之腎氣丸詒按此治本之法鄧評病象畢露於脈誰謂脈不足憑乎下虛上實當治其下勿清其上真氣歸元痰熱自降宜以十味腎氣丸主之十味腎氣丸詒按識見卓老鄧評苟其虛偏於陰分者此法尚非所宜失血門絡熱血溢寸氣所觸非陰虛火浮之比慎勿以滋膩治也荊芥丹皮茺蔚子丹參鬱金藕汁細生地小薊炭詒按勘證用藥老眼無花鄧評疏邪清熱導瘀方極輕靈中竅若以滋膩補劑必致瘀熱留灼成勞吐血得勞與怒即發脈小數微嗆病在肝心得之思慮勞心宜早圖之勿使延及肺家則吉阿膠丹皮牛膝丹參小薊炭三七藕汁童便詒按此治吐血之正法能止血而無流瘀之弊最為穩當孫評吐血不咳尚可除根若咳雖止必發是要言也再診前方去丹參三七藕汁童便加生地白芍茺蔚子又丸方六味丸加阿膠五味子小薊炭蓮須水泛丸鄧評導瘀為先著養陰以善後統閲三診步伐井然失血咳逆心下痞滿暮則發厥血色黯大便黑肝脈獨大此有瘀血積留不去勿治其氣宜和其血製大黃白芍桃仁甘草當歸丹皮降香詒按此專治瘀積之法鄧評此瘀積被木火衝動導瘀隨以瀉火選藥絶不浮泛擬再加阿膠以補肺旋覆以降逆且能化瘀和絡孫評可加蘇子藕汁病後失血色紫黑不鮮此係病前所蓄胸中尚滿知瘀猶未盡也正氣雖虛未可驟補宜順而下之小薊炭赤芍生地犀角鬱金丹皮茺蔚子童便詒按此必尚有鬱熱見證故方中用犀角既有留瘀未盡可加醋炙大黃炭鄧評想必有舌絳脈數心胸煩熱之證故方中可用犀角柳師加味亍導瘀亦著力凡有瘀血之人其陰已傷其氣必逆茲吐血紫黑無多而胸中滿悶瘀猶未盡也而舌絳無苔此陰之虧也嘔吐不已則氣之逆也且頭重足冷有下虛上脫之慮惡寒譫語為陽弱氣餒之徵此證補之不投攻之不可殊屬棘手人參茯苓三七吳萸烏梅牡蠣川連鬱金詒按論病則層層俱透用藥亦步步著實此為高手孫評血色紫黑是瘀之實據此症得元因怒傷肝乎或抉風熱內動乎而又陰虧氣餒攻補仍屬棘手斯方之制已非平庸手筆失血後氣從下逆上足冷頭熱病在下焦真氣不納六味丸加五味牛膝牡蠣詒按方亦妥當若再進一層可用金匱腎氣法以導火下行鄧評勿拘拘乎降氣之例非識見深遠者不能血去過多氣必上逆肺被其沖故作咳嗽此非肺自病也觀其沖氣甚則咳甚沖氣緩則咳緩可以知矣擬攝降法先治沖氣金匱腎氣丸去肉桂加牡蠣詒按認證獨的法亦老當鄧評攝降沖氣附不如桂今反用附去桂音何耶孫評附子似亦可去惟鎮攝之味如磁石五味白芍之類當宜加重脈寸靜尺動屢經失血覺氣從下焦上衝則嗆勞動則氣促不舒此病不在肺而在腎治嗽無益宜滋腎陰熟地天麻牡蠣茯苓杞子萸肉五味子詒按病與上條相同方中用天麻不知何意鄧評上案挾飲邪此案重陰虛方內天麻疑是天冬之誤心脈獨大口乾易汗善怒血逆此心陰不足心陽獨亢宜犀角地黃湯犀角地黃湯加茅根甘草山梔詒按方案均精簡尉帖鄧評此肝陽未嘗不亢蓋肝陽過升脈乃上溢溢則並火於心脈矣茅根宜易丹皮痰中有血點散漫此心病也口乾心熱當是傷暑因暑喜歸心故耳生地茯神扁豆甘草丹皮竹茹麥冬藕汁詒按方法清靈可喜鄧評血點散漫為心經之血生地應是鮮生地葛可久論吐血治法每於血止瘀消之後用獨參湯以益心定志茲以陰藥參之慮其上升而助肺熱也人參沙參生地阿膠牛膝夫苓詒按此失血後服人參一定之法鄧評參以陰藥較獨參湯更勝一籌勞傷失血心下痛悶不當作陰虛證治但脈數咳嗽潮熱恐其漸入陰損一途耳生地桃仁楂炭鬱金赤芍製大黃甘草丹皮治按此證如早服補澀則留瘀化熱最易致損須看其虛實兼到絶不犯手鄧評此方以導瘀熱為主是二虛一實先治其實之旨孫評認定痛悶著筆點清血症致損之由使人豁然開朗如此評論有益於人不少閉不足而陽有餘肝善逆而肺多鬱脈數氣喘咳逆見血脅痛治宜滋降更宜靜養不爾恐其血逆不已也小生地荊芥炭白芍童便鬱金藕汁小薊炭詒按此亦氣火上逆之證可加牛膝丹皮鄧評此風熱挾木火郁逆子肺絡故方法務取輕靈離經之血未淨而鬱於內寒熱之邪交煽而亂其氣是以瞪滿嘔泄寒熱口燥治當乎其亂氣導其積血元氣雖虛未可驟補也丹皮楂炭澤蘭赤芍鬱金丹參牛膝小薊詒按此證挾外感之邪可加荊芥炭黑棺豆衣鄧評此失血中偶有之症故絶少成法可遵竊思失血之後中氣必虛木火必亢就此見證不但有寒熱交煽之邪抑且有土木相仇之意戊己丸法亦可參用至柳師所加固未嘗不善也方中牛膝可去之孫評荊芥炒炭既祛外風又導瘀血最有巧思久咳見血音喑咽痛乍有寒熱此風寒久伏傷肺成勞擬錢氏補肺法聲出則佳阿膠杏仁馬兜鈴牛蒡薏仁貝母糯米鄧評錢氏補肺法內用甜杏仁此係風寒久伏當以苦杏為準若進步求治可仿葛氏保和湯例又膏方阿膠貝母甘草橘紅杏仁蘇子米糖白蜜薑汁紫苑木通梨汁桔梗牛膝蘿蔔汁茯苓詒按此正虛邪實之證用藥能兩面兼顧尚稱穩適鄧評輕靈合度殆即保和湯而變通之耶虛損門虛損至食減形瘦當以後天脾胃為要異功散五六服頗得加穀今春半地氣上升肝木用事熱升心悸汗出復咳咳甚見血肝陽上熾絡血遂沸昨進和陽養陰之劑得木火稍乎仍以前方加白芍制朋安土生地白芍麥冬阿膠女貞子甘草詒按方亦穩合可加牡蠣丹皮鄧評隨機應變醫之能事也今陽火內動故須陰靜之藥以制之勿汲汲乎培土可也孫評柳氏加味亦是和陽養陰羅氏論虛勞之證多因邪伏血鬱而得不獨陰虧一端也臨晚寒熱時減時增其為陽陷入陰可知滋腎生旰最為合法略加損益不必更張也熟地白芍茯苓丹皮山藥柴胡炙草鱉甲詒按於養陰中加柴胡以達邪佐鱉甲以搜陰虛實兼到極為靈巧然既云邪伏血鬱似宜加當歸鄧評凡由寒熱成勞者惟羅氏立法為最善今觀此方便覺更勝一籌所謂在於臨時權衡耳所云血鬱宜加當歸以其能活血疏邪孫評邪伏血鬱淺學者每蠻補不已致邪愈伏則陰愈傷血愈鬱則火益熾虛勞死症成而至不可挽矣實則仲景大黃庶蟲丸薯蕷丸鱉甲煎丸三方早示法則矣邪伏血鬱用當歸之辛潤者以透之最切最妙之法也柳氏於按語中申明之省許摹擬矣熟地改用生地極佳再診熱漸減頭中時痛脈數不退喉中痰滯不清青蒿丹皮熟地鱉甲炙草牛膝茯苓小麥詒按似當兼清痰滯兩方中熟地不如改用生地為穩鄧評此症肝陽已旺頭中時痛想係柴胡太升鼓即改用青蒿且痰滯不清有欲咳之狀矣三診體雖不熱脈仍細數宜養陰氣六味丸去萸肉澤瀉加白芍牛膝青蒿鱉甲鄧評前之陽升仍由陰虛既體不發熱宜減去蒿鱉即有餘邪丹皮足以清之或再加當歸以疏托面黧形瘦脈虛而數咳嗽氣促腰膝無力大便時溏此先後天俱虛慮其延成虛損清潤治肺之品能戕中氣勿更投也紫河車熟地山藥萸肉五味子丹皮茯苓杜仲澤瀉牛膝加蜜丸每服五錢詒按案語浮治虛要旨方亦精當鄧評審見證先天受傷為重鼓用藥以培補先天為要孫評今人凡遇咳嗽不察虛實率用清潤肅肺不知能戕中氣反速其死今指明其弊有功不少絡脈空隙氣必遊行作痛最慮春末夏初地中陽氣上升血隨氣溢趁此綢繆當填精益髓蓋陰虛咳嗽是他臟纍及於肺若治以清涼不獨病不去而胃傷食減立成虛損難為力矣熟地金櫻子膏鹿角霜五味子湘蓮子萸肉山藥茯苓海參漂淨熬膏右為細末即以二膏搗丸詒按此必有遺精腰酸等證故用藥亦不重在咳嗽也鄧評看方藥知有遺精之證然與咳嗽合推大都挾肝陽化火上升下降所致遊行作痛亦由乎此方內鹿角霜恐有所礙擬再加丹皮白芍牡蠣旋覆花孫評柳氏如是指明省學者摹擬汗病門汗出偏沮脈來不柔時自歇止知肝陽有餘而胃陰不足於是稠痰濁火擾動於中壅滯於外目前雖尚安和然古人治未病不治己病知者見微知著須加意調攝為當人參川石斛麥冬南棗製半夏丹皮茯苓炙草小麥詒按此想係左半有汗右半無汗之證細繹案語是防其將患偏痱之意鄧評此即金匱麥門冬湯法蓋用古能化加減悉當孫評柳氏如此指點是真有書本功夫者心陰不足心陽易動則汗多善驚腎陰不足腎氣不固則無夢而泄以汗為心液而精藏於腎故也生地茯神甘草麥冬川連柏子仁元參小麥大棗詒按案語心腎並重方藥似專重於心再加五味子牡蠣沙苑等攝腎之品則周匝矣鄧評洞達病情了無疑義原方已屬乎妥再加斂攝之品尤為切實諸鬱門中年脘悶多曖多咳此氣鬱不解也納穀已減未可破泄耗氣宜從胸痹例微通上焦之陽薤白瓜蔞半夏桂枝茯苓薑汁詒按方法輕靈鄧評病由痰氣交阻肺胃不主通降擬加枇杷葉竹茹旋覆花鬱氣凝聚喉間吞不下吐不出梅核氣之漸也半夏厚朴茯苓蘇梗旋覆花橘紅枇杷葉薑汁詒按此於金匱成方中加旋覆杷葉最有巧思鄧評此係鬱氣凝痰互阻其間用金匱四七湯本千古不易之理加味卻亦靈穩如用噙化丸更屬相宜寒熱無期中脘少腹遽痛此肝臟之郁也鬱極則發為寒熱頭不痛非外感也以加味逍遙散主之加味逍遙散詒按此木鬱達之之法鄧評此亦治肝鬱祖方認證既確投劑必效病從少陽郁入厥陰復從厥陰逆攻陽明寒熱往來色青顛頂及少腹痛此其候也泄厥陰之實顧陽明之虛此其治也人參柴胡川連陳皮半夏黃芩吳萸茯苓甘草詒按此從左金道遙化裁而出若再合金鈴子散似更周到鄧評推論病源思路曲折立方亦有精義以小柴胡去薑棗治少陽左金泄厥陰二陳和陽明其用果在斯乎孫評細考案方之意當有噁心嘔吐之症此血鬱也得之情志其來有漸其去亦不易也旋覆花薤白鬱金桃仁代赭石紅花詒按此必團血鬱而絡氣不通有胸膈板痛等見證故立方如此鄧評想係胸痹噎膈之類法取降逆祛痰導瘀嘔噦門胃虛氣熱乾嘔不便橘皮竹茹湯加蘆根粳米鄧評方用參粳補胃虛蘆茹清胃熱薑橘開痰氣既輕靈復切實再診嘔止熱退石斛茯苓半夏廣皮麥冬粳米蘆根枇杷葉鄧評轉方合度三診大便不通生首烏玄明粉枳殼鄧評急則治標之法四診大便通脈和惟宜滋養石斛歸身秦艽白芍丹皮炙草茯苓廣皮詒按迭用四方運意靈巧自能與病機宛轉相赴鄧評至此大勢去矣故惟和養為宜而用石斛秦艽丹皮者腸中之燥熱殆未盡清耶下既不通勢必上逆而為嘔所謂幽門之氣上衝吸門是也治法自當療下但脈小目陷中氣大傷宜先安中止嘔嘔定再商人參茯苓刺蒺藜竹茹半夏廣皮蘆根石斛詒按似當兼通幽門乃能止嘔擬加生枳實鄧評凡中虛嘔吐者慎勿因便祕而峻導導則徒傷胃氣也放謂宜失安中誠閲歷有得之言痛嘔之餘脈當和緩而反搏大頭運欲嘔胸滿不食神倦欲臥慮其土嘖木張漸致痙厥法當安胃清肝亦古人先事預防之意半夏茯苓廣皮白風米鉤藤竹茹枇把葉鮮佛手詒按議論極是但恐藥力不足以濟之然虧卻清穩所謂清肝者只不過鉤藤竹茹而已擬再加木瓜白芍較似有力鄧評既恐土嘖而立方不以補中只云安胃清肝者為脈反搏大故也片語隻字具見斟酌病從肝起繼乃及胃茲又及於肺矣然當以胃氣為要久病之體必得安穀不嘔始可圖功石斛蘆根茯苓麥冬廣皮木瓜枇杷葉粳米詒按敘病簡要清沏非績學者不能方亦中窾鄧評論病得綱領立方有權街胃有火邪故嘔而不食膽有熱邪故合目自汗橘皮竹茹湯加石斛詒按山梔必不可少以其專清膽熱故也川連亦在應用之列鄧評此肝膽之火拼攻於胃也方藥卻清泄太少誠宜如柳師加梔連之例孫評用藥當從黃連溫膽湯加味再診前方去石斛加木瓜嘈雜得食則已此痰火內動心胃陰氣不足生地山梔半夏麥冬茯苓丹皮竹茹炙草詒按陰虛而抉痰者用藥最難恰好方中可加石斛廣皮鄧評病屬胃虛痰火用藥卻中肯綮痰氣阻逆咽嗌時自嘔惡此證利在清降失治則成噎膈半夏枇杷葉旋覆花竹茹茯苓麥冬橘紅鬱金生薑詒按用藥靈動鄧評病在初起方亦輕鬆氣鬱痰凝阻隔胃脘食入則噎脈澀難治旋覆花代赭石橘紅半夏當歸川貝鬱金枇把葉詒按旋覆代赭為噎膈正方食入則噎肺氣先鬱故加郁貝枇杷葉惟脈澀者正虛可加人參鄧評病較前案稍深故用藥亦較進步脈澀不獨為正虛抑且為血痹孫評宜加蔞皮脈疾徐不常食格不下中氣大衰升降失度旋覆花代赭石麥冬茯苓半夏廣皮人參枇杷葉詒按此因中氣大傷故用參麥鄧評脈疾徐不常卻係中氣大衰制劑精幻可法朝食暮吐肝胃克賊病屬反胃旋覆花代赭石茯苓半夏吳萸生薑粳米人參枇杷葉詒按此專治吐故加薑萸鄧評論病立方悉中肯綮蓋此病不特胃土虛寒且有肝邪賊克穀之不入非胃之不納有痰飲以阻之耳是當以下氣降痰為法代赭之用先得我心矣旋覆代赭湯詒按識既老當筆亦爽健鄧評功夫紳熟自能意到筆隨因氣生痰痰凝氣滯而中焦之道路塞矣由是飲食不得下行滓液不得四布不飢不食口燥便堅心悸頭運經兩月不愈以法通調中氣庶無噎膈腹滿之慮旋覆代赭湯加石菖蒲枳實陳皮詒按論病則源流俱沏用藥則標本兼到細膩尉帖傳作何疑鄧評此等識見超出尋常好在不因以下數證而誤用滋補中氣迭傷不能健運朝食暮吐完穀不腐診得脈虛色黑腰腳少力知不獨胃病腎亦病矣此豈細故哉人參附子川椒茯苓益智仁再診前方去川椒益智加川連肉桂詒按完穀不腐色黑腰軟腎傷之徵也改方加桂連是交濟法鄧評此釜底增薪法惟嘔吐病究竟難免肝陽不和今看其轉方易入連桂可知孫評方中可入乾薑與茯苓同用佐人參溫胃之力
