body:
  text: 評選靜香樓醫案下卷長洲尤怡在涇著伏氣門肝陰素虧溫邪擾之發為痙病神昏骱齒瘛瘋不定法當滋養肝陰以榮筋脈清滌痰熱以安神明者也若能應手尚可無慮羚羊角茯神鉤藤貝母阿膠鮮菖蒲竹瀝詒按此證若表邪未解當去阿膠加小生地或鮮生地又按此係伏氣發溫之證與外感風溫有內外之別此證邪由少陰外發潰入厥陰故見證如此羚羊角鉤藤熄風清熱皆治標之品也若圖其本當從陰分托邪俾得外達三陽再與隨經清泄乃奏全功病原治法詳載溫熱逢原中茲不贅述鄧評阿膠不宜擬換細生地玄參揭明其義極為確鑿想尤氏於伏氣溫病猶未了然耶熱傷津液脈細口乾難治蘆根知母川斛蔗漿細生地麥冬甘草梨汁詒按此存陰泄熱之正法所云難治想因脈細之故鄧評口乾僅為津液受傷脈細則其元氣亦弱故云難治熱不止頭痛不已紫斑如錦紋咽痛表裏邪盛最為重證犀角豆豉赤芍玄參牛蒡丹皮黃芩甘草詒按當加鮮生地鄧評頭痛不已由肝膽之陽火太升宜稍重養陰和陽再診去豆豉丹皮加桔梗鮮生地射干鄧評桔梗恐有礙頭痛熱病十二日不解舌絳口乾胸滿氣促邪火為患亦已甚矣宜景嶽玉女煎清熱而存陰否則神識昏冒矣鮮生地石膏麥冬知母竹葉甘草詒按此氣血兩燔之治法鄧評胸滿氣促得無有痰濁內阻乎熱病四日不汗而舌黃腹中痛下利宜先裏而後表不爾恐發狂也大黃柴胡枳實厚朴赤芍詒按先裏後表因裏證已急於病機固當如是鄧評既無寒熱往來何以大黃與柴胡並用殆恐其邪氣因下而陷乎舌乾脈數汗為熱隔雖發之亦不得惟宜甘寒養液雖不發汗汗當自出然必足溫而後熱退乃吉青蒿知母蘆根生地蔗漿竹葉詒按養液以為作汗之源是治溫要旨鄧評正虛邪鬱亦是伏溫症一種乎擬加豆豉玄參茆根孫評足冷陰已損失舌乾津亦耗傷不發汗挽回亦不易故云必足溫而後熱退乃吉也外感門頭面腫痛此風邪上盛宜辛涼解散荊芥杏仁桔梗牛蒡薄荷甘草馬勃蒼耳子鄧評風挾火邪宜參降火之品如玄參銀翹之屬風溫挾痰留滯上焦辛涼解散原為合法時至自解不足憂也牛蒡連翹薄荷川貝豆豉杏仁桔梗蔥白詒按此風溫初起之方鄧評宜增瓜萎鬱金兼化痰熱風溫郁於肺胃咳而胸滿痰多脅下痛脈數口乾蘆根薏米瓜蔞甘草杏仁紅花桃仁貝母詒按桃仁紅花因脅痛而用之以和血絡也若邪鬱可加豉蒡口乾可加翹芩鄧評證情恐成肺癰再合瀉白散增鮮沙參更覺著力脈右大舌黃不渴嘔吐黏痰神躁語言不清身熱不解此勞倦內傷更感濕溫之邪須防變端厚朴茯苓滑石陳皮竹葉蔻仁菖蒲根汁詒按此溫邪而挾濕者濕熱上蒙故證情如是比方可以為法鄧評脈右大舌黃知肺胃受熱不渴知復多痰濕用藥甚輕而識見甚高惟薑炒川連何不加用此為莫解孫評濕甚於溫濕痹清陽之候濕病門臍中時有濕液腥臭按脈素大此少陰有濕熱也六味能除腎間濕熱宜加減用之六味丸去山藥加黃柏萆薢女貞子車前子詒按六味治腎間濕熱前人曾有此論藉以治臍中流液恰合病機鄧評較六味原方為得力誠可法可師之作瘧疾門暑風成瘧噁心胸滿和解則愈半夏黃芩茯苓知母厚朴陳皮竹葉生薑詒按小柴胡法之和解和其表裏兩墳之邪也此之和解和其濕熱兩混之邪也薑夏朴廣去其濕也芩知竹葉清其熱也兩意兼用故亦云和解也又按此濕熱並重者故清燥兼用此與下條皆暑濕內伏發為時瘧之病苦辛宣泄最為合法若拘拘子瘧疾之成方概用柴胡鱉甲則誤矣鄧評暑濕風邪乘於脾胃亦宜和解為法但與和解少陽用小柴胡者周乎不同方中竹葉生薑二味極靈權妙暑風相搏發為時瘧胸滿作噦汗不至足邪氣尚未清解當以苦辛溫法治之藿香半夏杏仁通草厚朴廣皮竹葉詒按此濕重於熱者故用藥稍偏溫燥鄧評見證係痰濕阻遏胃氣所致觀方內杏仁通草殆肺氣亦共宣降要之不越和解之法孫評點清時瘧自然小柴胡之不合明矣瘧發而上下血溢責之中虛而邪又擾之也血去既多瘧邪尚熾中原之擾猶未已也誰能必其血之不復來耶謹按古法中虛血脫之證從無獨任血藥之理而瘧病經久亦必固其中氣茲擬理中一法止血在是止瘧亦在是惟高明裁之人參白朮炮薑炙草詒按識見老確議論精切所立理中一法誠屬血脫益氣固中止血之要藥惟愚意所欲商者瘧來而上下血溢必因瘧疾之熱擾及血絡而然於理中法內參用安營清絡之意似乎更為周到且標本兼顧於立方正意亦不相刺謬也鄧評柳師所評極是擬加川連歸身之屬至丹皮炭荊芥炭亦可權宜輔用孫評邪擾未已則柳氏亦甚合派安營清絡如丹皮白芍之類三瘧是邪伏陰分而發非和解可愈久發不止補劑必兼升陽引伏邪至陽分乃愈人參歸身鹿角膠杞子鹿茸附子茯苓沙苑詒按陰瘧本有此法而不能概用此法須相題為之鄧評得元有精滑之症乎然脈必緩小者為宜即見數象亦必無力孫評必須瘧發於夜寒重熱輕且腰軟足痿等症方可用此三陰瘧多有邪伏不解者痰凝不化者邪滯血絡者中下兩傷者陽氣大傷陰寒內侵者治法多端故云須相題為之瘧病方已遂得脾約脾約未已又增厥疼心腹時滿時減或得身熱汗出則疼滿立止明係瘧邪內陷於太陰陽明之間是必邪氣仍從少陽外達則不治疼而疼自止不治脹而脹自消矣詒按論病已得要領惜方佚未見鄧評擬用小柴胡合二陳枳朮並參金鈴子散瘧後脅下積癖作疼夜熱口乾溺赤陰虛邪伏宜鱉甲煎鱉甲白芍青皮丹皮首烏柴胡知母炙草詒按此邪伏陰分之治法當歸亦可加入鄧評此與三一案宜升陽者不啻天壤之殊瘧後脅下積痞不消下連少腹作脹此肝邪也當以法疏利之人參柴胡青皮桃仁茯苓半夏甘草牡蠣黃芩生薑詒按此小柴胡法也加青皮以疏肝桃仁以和瘀牡蠣以軟堅用意可云周到惟少腹作脹乃肝邪下陷之證若再加川棟子歸尾延胡似更完密鄧評瘧母以此法緩消極稱妥善想其不用仲聖之鱉甲煎丸者良以中虛作張故也再合金鈴子散亦未嘗不可瘧止復發汗多作嘔中氣虛逆宜益陽明半夏茯苓廣皮人參石斛蘆根薑汁鄧評觀其方意胃中必多痰熱再診寒熱已止汗嘔並減宜和養營衛人參桂枝石斛廣皮歸身炙草麥冬白芍詒按此膏梁虛體治法兩方俱清穩尉帖鄧評痰熱已退營衛益覺其虛故轉方專養營衛黃疸門面黑目黃脈數而微足寒至膝皮膚爪甲不仁其病深入少陰而其邪則仍白酒濕得之及女勞也腎氣丸詒按此證載在金匱近於愛廬醫案中見一方甚佳此病兼有瘀血不但濕也腎氣丸能否見效尚未可定鄧評此病腎陽固虛營衛自乏而濕熱瘀血亦必相兼此方似嫌專顧其虛未能祛邪孫評疸有瘀血黑者理可相通又增一解面目身體悉黃而中無痞悶小便自利此仲景所謂虛黃也即以仲景法治之桂枝黃耆白芍茯苓生薑炙草大棗詒按案明藥當鄧評如此認證便覺了無疑義引用古方亦自確切不泛孫評仲景法黃耆建中湯濕停熱聚上逆則咽嗌不利外見則身目為黃下注則溺赤而痛茵陳厚朴豆豉木通豬苓橘紅茯苓黑梔詒按論病能一線穿成用藥自絲絲入筘又按咽嗌不利可加桔梗前胡之類鄧評此濕熱蒸淫陽黃也方卻輕靈無弊痹氣門胸背為陽之分痹著不通當通其陽蓋陽不外行而鬱於中則內反熱而外反寒通陽必以辛溫而辛溫又礙於臟氣擬辛潤通肺以代之紫菀三兩煎湯眼詒按此巧法也特未知效否若何鄧評此似金匱所論之胸痹證瓜萎薤白半夏之屬能通陽而不礙臟氣屏除不用何以故耶或者獨任此味曾已試驗濕邪鬱遏陽氣不宣外寒裏熱胸滿溺赤宜開達上焦紫菀桔梗鬱金白蔻枳殼杏仁貝母甘草詒按此治肺痹之正法鄧評此熱鬱於內肺氣不宣故但宜輕開上焦未便因外寒而投薑桂熱藥氣窒不散便閉喘急不能偃臥猝難消散也紫菀葶藶厚朴杏仁橘紅鬱金枳殼詒按此證較前更急兼有便閉故用藥從中焦泄降鄧評此必是體實脈實者故可峻用開導蓋有識自能有膽再診大黃厚朴檳榔枳殼杏仁詒按輕劑不效故更與通腑以泄肺鄧評因邪已化熱故轉方改用寒下胸中為陽之位陽氣不布則窒而不通宜溫通不宜清刀愈開則愈窒矣桂枝茯苓乾薑炙草益智仁詒按再參入開痹之品如杏菀橘桔等似更靈動鄧評清陽之所純為寒飲閉窒自非溫通不足以開其痹孫評杏菀橘桔即所云愈開愈窒者食入則胸背痞塞作脹噫氣不舒此陽氣不通宜辛通之法草蔻仁半夏桂枝茯苓乾薑炙草詒按此證亦與胸痹相似鄧評飲阻氣鬱陽絡易窒辛通固所必需如木香砂仁疏暢中氣之品還宜參入脘腹痛門蛔厥心痛痛則嘔吐酸水手足厥冷宜辛苦酸冶之川連桂枝歸身延胡烏梅川椒茯苓川棟子炮薑詒按此烏梅丸法也鄧評方與證合惟蛔厥確據尚有心下苦熱痛則攻觸有形見端或唇舌面色變現不定蓋隨蛔之動靜故也此腎厥也心疼背脹引及腰中議用許學士香茸丸鹿茸杞子沙苑大茴香麝香詒按寒襲於腎而氣上逆故用溫養脹及腰背者督陽不用也鹿茸溫通督脈麝香開泄濁陰故以主為君鄧評擬參旋覆花湯以通營絡孫評氣自臍下上逆面厥故名腎厥四肢寒冷故用溫養背重於胸故用茸麝脈弦小腹痛食後胃脘痛上至咽嗌肝火乘胃宜泄厥陰和陽明川棟子木通茯苓甘草石斛木瓜詒按擬加延胡山梔仁鄧評病因食後面作是胃氣被遏而不暢與得食則緩者有虛實之異鼓此方務取琉泄孫評肝火乘胃由於痛時上至咽嗌故也故須加黑梔以清肝火心腹痛脈弦色青是肝病也川棟於歸身茯苓石斛延胡木瓜詒按立方穩合鄧評認證著實不頗搜索惟方內宜佐辛通瘕癖門臍下積塊捫之則熱病者自宮前後二陰俱覺熱痛其為熱結可知況自來之病皆出於肝耶鄙見非泄厥陰不能獲效龍薈丸五十粒酒下鄧評苦寒宣泄厥陰恰合病機且方內有麝香能搜絡散塊孫評病情屬熱真諦在前後二陰熱痛一句絡病瘀痹左脅板實前年用蟲蟻通血升降開發已效伹胸皖似是有形按之微痛前藥太峻茲用兩調氣血以緩法圖之醋炒延胡薑黃阿魏桃仁生香附麝香歸須為末蜜丸每服二錢詒按承前方來雖曰兩調氣血而仍以疏瘀為主鄧評此亦採取從前方凡遇瘀血結塊宜效用之孫評因板實有形故用蟲蟻搜血比方略退一層故云緩法也脈虛數色白不澤左脅有塊杯大大便小便自利病在肝家營血不和此為虛中有實補必兼通白朮歸身炙草白芍生地茯苓琥珀廣皮桃仁紅花沉香鬱金詒桉方治親切不膚鄧評古人論治塊有初中末三法此即中途之治但似可加用人參時病食復至今不知飢飽大便不爽右脅之旁虛裏天樞隱隱有形此陽明胃絡循行之所多暖氣不化並不煩渴豈是攻消急驅實熱之證耶擬用丹溪泄木安上法小溫中丸如半月後有效仍以前法詒按此中焦濕積阻結之證鄧評想有痰飲阻於胃絡亦可借用胸痹治法左脅積塊日以益大按之則痛食入不安凡痞結之處必有陽火鬱伏於中故見煩躁口乾心熱等證宜以苦辛寒藥清之開之然非易事也川連枳實香附川芎神麯茯苓青皮赤芍詒按脅塊有形益大則營絡必窒似宜榮通乃效鄧評凡積塊係時久體虛者極難奏績方藥穩切再參用金鈴子散可也孫評似可參入歸須金鈴子散之類大腹右有形為聚脈大食入即作脹治在六腑白朮茯苓廣皮生香附汁三稜厚朴草果山楂詒按方以疏通氣分為主鄧評既云脈大何不加川連枳實心下高突延及左脅有形漸加腹脹思正月暴寒口鼻吸受冷氣入胃絡膜原清陽不用濁陰凝阻胃氣重傷有單腹之纍殊非小恙厚朴草果半夏千薑茯苓蓽撥另蘇合香丸一粒化服詒按寒邪閉於營絡放用溫通方中可加桂枝尖鄧評高突有形似宜兼通營絡腫脹門脈遲胃冷腹脹氣攻胸脅噁心少食泄瀉宜振脾胃之陽乾薑益智仁半夏厚朴神麯檳榔川椒茯苓詒按此溫中調氣法也鄧評此緣中寒木鬱於溫中方內宜增白芍金鈴子木瓜以平調其肝木再檳榔一味不識何所取用孫評因噁心泄瀉故認定中宮著想命門陽衰脾失溫養不克健運食入輒脹法當溫補下焦腎氣丸去桂加沉香椒目詒按此補火生土之法鄧評書此單腹之漸也丸方加減可法濕熱內陷太陰而成脹茅朮川柏厚朴陳皮桑皮木通澤瀉大腹皮草果仁詒按此專治脾土濕熱古方小溫中丸亦可服鄧評此症苔必膩濁溺必短少係濕熱實症故用斯法孫評濕中生熱故朮柏並用脈微遲左脅宿痞腹漸脹大便溏溺少此是濁陰上攻當與通陽熟附子遠志椒目小茴香澤瀉茯苓詒按此溫通治脹之正法鄧評此乃中虛濕熱兼有肝氣內乘方內附子易乾薑為穩遠志不知從何取義擬增白朮金鈴子青皮脾氣本弱而更受木克克則益弱矣由是脾健失職食入不消遂生脹滿脾愈弱則肝愈強時時攻逆上下有聲半載之疾年逾六旬非旦夕可圖也人參茯苓川楝子楂核甘草木瓜白芍吳萸橘核詒按此肝脾兩治而偏重於肝者以其不特脹滿而兼有攻逆之證也鄧評案語辨理明晰方意虛實兼到孫評宜微佐氣分之藥如厚朴廣皮之類脈弦中滿病在肝脾人參吳萸木瓜厚朴廣皮半夏詒按此肝牌兩治之正法立方精簡可法鄧評脈弦者人參不如白木為妥善右關獨大而搏指知病在中焦飲食不化痞悶時痛積年不愈喉間自覺熱氣上衝口乾作苦舌苔白燥此脾家積熱鬱濕當以瀉黃法治之茅朮葛根茯苓石膏藿香木香詒按此痞滿門中不常見之證存之以備一格鄧評右關獨大是亦有肝木之火乘於中上也蓋不獨積熱使然方法背謬惟石膏究屬不及川連為合度孫評舌苔白燥故用瀉黃若舌苔厚燥便閉可用承氣脈證合參乃氣結在上津不運行蒸變濁痰由無形漸變有形徐之才謂輕可去實非膠固陰藥所宜白蔻薏仁杏仁厚朴枇杷葉汁絳香汁詒按此方具有輕清靈三字之妙鄧評此病滋補陰藥必已誤服多矣故立論如是勞郁交傷營衛不和胸中滿痛時有寒熱與六淫外感不同治宜和養氣血逍遙散詒按再增枳朴等寬中之品則更周到矣鄧評病雖非外感而肝經亦有伏邪鬱火方法頗合再增枳朴理氣則更善矢孫評因有寒熱故用柴胡脾以健運為職心下痞不能食食則滿悶脾失其職矣但健運之品迂緩無功宜以補瀉升降法治之人參乾薑半夏茯苓川連枳實陳皮生薑詒按此方仿瀉心法加味鄧評書此補瀉並用苦泄辛開之法升降二字尚屬強搭孫評補瀉升降可佐健運之職是至理並是創格脅下素有痞氣時時沖逆今見中滿氣攻作痛吞酸嘔吐能俯而不能仰此厥陰鬱滯之氣侵入太陰之分得之多怒且善鬱也病久氣弱不任攻達而病氣久鬱亦難補養為掣肘耳姑以平調肝胃之劑和之痛定食進方許萬全半夏廣皮川棟子橘核茯苓青皮炙甘草木瓜詒按審察病機至為精細立方亦周到尉帖鄧評既有吞酸見證故雖虛而不能補養矣不得已而立一乎調郁氣之方亦限於時局如此孫評議論透徹胃陽衰憊氣阻痰凝中脘不快食下則脹宜辛溫之品治之草果仁厚朴茯苓半夏甘草檳榔詒按此濕痰阻遏中宮之證鄧評據此方藥想胃陽雖衰猶可熱結氣閉腹脹便難厚朴杏仁滑石黃芩大腹皮茯苓皮木通詒按此運中兼泄熱法也鄧評宜加枳殼蔞皮兼通大便孫評二症似乎相同一則陽衰宜溫一則化熱宜清然溫不用桂附非下焦陽衰也熱不用連軍非結閉之甚也同中有異宜細參之腹脹面浮跗腫食不下欲嘔脾虛受濕健運失常非輕證也茅朮茯苓廣皮桑皮木通厚朴澤瀉半夏豬苓詒按此運中利濕法也鄧評跗腫一證大都係乎陽虛方內似少通陽之品面黑目黃腹滿足腫囊腫濕熱壅滯從脾及腎病深難治蒼朮制軍厚朴陳皮木通茵陳豬苓椒目澤瀉詒按邪機壅滯正氣已傷故云難治鄧評書此等病明知正氣已傷亦只得以驅導為法為背城借一之計孫評急瀉其壅滯以存其正或可挽回此則正氣未致大傷者之法另是一格臥則喘息有音此腫脹乃氣壅於上宜用古人開鬼門之法以治肺通表麻黃杏仁薏仁甘草詒按此兼喘逆故專治肺鄧評此係仲景成法為的對之方即使正氣稍傷僅以麻黃換蘇子可也風濕相搏面浮腹滿足腫大小便不利杏仁蘇子厚朴陳皮豬苓大腹皮薑皮木通詒按此表裏兩通法也鄧評病似風水立方不拘仲景成法想因病勢稍輕或以正氣受傷貴乎隨機應變者也腫脹之病而二便如常肢冷氣喘是非行氣逐水之法所能愈者矣當用腎氣丸行陽化水然亦劇病也腎氣丸詒按此病陽衰氣窒不治之證也鄧評病為腎虛陽衰無疑宜投以大劑煎藥或可挽回重病也頭痛門火升頭痛耳鳴心下痞滿飯後即發此陽明少陽二經痰火交鬱得食氣而滋甚與陰虛火炎不同先與清理繼以補降竹茹茯苓橘紅炙草半夏羚羊角石斛嫩鉤藤鉤詒按案語分析病機極其圓到惟立方似末恰合陽明藥少宜加知母枳實鄧評能指出病之關鍵處便為好手此病苟痞滿而兼陰虛者良亦棘手難治孫評痰火交鬱放宜清降而不宜補攝是一定之層次頭痛偏左耳重聽目不明脈寸大尺小風火在上姑為清解羚羊角生地甘草菊花丹皮石決明連翹薄荷詒按此內風而兼外感者散清散兼施鄧評確係風火太升故用藥如此切實孫評宜參入桑葉蔓荊鉤鉤之類風熱上甚頭痛不已如鳥巢高巔宜射而去之制軍犀角川芎細茶詒按此雖前人成法而選藥頗精筒據此則大黃當用酒炒以使之上行鄧評此等方具見學博才高宜射而去之者因有川芎引而上之也擬再加天麻防風佐之為引孫評宜參酒洗蠍尾之類據此則頭上必有高凸之形諸竅門風熱蓄於腦髓發為鼻淵五年不愈此壅疾也壅則宜通不通則不治犀角蒼耳子黃芩鬱金杏仁蘆根詒按既欲其通則辛夷白芷似不可少鄧評此病不越清之散之絶不拘守鹹法是亦脫化功夫孫評欲其通則細辛亦可用肺之絡會於耳中肺受風火久而不清竅與絡俱為之閉所以鼻塞不聞香臭耳聾耳鳴不聞音聲也茲當清通肺氣蒼耳子薄荷桔梗連翹辛夷黃芩山梔杏仁甘草木通詒按語云耳聾治肺觀此信然鄧評當知耳聾耳鳴之不關肝腎虛者絶少見也少陽之脈循耳外走耳中是經有風火則耳膿而鳴治宜清散薄荷連翹甘菊芍藥黃芩刺蒺藜甘草木通詒按案既老當方亦清靈鄧評看病如此熟悉有意到筆隨之勢孫評風火為患必有腫痛如不腫痛已有虛象日久則肝腎陰虛宜用六味磁朱之類以滋養之腎虛齒痛入暮則發非風非火清散無益加減八味丸每服三錢鹽花湯下詒按立方精到鄧評識見高超直如老吏斷獄孫評齒痛屬腎虛者每挾肝陽上升宜參入清肝之品如天冬石斛之類腳氣門厥陰之邪逆攻陽明始為腫痛繼而腹疼胸滿嘔吐此屬腳氣衝心非小恙也擬外台法冶之犀角檳榔茯苓枳實杏仁橘紅半夏木通木瓜鄧評能用古而不疑者誠火候工深胸有成竹孫評檳榔導遲下行最有巧思色赤者可入連柏之類再診半夏木瓜廣皮蘆根枳實茯苓竹茹枇杷葉鄧評轉方輕鬆與前方意同而藥異詒按腳氣一證前人歸入類傷寒中必憎寒壯熱病與傷寒相似甚則有衝心之患敢謂之重證外台有大犀角湯及風引湯後人有雞嗚散等方均為專治腳氣之重劑乃今時所謂腳氣者則以腳膝酸軟而腫者謂之濕腳氣不腫者謂之乾腳氣專用防己木瓜牛膝薏米等風濕之藥治之與前人所稱者大相徑庭學者不可不辨孫訐前人之法及今時所治如有精義兼參可也學者不可偏廢遺精門遺精無夢小勞即發飢不能食食多即脹面白唇熱小便黃赤此睥家濕熱流入腎中為遺滑不當徒用補澀之藥恐積熱日增致滋他族萆薢砂仁茯苓牡蠣白朮黃柏炙草山藥生地豬苓詒按此等證早服補澀每多愈服愈甚者先生此案可謂大聲疾呼鄧評認題清楚立方尉貼非若近世之醫或因遺精無夢而峻用補澀或以濕熱內留而專事通利凡其弊與此病適相同也孫評此人必身強色蒼今因病而面白耳再診眼藥後遺滑已止唇熱不除睥家尚有餘熱故也前方去砂仁黃柏加川連苦參詒按唇熱屬脾鄧評循理用藥自能應手加減亦中肯綮少陰為三陰之樞內司啓閉虛則失其常矣法宜填補少陰或通或塞皆非其治六味丸去瀉加菟絲子沙苑杞子詒按此補腎之乎劑可以常服無弊鄧評重在補而不重在塞可謂至理至情孫評填補之法似宜從葉氏有情之品遺精傷腎氣不收攝入夜臥著氣衝上膈腹脹呼吸不通竟夕危坐足跗浮腫清冷小便漸少此本實先撥枝將敗矣難治之證也都氣丸加牛膝肉桂詒按此陰陽兩損氣不攝納之重證舍此竟無良法然亦未能必效也鄧評本虛而病重至此難為力矣區區丸藥烏能有濟且恐不得下咽耳陰虧陽動內熱夢泄六味丸加黃柏砂仁詒按六味合封髓法也亦妥貼易施鄧評腎虛濕熱當用此法為準小便門兩尺軟弱根本不固小便渾濁病在腎臟久久不愈則成下消六味丸加天冬麥冬杞子五味子詒按方法穩切鄧評小便渾濁絶不犯分利治法惟憑之於脈耳孫評此症必小便頻而且數形偉體豐脈得小緩凡陽氣發泄之人外似有餘內實不足水穀之氣不得陽運釀濕下注而為濁病已三四年矣氣墜宜升陽為法非比少壯陰火自灼之病菟絲子茴香車前子韭子蒺藜茯苓覆盆子蛇床子黃魚骨搗丸每服五錢詒按此證當以脾土為主但與溫養下元尚非潔源清流之道又按此與相火下注者不同故用藥如是鄧評老年體豐溫藥以通補尚合題旨菟絲子韭子茴香為升陽之味骨字或是膠字之誤蒺藜即是沙苑子孫評因水穀釀濕故柳云宜以脾土為主然形豐者必肥白而非花黑也相火下注者用封髓法煩勞四十餘天心陽自亢腎水暗傷陽墜入陰故溲數便血不覺管窒痛痹實與淋證不同其中雖不無濕熱而寢食安然不必滲泄利濕宜寧心陽益腎陰宣通腎氣以和之熟地炭人參霍石斛丹皮澤瀉茯苓遠志柏子仁湖蓮肉詒按此治本之方由其論病親切故立方自穩鄧評隨其因就其證合推其源自無遁情方內如細生地元武板尚可參入孫評寧心陽熟地宜易生地泄瀉門惱怒傷中濕熱乘之脾氣不運水穀並趨大腸而為泄腹中微疼脈窒不和治在中焦藿梗川朴神麯澤瀉茯苓陳皮扁豆木瓜詒按此方妙在木瓜一味兼能疏肝須知此意乃識立方選藥之妙又按案中脈窒句不甚明瞭鄧評方實輕靈可喜脈窒即是澀滯之意但何不竟云脈澀為直捷了當痢疾門暑濕外侵經絡則為瘧內動腸藏則為痢而所恃以攘外安內者則在胃氣故宜和補之法勿用攻削之劑恐邪氣乘虛盡入於裏也詒按案語殊妙惜此方之佚也鄧評瘧痢並作宜和養胃氣為至要之言擬升陽益胃湯以補其缺孫評根本深談入理妙論喻西昌用人參敗毒散正因此也大便門氣鬱不行津枯不澤飲食少大便難形瘦脈澀未可概與通下宜以養液順氣之劑治之生地當歸桃仁紅花枳殼麻仁甘草杏仁詒按此氣阻液枯之證擬加鮮首烏鄧評仲景雖有脈澀可下之例究屬澀不宜下者罕見也此方宗通鑿湯而交通之卻勝於原方以其流利不滯也孫評鮮首烏或鮮蓯蓉均是養液潤下妙品大便閉結水液旁流便通則液止矣大承氣湯加甘草詒按據吳鞠通之論用調胃承氣法為穩鄧評加甘草以緩之極妙孫評此證必大腹硬滿按之或痛若不硬滿者即無燥矢閉結不可用承氣再診前方加當歸白芍鄧評想其營分亦傷故加歸芍以養之三診改用制軍加潯桂厚朴鄧評三診想因旁流挾濕非溫不化下血後大便燥閉不爽繼而自利白滑膠黏日數十行形衰脈沉必因久伏水穀之濕府病宜通以溫下法生茅朮制軍熟附子厚朴詒按自利膠滑有因燥矢不行氣迫於腸而脂膏自下者當專行燥矢兼養腸液未可概以濕論也鄧評苟係燥矢而利膠黏其糞仍燥結據繼而自利白滑膠黏當有濕積方極周到孫評此又是一格學者務宜細考虛實病而腹滿痛者亦可參用此法以下寒濕之積利出白滑膠黏為驗脾約者津液約束不行不飢不大便備嘗諸藥中氣大困仿古人以食治之法黑芝麻杜蘇子二味煎濃汁如飴服三五日即服人乳一杯燉溫入薑汁二匙詒按此無法之法也良工心苦矣鄧評中氣既已大困似宜醒運中樞以致開闊如歸芍六君與枳朮丸之類二法均可取用孫注華用康先生遇一伏暑後不飢不食大便燥閉如是者半年餘矣用鮮蓯蓉二兩漂淡合五仁湯梨汁等而愈者想係初起過投苦燥脾陽愈旺而胃陰益傷故用葉氏養胃陰之法與此正同便血不獨責虛亦當責濕所以滋補無功而疏利獲益也茲足痿無力其濕不但在脾又及腎矣當作脾腎濕熱成痹治之萆薢薏仁白朮石斛牛膝生薑詒按案語明確方亦簡當鄧評便血責濕當亦恆見誠閲歷有得之言如但在脾立法猶易並及於腎則較難秉筆也茲就足痿無力尚未可斷定及腎立方固甚簡當擬去生薑增炮薑砂仁歸身如果已及於腎黑地黃丸亦可用也孫評便血屬虛者黃土湯歸脾湯是正法也此因滋補無功而立此方但金匱有遠血近血之分徐氏又有痔血宜清之説不可不考瀉痢便血五年不愈色黃心悸肢體無力此病始於脾陽不振繼而脾陰亦傷治當陰陽兩顧為佳人參白朮附子炙草熟地阿膠伏龍肝黃芩詒按此理中合黃土湯法也方案俱切實不膚鄧評用古合度此即黃土湯加入參也有一種虛黃病陰陽兩傷而小便時清時黃者極可借用此法蓋此病亦類虛黃鼻癢心辣大便下血形瘦脈小而數已經數年黃芩阿膠自芍炙草詒按此陰虛而有伏熱之證方特精簡鄧評此方係黃芩湯加阿膠用古能化有得心應手之趣孫評心辣是熱伏於營見證外瘍門肝經液聚氣凝為項間痰核病雖在外其本在內切不可攻攻之則愈甚矣首烏象貝白芍牛膝甘草牡蠣粉歸身生地丹皮詒按議論平和立方清穩牡蠣粉一味可以化痰消堅鄧評虛體患此誠不可攻斯法極王道精當學者宜取法焉瘍證以能食為要茲先和養胃氣石斛茯苓益智仁穀芽木瓜廣皮詒按案語片言居要惟用藥嫌少力量鄧評柳師所評極是脈虛細數陰不足也鼠漏未愈熱在大腸六味丸加杞子天冬龜板黃柏知母五昧子詒按此肛門漏也名為鼠漏未知所本脈證已屬損象故以滋補肝腎為主鄧評方頗切實專治虛在陰者宜之大都因俗名偷糞鼠成漏故名鼠漏孫注肛門癰俗名偷糞鼠故云鼠漏也婦人門脾虛生濕氣為之滯血為之不守此與血熱經多者不同白朮澤瀉白芍廣皮炙草茯苓牛角腮灰川芎詒按認證既的藥亦絲絲入筘鄧評此與歸脾湯題旨似同而異者腹滿足腫泄瀉此屬胎水得之脾虛有濕白朮茯苓澤瀉廣皮厚朴川芎蘇葉薑皮黃芩詒按方案俱老當鄧評胎水之正法孫評既云胎水川芎動血似屬不宜易白芍覺切胎前喘咳腫滿是脾濕不行上侵於肺手足太陰病也治在去濕下氣茯苓陳皮白芍澤瀉厚朴當歸蘇梗杏仁詒按方頗靈動再加紫菀枇杷葉何如鄧評方論均的當紫菀枇杷葉兼可入肺之營絡散邪孫評喘咳去當歸之辛溫易枳實炒白朮之化濕下氣何如産後惡露不行小腹作痛漸見足腫面浮喘咳此血滯於先水漬於後宜兼治血水如甘遂大黃之例紫菀茯苓桃仁牛膝青皮杏仁山楂肉小川朴延胡詒按用其例而易其藥因原方太峻也孫評桂枝似乎必用之品再可增荊芥穗炭細香附二味再診瘀血不下走而上逆急宜以法引而下之否則沖逆成厥矣歸身滑石蒲黃通草牛膝瞿麥五靈脂赤芍鄧評心靈手敏隨機應變迭經四診絶不拘泥置之活潑潑地非庸工所能及也三診膈寬而腹滿血瘀胞中宜以緩法下之大黃青皮炙草丹皮桃仁赤芍歸身又丸方牛膝一兩赤芍延胡蒲黃五靈脂川芎桂心桃仁各五錢歸尾丹皮各八錢鄧評改用丸藥緩導想其病勢已減詒按迭換四方一層深一層次序秩然恰與病機宛轉相赴胎前病子腫産後四日即大泄泄已一笑而厥不省人事及厥回神清而左脅前後痛滿至今三月餘矣形瘦脈虛食少少腹滿足腫小便不利此脾病傳心心不受邪即傳之於肝肝受病而更傳之於睥也此為五臟相賊與六腑食氣水血成脹者不同所以攻補遞進而絶無一效也宜泄肝和脾法治之白朮木瓜廣皮椒目茯苓白芍詒按此等證情非胸中有古書者不能道隻字鄧評是病吃緊肝脾兩經而能宛轉道達誡屬老手之筆孫評白芍用桂木同炒何如
