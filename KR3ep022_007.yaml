body:
  text: 評選繼志堂醫案下卷常熟曹存心仁伯著嘔噦門上焦吐者從乎氣氣屬陽是陽氣病也胸為陽位陽位之陽既病則其陰分之陽更屬大虛不言而喻恐增喘汗吳萸乾薑人參川附茯苓半夏木香丁香炙草飴糟食鹽陳皮鄧評此病必脈小色白小便清利故可進以溫熱重劑即啟峻湯方法也飴糟或飴糖之誤再診進溫養法四日不吐今晨又作想是陽氣大虛濁陰上泛究屬膈證之根不能不慮其喘汗前方去乾薑加當歸生薑原注陽氣大虛濁陰上泛此病之樞紐也吳萊萸湯補胃陽佐以熟附丁香溫之至矣輔以二陳燥其痰飴糟去其垢更加炙草以和中食鹽以潤下用意極其周密鄧評祛濁止嘔生薑比乾薑為勝謂其屬膈症之根者想必營陰下虧故轉方更加當歸以和營潤燥耳然究不足以監薑附之燥也食則右脅下痛痰自上升升則得吐而安右脈弦滑左關堅急寸部獨小此心氣下郁於肝經脾弱生痰為膈放開懷抱第一要義旋覆代赭湯去薑加生於朮白芥子炙草廣皮竹油另丸方六君子湯加當歸白芍生地蓯蓉沉香白芥子竹油薑汁泛丸原注心氣下鬱脾弱生痰方中於朮乾薑二陳竹油補脾化痰之藥也更有白芥子消膜外之痰旋覆花開心氣之結赭石鎮肝氣之逆用意層層都到鄧評食則右脅下痛是氣被痰阻郁竄於絡赭石重鎮恐非所宜孫評痰不在膜外何得用芥子反耗氣而傷液凡藥病不的切者必反有害古人所以分臟腑經絡上下內外也食則噎痛吐去濁痰而止胸前常悶脈象弦滑舌苔滿白肌肉瘦削之人陰血本虧今陽氣又結陰液與痰濁交阻上焦是以胃脘狹窄也久則防膈乾薑薤白炙草杵頭糠神麯丁香木香熟地白蔻仁歸身白芍沉香牛黃竹油鄧評食下嚥痛痰瘀交阻所致法當兼導痰瘀非滋燥之劑所能建功杵頭糠專治噎膈亦辛熱之品孫評陰血本虧陽氣又結胃脘狹窄何得再用諸多燥熱耗陰損氣乎再診胸前所結之邪原有化意無如陰之虧陽之結尚與前日相等非一兩劑所能奏效乾薑薤白炙草茯苓丁香木香陳皮麻仁旋覆花代赭石歸身白芍杞子牛黃竹油詒按此氣結痰阻之證用藥極周到鄧評加減一二自較前方為勝也嗜酒中虛濕熱生痰痰阻膈問食下不舒時欲上泛年已甲外營血內枯氣火交結與痰相並欲其不成膈也難矣七聖散加歸身白芍薤白代赭石藕汁紅花原注嗜酒者必多濕熱須用竹茹連蔻又易挾瘀參入藕汁紅花薤白辛而兼滑又是一格絕去溫熱剛燥之品先生日惟善用溫藥者不輕用溫藥信然鄧評膈症之源無不由於營血內枯痰火交結所致故宜於溫燥者絕少向患偏枯於左左屬血血主濡之此偏枯者既無血以濡經絡且無氣以調營衛營衛就枯久病成膈然一飲一食所吐之中更有濁痰紫血此所謂病偏枯者原從血痹而來初非實在枯槁也勉擬方每日服人乳兩三次間日服鵝血一二次詒按偏枯已屬難治更加以膈愈難措手矣方祗寥寥兩味而潤液化瘀通痹開結面面都到此非見理真切而又達於通變者不能有此切實靈動之方愚意再增韭汁一味似乎更覺親切鄧評此二味均潤導血液之品人乳偏於潤鵝血偏於導以治血液枯耗之膈實良劑也柳師加味固無不可倘參入竹油薑汁兼導痰濁亦屬相宜孫評此等聯絡法豈時下所能非精於書卷歷練廣闊者萬不能辦脈形細澀得食則噎胸前隱隱作痛瘀血內阻胃絡不通此膈證之根歸須白芍白蜜蘆根瓦楞子醋煅韭汁人參桃仁詒按此瘀血膈也脈證均合用藥亦專注在此鄧評認病既真立方亦切擬再參牛乳薑汁瘀血挾痰阻於胸膈食則作痛痛則嘔吐右脈澀數惟左關獨大且弦是痰瘀之外更有肝經之氣火從而和之為患乃膈證重候慎之歸身白芍蘆根瓦楞子紅花絲瓜絡橘絡竹油白蜜原注以上三病皆瘀膈也第一證從偏枯中想出血痹用人乳以潤其枯燥鵝血以動其瘀血此證非特剛劑不受並柔補之藥亦不可投萬不得已而為此法仍是潤液化瘀之意柔和得體第二證從胸前隱痛而知其瘀阻胃絡用桃仁醋煅瓦楞子以化其瘀此證血瘀液涸無論乾薑不可用即薤白辛溫通氣亦與此隔膜然非辛不能通計惟用濡潤之韭汁以通之蜜蘆歸芍奠安營分以其液涸也此病不見痰所以純從濡潤去瘀之法第三證見痰所以瓦楞子紅花外又加竹油一味鄧評噎膈之症其肝經之氣火理必相兼特有微甚不同耳方卻輕清可喜以上三案同屬瘀膈惟其中稍有異者第一症偏於血液枯耗第二症為瘀血而兼氣弱者此第三症則瘀血而更兼肝火亢盛矣學者苟能一隅三反則自可變化無窮耳孫評分析精細所謂如分水犀者此也濕熱生痰阻於胃脘得食則噎噎甚則吐此膈之根也半夏陳皮川連竹茹白蔻生薑雞距子枇杷葉楂炭原注指為濕熱想因苔帶黃色也用七聖散者中有橘皮竹茹湯又有溫膽湯兩方在內更加枇杷葉泄肺查炭消瘀雞距子消酒積總不外濕熱二字此猶是膈之淺者鄧評此病必係酒客胎質濁膩故用藥如是食已即吐脈弦苔白便溏溺清濕痰內勝被肝經淫氣所沖旋覆花代赭石陳皮半夏萊菔子生薑茯苓雪羹湯鄧評食已即吐尚非朝食暮吐終有火也仍可薑連並用參入方內雖則濕痰內勝但須薑重於連即為合法再診吐逆大減胸前尚痞暖氣不舒旋覆代赭湯雪羹湯詒按此證陰液未曾大虧通陽開結專理其痰痰降而嘔逆自減尚非證之重者鄧評前方已合病機故其吐逆大減惟仍胸痞噯氣不舒究屬痰氣內結務須宣痹非赭石重鎮所宜咽仲介介如有炙臠痰氣交阻為患蘇葉半夏川朴茯苓竹茹陳皮石決明牛膝原注此咽膈也痰結於肺用四七湯以理其氣合溫膽湯以化其痰去枳實換牛膝者欲其達下焦也鄧評金匱四七湯專能主治此症惟氣必挾火而逆今加味最為中窾得食多噦許氏法主之丁香陳皮川朴半夏茯苓甘草枇杷葉茅根原注此枇杷葉散去香薷一味也此另是一種暑邪挾寒飲內停或食瓜果致中氣不調而嘔噦者不當深求之裏也去香薷者無表證也鄧評此痰氣阻遏於胃故方以溫胃祛痰理氣用枇杷葉茅根者恐內有鬱熱也更藉以宣達肺氣食已即吐本屬胃病宜用溫通然口雖乾苔反白將吐之時其味先酸此必有肝火鬱於胃府似與胃家本病有間左金丸合溫膽湯雪羹湯詒按辨證精細用藥妥切鄧評將吐而先有酸味是有肝火之著眼處苦降辛通正合此病濕病門脾陽不足濕濁有餘少納多脹舌白脈遲茅朮理中湯合四七湯詒按此濕滯而兼氣鬱之證鄧評此症純乎痰濕傷陽之象故用藥亦惟溫通毫無顧忌痹氣門胸痛徹背是名胸痹痹者胸陽不曠痰濁有餘也此病不惟痰濁且有瘀血交阻膈間所以得食梗痛口燥不欲飲便堅且黑脈形細澀昨日紫血從上吐出究非順境必得下行為妥全瓜蔞薤白旋覆花桃仁紅花瓦楞子玄明粉合二陳湯詒按方法周到不蔓不支擬加參三七磨沖胸痹證前人無有指為瘀血者如此證納食梗痛乃瘀血阻於胃口當歸入噎膈證內論治矣鄧評得食梗痛便堅脈澀卻已能歸入膈門惟如此等方法自有膽識心痛徹背是名胸痹久而不化適值燥氣加臨更增咳嗽咽乾痰中帶紅脈形細小治之不易瓜萎薤白枳殼橘紅杏仁桑葉枇杷葉詒按既因燥氣加臨痰紅嗌乾似當參用清潤如喻氏法擬加旋覆花南沙參麥冬桑皮鄧評咽乾痰紅或以胸痹之證本有肝火鬱竄於其間未必新感燥氣擬加丹皮脘腹痛門心痛有九痰食氣居其三三者交阻於胃對痛時止或重或輕中脘拒按飲食失常痞悶難開大便不通病之常也即有厥證總不離乎痛極之時茲乃反是其厥也不發於痛極之時而每於小便之餘陡然而作作則手足牽動頭項強直口目歪邪似有厥而不返之形及其返也時有短長如是者三矣此名癇厥良以精奪於前痛傷於後龍雷之火挾痰涎乘勢上升一身而兼痛厥兩病右脈不暢左脈太弦蓋弦則木乘土位而痛又挾陰火上衝而厥必當平木為主兼理中下次之蓋恐厥之愈發愈勤痛之不肯全平耳川椒七粒烏梅三分青鹽一分龍齒三錢楂炭三錢神麯三錢萊菔子三錢延胡錢半川楝子錢半青皮七分橘葉一錢竹油一兩詒按厥發於小解之時其厥之關於腎氣可知矣用藥似宜兼顧立方選藥熨貼周到鄧評中脘拒按痞悶便秘究屬不通之實象惟肝氣久郁則陽內亢而化火生風風陽升動則厥且癇矣今轉發於溺餘者以肝脈絡陰器溺則肝陰虛而風陽乘機陡動耳始而鬱極故痛厥繼則動甚故癇厥橫乘於中則痛直升於上則厥法當用酸苦辛藥以制肝之旺氣疏肝之鬱氣清火化痰並具於內故此方合病焉惟連柏薑萸尚可參用也孫評此等清靈貼切之方豈能易得惟神麯宜易薑夏柳氏云腎宜兼顧一定之理如代赭石蒺藜之類再診據述厥已全平痛猶未止便黑溺黃右脈反弦想諸邪都合於胃也胃為腑以通為補懸擬方芍藥青皮陳皮黑梔川貝丹皮楂肉竹油萊菔子青鹽延胡詒按諸邪都合於胃從右脈之弦看出是病機緊要處鄧評便黑者抉瘀故也或為肝火所煅爍理亦有之然其糞必堅燥也進酸斂而右脈反弦是肝之旺氣已減故胃脈得較暢也當屬佳象此方更覺松靈活潑三診痛厥已平尚有背部隱疼之候腰部亦疼氣逆咳嗆脈形細數想肝腎陰虛氣滯火升肺俞絡脈因之俱受其傷也四物湯旋覆花湯二母雪羹湯鄧評見證是肝家之氣火留竄於絡脈宜加山梔鉤鉤絲瓜絡以清經絡之鬱火更宜薑汁以反佐之四診腰脊尚疼咳嗽不止苔白底紅脈形弦細是陰虛而挾濕熱也豆卷蒺藜黑梔川芎歸身麥冬沙參甘草雪羹湯半夏原注此素有痰積又腎虛而相火上衝於胃胃中痰飲阻滯竅隧癇厥見焉第一方用泄肝和胃法以化其阻滯合金鈴子散以清肝火加查曲以消食菔子竹油以化痰厥平而痛未愈故第二方用景嶽化肝煎以代金鈴子散兼以化痰第三方通其絡第四方仿白蒺藜丸專於治痰詒按此證得力全在前兩方疏肝化痰絲絲入筘鄧評苔白痰也底紅火也是火被痰遏之象山梔須用薑汁炒乃妙麥冬沙參尚屬勉強脾氣素虛濕鬱難化而木之郁於內者更不能伸所以酸水酸味雖有減時而灰白之苔終無化日無怪乎脈小左弦脘脅脹痛也此臌脹之根毋忽附子理中湯合二陳湯加川朴香附川芎神麯詒按似可參用柴芍輩於土中泄木鄧評脈既左弦附子終怕礙肝參用柴芍自合金鈴子散亦所需要病分氣血不病於氣即病於血然氣血亦有同病者即如此病胃脘當心而痛起於受饑得食則緩豈非氣分病乎如獨氣分為病理其氣即可向安而此痛雖得食而緩午後則劇黃昏則甚屬在陽中之陰陰中之陰之候其為血病無疑況但頭汗出便下紫色脈形弦細而數更屬血病見證但此血又非氣虛不能攝血之血乃痛後所瘀者瘀則宜消虛則宜補消補兼施庶幾各得其所治中湯合失笑散另紅花玄明粉為末和勻每痛時服二錢原注分明兩病一是脾虛氣分不能暢達而痛得食則緩宜補可知然人每疑痛無補法者以痛必有痰氣凝滯也先生用理中以補脾即加青皮陳皮以通氣至便紫脈弦數肝家之血必有瘀於胃脘者此時不去其有形之瘀滯痛必不除病根不拔也此種病世醫不能治往往以為痼疾不知不去瘀則補無力徒去瘀則脾胃更傷先生則雙管齊下立案清沏度盡金針非名家惡能如是鄧評其痛起於受饑得食則緩是中虛無疑非甘溫補中以緩肝不可惟便下紫黑則為血瘀所致自宜兼導方案朗若眉列洵非老手不辦至於但頭汗出者必有肝陽鬱冒金鈴白芍蒺藜等尚可加入末藥須用參湯過下方不戕伐中氣孫評理中加青陳皮名治中湯用法頗巧胃脘當心而痛少腹氣升嘔吐酸苦痰涎脈形弦數顯係寒熱錯雜之邪郁於中焦肝屬木木乘土位所有積飲從此沖逆而上病已年餘當以和法附子理中湯加川連薑汁炒川椒黃柏歸身細辛半夏桂枝烏梅肉原注此連理湯合烏梅丸吐涎酸苦是胃中錯雜之邪用薑連半夏以化之逆沖而上之肝氣用烏梅法以和之詒按半夏反附子在古方多有同用者然可避則避之亦不必故犯也鄧評據其嘔吐酸苦脈形弦數則肝膽鬱火必盛雖屬寒熱錯雜附子究恐有礙鬱火若竟服烏梅丸則有礙孫評少腹氣升當用旋赭以鎮之恐其肝氣上逆而散也胃脘當心而痛脈形弦數舌絳苔黃口乾苦小便赤一派火熱之象氣從少腹上衝於心豈非上升之氣自肝而出中挾相火乎化肝煎芍青梔澤丹陳貝鄧評確係熱厥心痛宜與金鈴子散合用或可參清肝蠲痛飲則較能著力也孫評景嶽法之所以不善者其立方多夾雜之故也如名為化肝何得用貝清肺若用連則名實相符矣脘痛下及於臍旁及於脅口乾心悸便栗溺黃脈弦而數此鬱氣化火也化肝煎合雪羹原注此景嶽化肝煎也必肝有實火者可用口乾脈數溺黃是其的證也鄧評鬱火脘痛每多挾痰故參雪羹於化肝煎內中焦失治為痛以治中湯為法是正治也不知中焦屬土土既虛不能升木木即郁於土中亦能作痛以逍遙散佐之更屬相宜治中湯逍遙散雪羹詒按此木鬱土中之病立方妥貼易施鄧評為木鬱而佐以逍遙散者其脈必兼弦象可知雪羹參入方內似屬不妥瘀血腹痛法宜消化然為日已久脾營暗傷又當兼補脾陰為妥歸脾湯去耆朮加丹參延胡詒按此病用補是專在痛久上著眼鄧評立方如是當必有怔忡不寐之證當臍脹痛按之則輕得食則減脈形細小而數舌上之苔左黃右剝其質深紅中虛伏熱使然治中湯加川連雪羹詒按此等證不多見立方亦甚難須看其用藥的當處鄧評此必連重於薑方不有礙伏熱孫評苔剝是陰已受劫當參白芍合戊已意少腹久痛未痊手足攣急而疼舌苔灰濁面色不華脈象弦急此寒濕與痰內壅於肝經而外攻於經絡也現在四肢厥冷宜以當歸四逆湯加減當歸小茴香炒白芍肉桂炒木通半夏薏仁防風茯苓橘紅詒按寒濕入於肝經病與疝氣相似治法亦同鄧評此營虛挾寒邪立方殊平妥再診少腹之痛已止惟手冷攣急未愈專理上焦蠲痹湯防羌薑黃歸苠草赤芍去防合指迷茯苓丸鄧評營氣未復上焦之寒痰未解方法轉換得當少腹作痛甚則嘔吐脈右弦左緊俱兼數舌苔濁膩口中乾苦頭脹溺赤此濕熱之邪內犯肝經挾痰濁上升所致泄之化之得無厥逆之虞為幸旋覆花湯三子養親湯蘇子白芥子萊菔子金鈴子散另烏梅丸詒按旋覆金鈴以止痛三子以除痰更用烏梅丸以泄肝所以面面都到也鄧評此肝經氣火與濕熱交阻似不如金鈴子散合清肝蠲痛飲為善治再診嘔吐已減白苔稍化頭脹身熱亦緩惟腹之作痛便之下痢脈之緊數以及口中之乾苦小水之短赤尚不肯平肝經寒熱錯雜之邪又挾食滯痰濁為患也仍宜小心葛根黃芩黃連湯加延胡楂炭赤苓陳皮萊菔子另烏梅丸詒按想因下利較甚故用藥如此轉換鄧評此病內挾濕熱烏梅丸似可不必三診餘邪流入下焦少腹氣墜於肛門大便泄小便短舌苔未淨更兼痔痛四苓散合四逆散加黃芩黃柏木香詒按至此而內伏之濕熱從兩便而外泄矣鄧評前兩方斂降太過故有此餘邪下陷之象是方堪稱熨貼倘再參入防風白芍以疏泄厥陰似較周到肝脈布於兩脅抵於少腹同時作痛肝病無疑肝旺必乘脾土土中之痰濁濕熱從而和之為患勢所必然逍遙散柴荷苓朮歸芍草加梔丹合化肝煎詒按此治肝氣脅痛誠然合劑案所云濕熱痰濁雖能兼顧嫌未著力鄧評香附旋覆等尚宜增入化肝煎內有梔丹不必再加於逍遙散下氣結於左自下而盤之於上脹而且疼發則有形解則無跡甚則脈形弦數口舌乾燥更屬氣有餘便是火之見證急須化肝化肝煎詒按凡肝氣上逆者多挾朮火為病故化肝煎為要方中脘屬胃兩脅屬肝痛在於此忽來忽去肝胃之氣滯顯然已曆二十餘年愈發愈虛愈虛愈痛氣分固滯血亦因之乾澀也推氣為主逍遙散佐之肉桂枳殼片薑黃延胡炙草逍遙散鄧評擬再加通絡之品再診病勢不增不減診得左脈細澀右部小弱氣血久虛致使營衛失流行之象非大建其中不可肉桂歸身白芍川椒飴糖乾薑陳皮炙草砂仁原注前方嚴氏推氣散也先生謂左脅作痛是肝火用抑青即左金以瀉心平木右脅作痛是痰氣用推氣法以理氣化痰按薑黃入脾能治血中之氣蓬朮入肝能治氣中之血鬱金入心專治心胞之血三物形狀相近而功用各有所宜詒按久病中虛故轉方用大建中法鄧評想必痛時喜按故可大建其中總嫌少通絡之品抑青者用吳萸炒川連仍去萸是也腹左氣攻脹痛上至於脘下及少腹久而不愈疝瘕之累也痛極之時手足厥冷嘔逆當從肝治當歸四逆湯歸桂芍草辛通薑棗合二陳湯吳仙散吳萸茯苓詒按病偏於左更加支厥此肝病確據也鄧評此寒入厥陰之候其脈當見遲細弦象再診痛勢已緩尚有時上時下之形邪未盡也吳仙散合良附散二陳湯去甘草加當歸小茴香炒白芍肉桂炒鄧評積寒漸解尚有時上時下之形者肝之厥氣未和也疝氣門狐疝臥則入腹立跟出也補中益氣湯另金匱腎氣丸合小安腎丸香川烏茴香椒目川楝熟地原注疝氣一症論其本末有不由氣虛而濕濁隨之下陷者故以補中益氣湯為主方俾脾之清氣得以上升則小腸膀胱之濁氣自然下降又有挾勞倦外感而發者方中柴胡借用亦妙寒加溫藥濕火甚加知柏詒按此因下墜過甚故用補中以升清氣其實亦非治疝正法也鄧評金匱治狐疝出一蜘蛛散以攻陰毒之邪取以毒攻毒之義今挾脾腎氣虛故備方如此可見良工治病應變無窮矣孫評柳氏指點確切可見治病不宜拘執脾宜升主健胃宜降主和此病氣升而嘔胃不降也疝氣下墜脾不升也而所以升降不調者由脾虛下陷濕痰中結而沖逆於胃脘也理其中陽則上下白調六君子湯加乾薑青皮小茴香萆薢九香蟲詒按此因嘔吐有上逆之勢故不用補中而變法治之又按此證若用烏梅丸則上下均在治中緣痛嘔疝氣均由肝病故也鄧評脾胃之升降不調者不獨由於濕痰中結抑且因乎肝邪內擾也再診治中胃痛已和疝氣仍然下墜擬於補脾之外佐以補腎使其火土合德則陽旺於中而生氣勃然不升自升矣香砂六君丸合金匱腎氣丸詒按此證從肝經著意似較靈動專補脾腎猶恐涉於果實鄧評胃痛已平溫中之效疝氣仍然下墜則失於治肝故也雖佐補腎猶未盡然狐疝原屬肝經之濕隨氣下陷脾陽必衰而今夏多食冷物陽氣又被所遏苔白不乾指冷脈小右睾丸脹大當以溫散大順散千薑肉桂杏仁甘草加當歸木香荔枝核詒按此因生冷傷中故用大順亦非治疝正法鄧評純屬陰寒見象當以溫散無疑如腎氣理中以及補中益氣丸類亦可隨宜輔用瘕癖門寒氣客於腸外與血沫相搏臍下結瘕脹大下墜不時作痛痛則氣升自汗脈形弦澀此為臌脹之根毋忽吳萸茯苓當歸川楝予橘紅烏藥香附楂肉詒按既因於寒似可再加溫通之品既與血沫相搏似宜兼和營血鄧評似尚可加桂芍延胡牡蠣之屬瘕聚脘中久而不化變為攻痛升逆妨食便堅理之不易川楝子延胡當歸白芍陳皮鱉甲紅花血餘茯苓牛膝丹皮詒按此病之偏於血分者故方中兼用疏瘀之品特所敘病情尚無瘀血的據鄧評妨食便堅將有成噎膈之慮矣如瘕聚中脘必當兼理痰氣專於導血尚未盡然最虛之處便是容邪之處肝絡本虛隱癖久踞中宮又弱隱癖潛入其間欲治此病培補肝脾為主和化次之歸芍六君子湯加雞內金另小溫中丸詒按此亦虛實兼治之法然而收效甚難鄧評凡隱癖僭於中宮其脾土必弱故宜培補兼和化之法今更參用小溫中丸想有成臌之患脈來細而附骨者積也已經半載不過氣行作響而已而其偏於脅下者牢不可破是寒食挾痰阻結於氣分也此等見證每為脹病之根理中湯加神麯茯苓半夏陳皮麥芽旋覆花枳殼歸身鄧評積於脅下邪在肝絡擬加金鈴延胡內桂以平肝散結再診脅下隱癖牢不可破其氣或逆或攻必溫化以絕脹病之根理中湯合二陳湯加川朴枳殼神麯竹油旋覆花白芥子詒按議論則見微知著用藥則思患豫防此為高識鄧評此症更必有痰飲留積白芥子亦為要品惟竹油陰寒似屬不妥苟其正氣未衰控涎丹當用也食入而痛是有積也積非一端就脈弦數二便黃熱乾咳不爽面黃苔白言之必有濕熱痰食互相阻滯經年累月無路可出無力以消茅朮川芎楂炭神麯川貝山梔赤苓枇杷葉露杏仁詒按此越鞠丸加味也愚意再加白芍枳實鄧評據此症脈是火被寒鬱為鬱火腹痛之候然食入而痛或有蛔動於中也以並無食積見端耳擬加椒萸梅連之屬孫評食入而痛痛在胃也縱使有痰亦當從脾胃著想如二陳之類何得用貝杏治肺寒熱後脘左隱癖作疼脈形弦細舌苔濁厚濕熱痰食交相為患二陳湯去甘草合雞金散砂沉陳雞香櫞加蘇梗楂肉青皮詒按此尚是初起實證故用攻消法取效立方亦極平穩鄧評起於寒熱之後內有留邪可知惟癖疼偏左脈細兼弦此濕熱痰食之中更必挾肝氣為患也宜參金鈴子散兼平其肝再診脘左之隱癖漸消舌上之濁苔漸化仍宗前法參入補脾之品前方去蘇梗加於朮炙草另服水泛資生丸鄧評參入健脾之品以消餘留之積是為合法隱癖踞於脅下肝經病也化肝煎詒按此亦初起之病想由肝鬱而起故專從泄肝立法但恐藥輕不能奏效耳原注前證濕熱居多此證肝火為重相機而治各有條理鄧評如此分經辨絡確無移易化肝煎未始不合尚恐不足以消其隱癖再合金鈴子散可也瘧久邪深入絡結為瘧母瘧母在左自下攻逆加以右脅結癖上下升降俱窒無怪乎中宮漸滿理之不易雞金散加枳殼薑黃白芥子竹油另鱉甲煎丸原注左屬血屬肝瘧邪滯於血中主以鱉甲煎丸右屬氣屬胃或痰或食主以雞金推氣加竹油白芥子詒按此兩層兼治之法鄧評左右結痞最易延成中滿而迎頭施治理路肅清腫脹門營血本虧肝火本旺責在先天乃後天脾氣不健肝木乘之所進飲食生痰生濕貯之於胃尚可從嘔而出相安無事遲之又久滲入膜外氣道不清脹乃作焉脾為生痰之源胃為貯痰之器若非運化中宮兼透膜外則病勢有加無已成為臌病亦屬易易夫脾統血肝藏血病久血更衰少不得不佐以和養古人之燥濕互用正為此等證設也歸芍六君子湯去參草加白芥子萊菔子車前子川朴蘇子腹皮竹油雪羹詒按用藥虛實兼到親切不浮鄧評久嘔之後痰飲滲透膜外致成臌脹者甚眾此案論病透徹立法精當陳朴芥菔大腹等即景嶽廓清飲能治濕熱痰飲之脹諸腹脹大皆屬於熱諸濕腫滿皆屬於脾脾經濕熱交阻於中先滿後見腫脹膚熱微汗口渴面紅理之不易防己茯苓石膏腹皮陳皮鄧評此金匱之木防己湯加減其所以去桂枝之溫者為熱多故也然觀其轉方仍諸恙不減或者須藉桂枝以溫通氣化始能效耶若謂病重藥輕再加鮮地知麥等味恐究非脹病所宜既云濕滿三焦何不竟用子和桂苓甘露飲治之孫評解書確合再診濕熱滿三焦每多腫脹之患如邪勢偏於下焦小便必少前人之質重開下者原為此等證而設然此病已久尚盛於中上二焦胡以中上兩焦法施之諸恙不減或者病重藥輕之故將前方制大其劑竹葉石膏鮮生地麥冬知母半夏五皮飲原注此十二歲女子腹暴脹大面跗俱腫面紅口渴小便黃此證屬熱所見甚少詒按此等方治脹病非有卓見者不能存之為臨證者增二見解脘腹膨脹二便失調經絡痠痛四肢無力脈形弦細舌苔白膩而厚此濕邪內鬱當用苦辛宣洩茅朮川芎香附黑梔神麯腹皮川朴赤苓澤瀉蔞皮詒按此亦濕鬱而化熱者故兼用梔萎清泄之品鄧評純乎濕勝見端何以知其濕中有熱兼參梔萎不用薑桂讀案語二便失調其眼在小便黃少可知蓋此等證最易誤作寒濕醫而用熱藥脈細而弦是脾弱而兼木鬱苔白而膩知濕勝且有熱蒸俾濕熱化解脾健木達則諸恙向安矣再診諸恙向安肢體無力健脾為主香砂六君子湯原注此越鞠改方而加胃苓之半本方治濕鬱其眼在舌苔白膩而厚在所必效余每藉以治黃疸亦效挾痰頭項痛亦效孫評越鞠治疸想係氣濕熱三者交阻而成之症若頭項痛挾痰者必兼鬱乃效且須加滌痰之味方妥脾主濕濕因脾虛而鬱鬱蒸為熱所以隱癖僭逆中宮大腹脹滿納少便溏面黃溺赤咳嗽身熱時作脈息弦細極易成臌越鞠丸附蒼芎曲梔雞金散加赤苓青蒿黃芩川朴原注此越鞠證而兼隱癖濕化熱者故合雞金消癖芩蒿化熱原注以上越鞠丸證大約越鞫治無形濕熱之痞從瀉心化出雞金治有形食積之癖從陷胸化出且如脘痛門中鬱痰作痛脈數多渴者用清中蠲痛湯山梔薑汁炒乾薑川芎童便炒黃連薑汁炒蒼朮童便浸切麻油炒香附醋炒神麯薑汁炒托紅薑棗治中脘火鬱作痛發即寒熱中以寒熱為主即越鞠加薑連橘棗可知此方治氣火濕食血五者之鬱信極妙矣說者以梔主火朮主濕香附主氣芎主血曲主食分為五鬱似可不必正如五音必合奏而始和也鄧評大腹脹滿臌之候也咳嗽身熱勞之象也乃營衛陰陽並傷用藥則甯偏於燥未可偏滋如歸芍以養營制木亦正不妨添入耳孫注雞金散砂陳沉雞香櫞大腹脹滿已經四十餘日近來氣更急促足跗浮腫溺黃口乾脈形弦數濕熱之邪因氣而阻因食而劇理之不易廓清飲廓清飲用芥陳朴枳澤茯苓同大腹菔子生研壅滯通氣逆脹滿均堪服去芥枳加黑梔豬苓蘇梗川連香附原注溫藥留手處在口乾溺黃四字鄧評大腹脹滿是病也溺黃口乾是證也脈形弦數是脈也憑證脈以推求則是病之係乎何邪自無遁情矣脾虛則濕熱內鬱為臌從去郁陳莝例治之廓清飲去芥加蘇葉香附冬朮另小溫中丸朝暮各錢半詒按腹滿由於脾之不運其所以不能運者痰也濕也濁也氣也瘀也故方中多用疏氣化痰清利濕熱之品鄧評此方亦僅疏化濕熱胡必拘拘於蕪花戟遂等峻以攻導歟用廓清法去芥子者想病不重於痰飲故也大腹主脾腹大而至臍突屬脾無疑然脹無虛日痛又問作舌苔薄白脈息沉弦見於經期落後之體顯係血虛不能斂氣氣鬱於中寒加於外而脾經之濕因而不消逍遙散合雞金散加香附詒按沉弦與沉細不同沉細色萎則理中證此證拈住鬱字散用逍遙鄧評脈息沉弦尚非血虛不能斂氣之比是病之大概不越中寒木鬱立方之大意亦不外乎溫中達木擬加吳仙散可也單腹脹脾氣固虛久則腎氣亦虛大便溏者氣更散而不收矣所用之藥比之尋常溫補脾腎者當更進一層然用之已晚惜乎附桂理中湯加肉果當歸牡蠣木瓜茯苓生脈散詒按案云較之尋常溫補更進一層觀方中所加肉果當歸是啟峻法也鄧評虛寒腹脹固當責之脾腎至偏於腎虛或偏於脾虛須觀其脹處之甚於小腹抑或脘腹矣參入生脈者想其舌光苔微也大腹脹滿便溏舌苔冷白乾喜熱飲膚熱脈數脾陽大虛無力運化濕濁而成臌也理之棘手附桂治中湯加木瓜草果當歸鄧評此陽虛挾濕熱之候固宜理中湯為急然後兼清濕熱層次未嘗不合予擬東垣升陽除濕法參入五苓為善然不治者多矣再診進溫補四劑腹脹浙和其邪從下焦而泄所以大便作瀉然膚熱未退小便未長乾欲熱飲胃不思穀白苔已薄舌質轉紅中陽稍振濕熱未清理苓湯原注舌苔冷白是桂附把柄四劑而能便泄邪從下出中陽尚好脾氣尚未衰盡更以舌質轉紅知濕熱壅甚所以轉方減去附桂參朮己足扶脾外加四苓驅濕而己大便作瀉小水又長肝脾腎三經即有陰邪亦可從此而消何以隱癖尚踞於中腹脹不和是陽虛也四君子湯加黃耆當歸桂枝附子陳皮肉果沉香乾薑牡蠣鱉甲雞內金原注此啟峻湯也附子理中加黃耆當歸肉罘比附子理中更進一層鄧評陰邪之所以不消陽虛無力以運之也於峻補之內存疏啟之意故日啟峻太陰腹滿寒濕有餘真陽不足詠弦下體不溫乾不欲飲妨食氣短其勢頗險擬以溫通化濕法附子茅朮治中湯加川朴半夏詒按此亦通補兼施之法鄧評脈弦妨食氣短似乎寒飲之內更挾木氣之鬱溫補元陽浮腫脹滿有增無減陽之衰也極矣臍平脈遲之候非溫不可非補亦不可然溫補亦不見長蓋下泄者腎更傷耳附子理中湯合四神丸來復丹詒按此法較腎氣丸更進一層鄧評浮腫脹滿每每有濕熱風氣之邪溫補不合者恒多此病何不進商禹餘糧丸太陰腹滿寒濕使然陽若不旺勢必成臌附子理中湯加川朴大腹皮澤瀉豬苓詒按此脾陽不振寒濕停滯之證故用溫化法鄧評寒濕不化必用溫熱通陽譬若離照當空陰霾始散也中滿者瀉之於內其始非不遽消其後攻之不消矣其後再攻之如鐵石矣此病雖不至如鐵石而正氣久傷終非易事也治中湯五苓散原注以上皆理中加減法也因記當年侍先生時問理中之變換如何曰理中是足太陰極妙之方加以中宮之陽氣不舒用乾薑者取其散少腹之陽氣下陷用炮薑者取其守其變換在大便之溏與不溏濕甚而無汗者用茅朮濕輕而中虛者用冬朮其變換在舌苔之濁與不濁此本方之變換也設脾家當用理中而胃家有火則古人早定連理一方矣設氣機塞滯古人早定治中一方矣設脾家當用理中而其人真陰虧者景岳早有理陰煎矣其腎中真陽衰者加附子固然矣其衰之甚者古人又有啟峻一方矣此外加木瓜則名和中必兼肝病加枳實茯苓治胃虛挾實古人成方苟能方方如此用法何患不成名醫哉因附錄之以為用理中之法鄧評單單腹脹脾陽必傷雖有實邪慎勿速用攻瀉孫評說得透徹可法諸濕腫滿皆屬於脾因勞倦所傷內濕與外濕合而為一郁於土中致太陰之氣化不行治病必求其本先以實脾法川附於朮茯苓陳皮草果大腹皮烏藥木瓜澤瀉詒按案雲實脾而方中仍屬溫通之品此非實脾正法也鄧評此俾脾陽運而足以化濕之意畢竟濕兼寒者相宜孫評腫滿因此而起者居多初起痞滿繼增腹脹臍突筋露足跗浮腫大便溏泄此濕熱內壅中虛不化勢從下走也用藥最為棘手且從口苦舌紅小便短赤立方桂心茯苓豬苓白朮澤瀉石膏寒水石滑石詒按此河間甘露飲也用五苓以降濕三石以清熱鄧評此等方法非洞徹病情者則不可浪用必須脈形洪數者始能放膽用之恐其濕熱未去而中陽已憊也孫評口苦舌紅溺短是陰已大傷化源欲絕豈宜再以三石沉暴瀉其實火總之如此險徵挽回非易雖有良法終於無濟咳而腹滿經所謂三焦咳也苔黃乾苦臥難著枕肢冷陽縮股痛囊腫便溏溺短種種見證都屬風邪濕熱滿布三焦無路可出是實證也未可與虛滿者同日而語桑皮骨皮苓皮蔞皮大腹皮薑皮防己杏仁蘇子葶藶子車前子詒按濕熱壅盛脾不輸運肺不肅降故立方專用疏化仿五皮五子法鄧評肢冷陽縮濕熱阻遏其陽氣故也斷其為濕熱實證者全在苔黃乾苦見出蓋一病有一病之關鍵不可移易之理此方選藥亦善中陽不足寒濕有餘脘痞納少舌白便溏脈細小法當溫化即平為妙茅朮理苓湯加大腹皮雞內金葛花川朴鄧評見證純乎寒濕宜於溫化無疑方用葛花必係酒客再診溫化不足以消脹滿陽之虛也甚矣重其制以濟之茅朮錢半川附錢半乾薑餞半黨參三錢肉桂七分防風二錢茯苓三錢五加皮三錢陳皮一錢鄧評進此方而即效足徵第一方尚是病重藥輕凡脹滿係陽虛挾寒者非溫熱大劑不可三診諸恙向安仍守前法以祛留濕川附一錢桂枝一錢黨參三錢生於朮錢半乾薑四分茯苓錢半詒按茅朮改於朮想重濁之白苔已化也此證純以溫化得效所謂陽運則濕自化也隱癖日久散而為臌所以左脅有形作痛大腹漸滿便出紅色垢積更兼脘中因食而痛久吐痰涎帶瘀元氣益虛竟有不克支持之象收散兩難洵屬棘手香櫞皮人中自桃仁泥雞內金炙鱉甲射干牡蠣川貝母陳皮砂仁雪羹詒按別錄謂射干治老血作痛鄧評此乃痰瘀食積錯雜為患再加元氣益虛治之難矣再診大便之紅積已除胃中之痰涎仍泛大腹之脹滿如此何堪磨耐前方去陳貝加瓦楞子延胡丹參鮮藕原注此癖散成臌上下見血分明有瘀消瘀消癖一定之理無如此證元氣大虧不任攻消又不可補乃組織此化瘀化癬不甚克伐之方病雖減半究屬難痊鄧評今紅積已除痰涎仍泛何轉方反去陳貝之祛痰而加延丹之導瘀不無背謬素有隱癖肝脾之不調可知去年血痢於下痞結於中久未向愈大腹脹滿溺赤舌黃脈形弦細而數濕熱內聚脾虛無力以消極易成臌毋忽歸芍異功散加川連川朴木香另枳實消痞丸小溫中丸詒按立方穩實惟歸芍異功似嫌補多消少鄧評此症固必有濕熱留積擬於煎方內增入桃仁楂炭以導之甚則酒製軍亦可參用柳師評語不啻當頭一棒脹者皆在臟腑之外此病之脹不從腹起自足跗先腫而後至腹是由下以及上因脾虛不能運濕濕趨於下尚在本經腫脹及中又屬犯本也腫脹之處按之如石陽氣大傷理之棘手附桂治中湯加肉果當歸防己牛膝另腎氣丸詒按方中防己外無治濕之品據證情論似當兼參滲利鄧評由足跗先腫其受傷並在腎陽故立方亦責重溫助腎氣隱癖僭逆中宮臍雖未突青筋漸露勢欲散而為臌況大便時溏時結脾氣久虛更屬棘手擬以攻補兼施法枳實消痞丸枳連朴朮夏苓參薑麥芽草加雞內金當歸鱉甲白芍牡蠣詒按此已成脹病矣而中宮先虛又難攻克此等證最費經營而又最難得效鄧評癖散成臌必土弱而木乘有虛中夾實之義故治之最為棘手此方有虛實兼顧肝脾並調之妙孫評凡有隱癖須加延胡香附之類以宣通之頭痛門頭痛取少陽陽明主治是為正法即有前後之別不過分手足而已石膏竹葉生地知母甘菊丹皮黑梔橘紅赤苓桑葉蔓荊子天麻詒按此頭痛之偏於風火者故用藥專重清泄一面鄧評此必有一派火盛見端脈弦數大苔厚中黃頭痛及旁陽明濕熱挾膽經風陽上逆也大川芎湯川芎天麻合茶酒調散芷草羌荊芎辛防薄二陳湯加首烏歸身白芍詒按此亦少陽陽明兩經之病但風陽既已上逆似當參用清熄之意乃合芎辛羌芷未免偏於升動矣鄧評方案不甚融洽高巔之上惟風可到到則百會腫疼且熱良以陰虛之體陰中陽氣每易隨之上越耳生地歸身白芍羚羊角石決明煨天麻甘菊黑梔丹皮刺蒺藜詒按此陰虛而風陽上越者故用藥以滋熄為主鄧評證惟風陽上升藥惟滋熄和陽而舌絳脈數亦從可知矣肢體痛門肝居人左左脅不時攻痛甚則厥逆左關沉小帶弦是肝氣鬱而不升也右脈弦滑舌苔薄白喜飲熱湯又有濕痰內阻當兼治之推氣散合二陳湯詒按用推氣散以疏肝鬱合二陳湯以治濕痰竟如兩扇題作法鄧評肝氣久鬱必從火化推氣散內有肉桂若不與清肝疏鬱之品並用恐其氣火化燥即使寒飲滿積亦可暫不可久之劑也蓋痛在左脅大都挾肝經鬱火耳脈沉弦滑腿骱刺痛腰部疫疼背脊作響諸節亦然舌苔白濁風濕痰三者著於肝腎之絡也肝著湯合腎著湯苓朮薑草桂枝湯詒按此證病在於絡當從經絡著意鄧評斷其為風濕痰實邪者全於苔脈得之惟風善上行今所以陷著肝腎之絡者內被濕痰阻遏故也豈得拘一例論之遺精門腎者主蟄封藏之本精之處也精之所以能安其處者全在腎氣充足封藏乃不失其職虛者反是增出脛痠體倦口苦耳鳴便堅等證亦勢所必然然左尺之脈浮而不靜固由腎氣下虛而關部獨弦獨大獨數舌苔黃燥厥陰肝臟又有濕熱助其相火火動乎中必搖其精所謂肝主疏泄也虛則補之未始不美而實則瀉之亦此證最要之義天冬生地黨參黃柏炙草砂仁龍膽草山梔柴胡詒按此三才封髓丹加膽梔柴胡方與案若合符節鄧評濕熱助其相火為此症之要旨於關尺脈與舌苔上見出故腎臟雖虛尤必須參實則瀉之之法矣再診大便暢行口中乾苦亦愈左關之脈大者亦小惟弦數仍然尺亦未靜可以前方增損三才封髓丹加茯神龍膽草柏子仁鄧評炎上作苦火能下降故口苦亦愈惟脈尚弦數未靜是以苦寒瀉火還當著意三診久積之濕熱下從大便而泄然久病之體脾腎元氣內虧又不宜再瀉當以守中法異功散加白芍荷葉蒂秫米鄧評三診似乎濕熱已去當以守中誰知邪勢初衰之際須防餘邪未盡所謂爐煙雖熄灰中有火故至此脈象復見弦數仍不能舍苦寒瀉火之劑也當邪勢初衰速爾進補者每有此弊四診大便已和脈形弦數數為有火弦主乎肝肝經既有伏火不但順乘陽明而且容易搖精精雖四日未動究須小心三才封髓丹加陳皮白芍另豬肚丸苦參白朮牡蠣豬肚原注此證拈定左關獨大獨弦獨數所以重用膽草黑梔直折其肝家鬱火俾濕熱之邪從大便而出孫評此方當加生牡蠣重清肝火金本制木今木火太旺反侮肺金肺金尚受其克則其吸取腎水疏泄腎精更屬易易此夢泄咳嗽之所由來也三才封髓丹加白芍龍膽草鄧評夢泄咳嗽並患者非苦寒直瀉其相火不可再診接來劄知所言夢遺者有夢而遺者也比之無夢者大有分別無夢為虛有夢為實就左脈弦數而論弦主肝數主熱熱伏肝家動而不靜勢必搖精蓋腎之封藏不固由肝之疏泄太過耳三才封髓丹加牡蠣龍膽草青鹽三診迭進封髓秘元而仍不主蟄細診脈息左關獨見沉弦且數肝經之疏泄顯然萆薢分清飲菖薢草烏藥益智青鹽去菖合三才封髓丹加龍膽草鄧評左關獨見弦數由於肝火之亢當無疑義豈得因無效而速爾變法故四診則病已大減矣設非手段老練其孰能之四診病已大減仍守前法前方加白芍原注病得萆薢瞿麥而大減是濕重於火也詒按首案遺泄咳嗽並提方凡四易而未曾有一味顧及咳嗽想以肝火為本治其本而標病可置之耳鄧評原注謂得萆薢瞿麥而大減觀前方並無瞿麥不識何敬想加膽草或即瞿麥之誤否夢中遺泄久而無夢亦遺加以溺後漏精近日無精而小水之淋漓而下者亦如漏精之狀始而氣虛不能攝精繼而精虛不能化氣三才封髓丹加蛤粉芡實金櫻子詒按此腎中精氣兩損之證再合腎氣聚精等法較似精密鄧評腎氣不固亦云極矣理宜加重補腎惟方用黃柏諒必有濕火未清也曾經失血現在遺精精血暗傷當臍之動氣攻築漫無愈期肢體從此脫力語言從此輕微飲食從此減少無怪乎脈息芤而無神也病情如此虛已甚矣而舌苔膩濁中宮又有濕邪治須兼理杞子熟地芡實楂炭石蓮子當歸茯苓金櫻予蓮須另清暑益氣湯去朮瀉草原注此九龍丹也吳鶴皋云主治精濁鄧評證見中虛挾濕與清暑益氣法甚為合拍俾中樞有權飲食增進則自能化生精血默運濕邪又何取乎熟地之補腎蓮須之澀精也再診前方小效小變其制九龍丹加於朮半夏茯苓陳皮五倍子煎送威喜丸詒按陰虛而挾濕邪最難用藥須看其兩面照顧處鄧評濁膩之苔與熟地究不相宜白濁久而不痊以致腎失封藏夢遺更甚少寐少納面痿脈小九龍丹合天王補心丹另豬肚丸原注膏淋有便濁精濁兩種便濁是胃中濕熱滲入膀胱與腎絕無相干精濁牽絲黏膩不溺亦有是腎虛淫火易動精離其位漸漬而出治宜滋腎清心健脾固脫九龍丹方中杞地歸滋陰以制陽櫻蓮芡澀以固脫石蓮子苦寒清心心清則火不熾白茯苓甘平益土以制腎邪尤妙在山楂一味能消陰分之障前一案氣虛抉濕熱故含清暑益氣後一案心火挾濕熱故合補心豬肚鄧評遺而有夢納穀又少清理濕熱一層還當著意分別便濁精濁兩種自能了了至宜滋腎清心健脾固脫即九龍丹方意也惟還須看其偏重那一邊藥即隨之更換可也孫評便濁精濁分清而治豈有不愈之理氣虛不能攝精精虛不能化氣所進飲食徒增痰濕六君子湯加菟絲餅炮薑炭韭菜子原注純從脾臟氣虛立案詒按案語簡潔老當方亦周到鄧評補氣為主固精佐之確與此等題旨相合小便門陰虛之體心火下郁於小腸傳入膀胱之府尿中帶血時作時止左脈沉數小水不利生地木通甘草竹葉火府丹另大補陰丸詒按此用導赤散合火府丹以清心火即用大補陰丸以滋陰虛實兼到鄧評論證有曲折之妙用藥無牽拘之弊經曰胞移熱於膀胱則癃溺血又日水液渾濁皆屬於熱又日小腸有熱者其人必痔具此三病於一身若不以涼血之品急清其熱遷延日久必有性命之憂導赤散合火府丹加燈心又丸方固本丸合大補陰丸豬脊髓丸加萆薢詒按火甚者陰必傷火清之後隨進丸藥以滋其陰鄧評如此探源最屬高見惟證歸一貫無所遁情耳前此清熱隨兼補陰自能層次合度孫評柳氏火甚者陰必傷句是格致之言膏淋血淋同病未有不因乎虛亦未有不因乎熱者熱如化盡則膏淋之物必且下而不痛始可獨責乎虛大補陰丸加瓜蔞瞿麥牛膝血餘詒按議論雋爽方亦切實鄧評膏淋血淋必因乎熱不但同病使然也惟有陰虛挾熱與濕熱並甚者不同還當審察於間孫評不痛貴虛不獨膏淋為然可稱要言不煩再診所下之淋薄且少矣而當便之時尚屬不利既便之後反覺隱痛肢膝不溫脈小弦唇紅嗌乾熱未全消虛已漸著瓜萎瞿麥去附湯加麥冬萆薢黑梔豬脊筋詒按便後隱疼膝冷咽千皆虛象也似當兼用滋養鄧評病既偏於虛矣即有餘熱未清亦須補陰以和陽耳曾患淋證小便本難近來變為癃閉少腹硬滿小便腫脹苔白不渴脈小而沉下焦濕熱被外寒所遏膀胱氣化不行最為急證恐其喘汗肉桂五苓散加木香烏藥枳殼另蔥一把麝香三厘搗餅貼臍詒按此溫通法也惟由淋變癃氣分必虛補中腎氣等法亦可隨宜佐用鄧評苔脈屬寒故宜溫通為佐治癃閉症本有此外治之法曾患淋症更不免抉敗精阻竅惟麝香能竄入竅絡而驅精與是症為一舉兩得焉孫評貼臍無益細考自知泄瀉門飧泄不由乎胃滯即係乎陽弱此乃兼而有之脈遲噯腐脘痛附子理中湯合二陳湯加川朴吳萸防風詒按噯腐脘痛食滯頗重擬去二陳加神麯砂仁菔子鄧評未可以脈遲便謂係乎陽弱或者陽氣窒滯有之且脘痛之證不免木氣內阻中挾相火附子一味極宜慎用下利轉瀉腎病傳脾脾因虛而受邪溫化為宜理中湯合四苓散加陳皮防風伏龍肝詒按由利轉瀉或有因濕邪未淨者方中用四苓伏龍肝即此意否鄧評下痢轉瀉且必邪少虛多熱去寒存此法極相宜發熱之餘腹痛便溏表邪下陷也小柴胡湯加白芍木香茯苓澤瀉詒按此時邪下陷之證鄧評熱餘轉瀉表邪下陷固然陽不勝陰有諸方內宜增溫化孫評不發熱者之妙法若發熱則不宣大便門脾虛不能化濕焉能統血血雜於水濕之中下注不止茅朮地榆皮槐花炭鬱金鄧評此等方案洵非老手不辦想緣營陰未損故無庸雜入滋養之品耳惟白朮伏龍肝薏仁等味例可加入再診無毒治病不必愈半而不取也仍服原方可耳原注此茅朮地榆湯其人便血挾水而下已及半載人不團憊而面黃大約濕熱有餘之體此病兩帖愈半四帖全愈詒按審證的確用藥精當有以匙勘鑰之妙腸游便血時重時輕或痛或否脈形細小飲食少此虛也恐增浮喘歸脾湯加薺菜花荷葉杭米詒按此補脾攝血之正法也稍加和胃之品如廣皮砂仁輩更為周密鄧評痛則必有邪阻宜疏補兼施之劑此方未免太壅滯便血之前先見盜汗盜汗之來由於寒熱寒熱雖已而盜汗便血之證不除脈小而數氣陰兩虛之病也歸脾湯去桂圓加丹皮山梔地榆桑葉詒按此證營分中必有留熱宜於清營一邊著意但顧其虛猶未周到鄧評便血盜汗之來由於寒熱固必有邪熱溜陷於營分也擬將方內參耆易入細生地牡蠣乃妥孫評桑葉與盜汗不宜陰絡傷則血內溢為日已久陰分固傷陽分亦弱而身中素有之濕熱仍未清楚恐增浮喘大熟地伏龍肝阿膠白朮赤小豆附子黃芩炙草當歸地榆炭烏侮肉詒按此金匱黃土湯加味陰陽並治而兼清濕熱立方頗為周到鄧評凡血內溢者病源甚多大都見證面黃兼白浮腫眩悸肢痠力乏惟血色淡紅而非深赤脈象虛濡而不弦實陽分受傷偏重者附子始能合用否則有助火灼陰之弊濕熱傷營腹臌便血久而不愈左脈細澀右芤寸大尺小加以浮腫氣分亦虛不但不能攝血而且不能清化濕熱防喘黃土湯草地朮附膠芩土加大腹皮桑皮五加皮黨參槐花原注原方之妙附子扶脾之母黃芩清肝之熱熟地滋腎之陰白朮培脾之本阿膠涼血之熱各臟照顧非仲景不能作也詒按增入之藥亦能與病機恰當鄧評既至腫脹而用此膠地濁膩之品惟血不維氣者相宜如所云氣不攝血究當責重氣分用藥紅白痢變為便血當時血色尚鮮後又轉為紫黑或帶血水而不了結暑濕深入營中氣虛無力以化降而不升也駐車丸連膠薑歸加廣木香黨參甘草伏龍肝薺菜花詒按此證血分中有留邪尚宜參用和血之品鄧評立方頗佳擬再加地榆烏梅炭以和營血再診血雖漸止氣猶降而不升補中益氣湯去陳皮合駐車丸加赤芍伏龍肝鄧評脾氣久陷豈能遽爾升健痔疾下痢臟毒三者皆屬下焦濕熱為患地榆散合三奇散耆防枳殼加廣木香詒按立方精到擬再增銀花丹皮鄧評單方有桂圓肉包苦參子七粒數服便愈吡種症情最為相宜亦湯劑之一助云大小便易位而出名目交腸驟然氣亂於中多屬暴病此症乃久病良由瘀血內阻新血不生腸胃之氣無所附而失治故所食之水穀悉從前陰而出所謂幽門者不司泌別清濁而闢為坦途比之交腸證有似是而實非者此時論治主以化瘀潤腸必大腸之故道復通乃可撥亂者而返之正旋覆花猩絳蔥管歸須首烏柏子仁薺菜花另舊紗帽一隻炙灰每服一錢五分酒下原注紗帽發漆膠黏而成其亦取通瘀之意耶詒按論證用藥均有巧思特未知效否何如憶喻西昌寓意草中所載薑宜人交腸病與此相似特病原有虛實之異耳學者當參觀之鄧評所謂病有千變用藥亦有千變如此症豈可執古法治交腸而守五苓一方乎此瘀結腸燥氣失附而迫趨前陰故糞亦從前陰而出矣愛廬中僅用明礬一味腐衣五層包鹽湯下日三服三日九服取其導痰澀大腸孫評後愛廬案是暴得者乃真交腸宜與喻氏書三證同參發漆膠黏而成之帽近日未見惟有棕漆黏成者或即是此歟蟲病門陽絡曾傷陰氣素虛更有濕熱鬱於營分日久生蟲擾亂於上中下三焦以致咳嗽喉痹惡聞食臭起臥不安肛部不舒舌質深紅其苔黃濁即仲景所謂狐惑病是也久延不愈即入勞怯之途川連三分犀角蘭分烏梅五分人中白一錢百部一錢丹皮一錢半甘草三分詒按讀金匱狐惑病一節此證之原委乃明鄧評金匱狐惑病有蝕於上部則聲嗄蝕於下部則咽乾與蝕於肛者之不同此證則上中下三焦被擾故見象如是方亦從金匱擴充而來脘腹作疼滿腹苦熱初起得食則痛繼而不食亦痛此肝胃不和濕熱生蟲之狀烏梅丸加青皮白芍金鈴子詒按初起得食即痛得無兼有食積否鄧評得食則痛固是蛔動一症惟有食積者亦能如此肝氣橫郁於中宮者亦能如此再診服前方脘腹之痛而苦熱者時作時止止則右脅下必有一塊攻築是屬蛔未安也旋覆花湯合金鈴子散加杏仁雷丸榧子治按蛔未安者似宜仍用烏梅丸此則固右脅攻築故用金鈴子散以泄肝耳鄧評服前方不效而脅下一塊攻築豈非開氣之不平乎柳師評語道破否則何用旋覆花湯以通肝絡乎孫評旋覆花湯因右脅而用金鈴子散左脅是專長濕熱挾風生蟲作癢有似攻注之形無處不至難治之證也獺肝一錢磨開水沖服鄧評惟其作癢故謂有蟲再診攻注有形而不攻注時無跡濕熱風蟲踞於痰中所致推氣散枳殼桂心薑黃草加白芥子橘紅羌活獺肝竹油另醫通沉香化氣丸大黃黃芩沉香六曲辰砂朮竹油薑汁詒按獺肝治蟲法本千金惟案中所云攻注有形無處不到究竟或在肢體或在腹裏均未敘明無從揣測也鄧評此方重理濕熱風痰或係疑其非蟲乎至云濕熱風蟲踞於痰中亦是影響之談孫評湯丸與蟲均不貼切人之涎下者何氣使然日胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下黃連丸連萸木香訶子龍骨合烏梅丸詒按方案俱高簡穩實鄧評用一段經文作案自是高古既是胃熱蟲動又何取訶子龍骨以攝涎評選環溪草堂醫案三卷環溪草堂醫案三卷梁溪王旭皋先生所著也先生名泰林字旭皋世為無錫人嘉道間有以瘍醫馳名江浙者日高錦亭先生著有外科心得集景岳方歌括等書行世即旭皋先生之舅氏也高先生歿後先生傳其業其始先以瘍醫行逮後求治者日益多寢及內科無不應手奏效於是遂專以內科行門下士習業者每年以十數計先生讀書上自軒岐下迄國朝諸家無不精心貫串於古書則研求故訓於後人書則必分別疑似所著有西溪書屋夜話錄醫方歌括串解及環溪草堂醫案諸書均未梓行其醫案為門弟子隨時鈔錄未經分別去取不免繁複者多余所得見者蓋有五六本詳略互異因屬及門諸子刪其繁亂重為鈔輯最後得王家橋顧君蓮卿本係先生晚年之作又得方君耕霞新刊本案甚繁富頗有方案足取而為他本所未載者一併補錄簡其精粹分為三卷間有未盡之意隨加按語以闡明之閱一年而竣事先生居錫城去余家不百里余弱冠時猶及見之吾鄉有疑難證無不求治於先生者先生必沉思渺慮疏方與之厥後或效或否或有無力再往者先生必訪悉之令其再診以竟厥功故其所存方案無不光堅響切無模糊影響之談蓋較近賢之專以靈變取巧者不啻上下床之別矣先生博極群書所用諸法如治小兒喘嗽之藥棗從葛可久之白鳳丹化出治上熱下寒之八味丸用紫雪為衣從喻西昌外廓之論悟出若此之類不勝枚舉是皆因古法而變化出之彼胸無古書者每讀之而猝難領會余於此等處均為一一指出學者苟能即是而得讀書用古之法焉則庶乎不負先生之苦心也夫光緒二十六年重陽日江陰柳寶詒謹識
