body:
  text: 評選靜香樓醫案兩卷此案為尤在涇先生所著先生名怡字在涇自號飼鶴山人江蘇長洲縣人邃於醫學於仲景書尤能鑽研故訓獨標心得時吳下以醫名者如葉氏桂徐氏大椿王氏子接均煊耀一時先生與之聯鏢接軫輝映後先於醫道中可謂能樹一幟者所著有傷寒論貫珠集金匱心典醫學讀書記均刊行惟此案未經授梓其附刻於讀書記後者僅有三十餘條非全本也此本為吾邑吳氏所鈔藏咸豐兵燹後詒於詹文橋張氏齊頭見之假歸鈔録復就其中選精粹者得十之五評録如左分上下兩卷竊念近時醫學荒廢其簡陋剽襲毫無心得者無論已間有鑽研古籍不知通變者動輒以仲景為家法而咎今人不能用古方目為庸陋其實古方今病往往枘鑿不相入執而用之僨事者多矣及讀先生此案而不覺憬然有悟也先生博極群籍尤服膺仲景之書所著傷寒論金匱兩注上溯仲景心傳獨抒己見讀其書者無不知先生之於仲景不啻升其堂而入其室已乃觀此案論病則切理饜心源流俱沏絶不泛引古書用藥則隨證化裁活潑潑地從不蹈襲成方可見食古期乎能化裁制貴乎因時彼徒執古書者不且與王安石之周官房琯之車戰其弊適相當哉是故讀他人之案有不用古方者或猶疑其服古未深未能得力於仲景也若先生則讀書不可謂不多用功不可謂不切其沉酣於仲景之書尤不可謂其不深乃其論病之平易近情也如是立方之妥帖易施也如是是則此案不第為治病之良規並可為讀古之心法已用書之以諦後之讀此案者光緒二十六年庚子二月下旬江陰後學柳寶詒識
