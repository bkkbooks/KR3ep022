body:
  text: 評選環溪草堂醫案上卷無錫王泰林旭高著內傷雜病門病將一載肝氣橫逆而不平中氣久虛而不振惟肝逆故胸脘阻塞而攻衝惟中虛故營衛不和而寒熱凡大便溏飲食少右脈細左脈弦是其證也四君子合逍遙加左金是其治也黨參冬朮陳皮茯苓歸身神麯白芍柴胡鹽水炒香附鹽水炒川連吳萸炒穀芽玫瑰花詒按案語爽朗方亦的當擬再加沉香鬱金鄧評論證明晰用藥不紊惟寒熱而便溏脈細弦者總宜兼溫理脾胃營衛如桂枝煨薑大棗之類肝逆攻衝金鈴子亦在需用方內川連或可刪去再診陽虛惡寒陰虛發熱脾虛則便溏而乏力木旺則脘痞而氣塞前方補中泄木肝氣已平合以蓋火生土氣皿雙補黨參冬朮蓯蓉鹿角霜杞子木香菟絲子歸身白芍陳皮茯苓杜仲砂仁玫瑰花詒按肝氣平後續用培補是一定層次惟既有寒熱見證似可參用桂技建中之意以和之鄧評觀及此診可謂先得我心者矣三焦相火挾肝陽而上升每日侵晨則氣自臍左而上衝心胸痞塞自覺胸中熱舌尖辣面色紅過午則氣漸下降至夜則安而火降則下或遺泄此皆無形之火為患也推其原始由乎陰虛今則相火妄行蒸煉胃液成痰所以吐痰黏膩灰黑而咽嗌胃管之間常覺不流利也法當清相火導虛陽而下歸窟宅更佐以化痰鉦逆病來已久難期速效黃柏鹽水炒一錢二分桂心三分砂仁炒三分蛤殼一兩甘草三分知母鹽水炒一錢二分川連鹽水炒四分茯苓三錢玄精石三錢長流水煎詒按此方取交濟封髓之法用意極為精到惟病因肝腎不攝虛陽浮逆擬再加牡蠣龜板以攝下旋覆竹茹以清上似於病情更為周匝鄧評推論病源不外乎是制方亦極精切不泛脈雖未見而關尺想必弦大且數孫評牡蠣似須必加白芍亦為要藥黃柏砂仁名封髓川連內桂多交濟人參枳實名補瀉法川連乾薑名瀉心法此皆法之巧者也痰之標在肺胃痰之本在脾腎腎虛則水泛脾虛則濕聚二者均釀痰之本也經日脾惡濕腎惡燥脾腎兩虛法當滋燥兼行而痰戀肺胃又宜標本同治熟地茅朮芝麻炒陳皮川貝茯苓半夏紫菀詒按案語斟酌病機切實不泛用藥亦絲絲入筘用黑地黃法以兩補脾腎合二陳以和胃菀貝以利肺藥品無多而層層都到非有簡煉工夫不能作此鄧評治一病而標本虛實悉到且無浮泛牽拘之弊孫評川貝易杏仁何如凡臟邪惟虛則受之而實則不受惟實者能傳而虛則不傳仲景云肝病實脾治肝邪之盛也內經云肝病緩中治肝體之虛也此證肝氣有餘肝血不足法宜兩顧為得歸身白芍沙苑杞子冬朮茯神青皮陳皮香附金鈴子砂仁詒按議論確鑿非胸中有古書者不能道方亦精到方中歸芍杞苑所以養肝血青陳香鈴所以疏肝氣藥品看似平常用意恰已周到鄧評此段議論引用未能的當方尚平穩惟香燥洩氣之品太多凡肝體既虧肝用自旺廿潤柔肝是所以補肝體即所以平肝用也孫評開口即從至情實理立論腎水不足君火上炎相火下熾心中如燔舌光如柿陽事易舉陰精易泄擬清君火以制相火益腎陰以制肝陽所慮酷熱炎蒸恐藥力無權將亢陽為害而增劇耳川連鹽水炒黃芩黃柏阿膠生地甘草雞子黃另大黃三錢研末將雞子一個破頭納大黃三分蒸熟每日服一個鄧評此方為陽亢而致陰虧者設惟阿膠似宜易龜板較勝此種丹方亦足取法孫評制相火益腎陰須藉成寒前人明訓第宜擇介類以潛之庶為貼切方中加煅牡蠣何如再診投苦鹹寒堅陰降火以制亢陽心中之燔灼與舌色之光紅俱減三分之一然上午之身熱如燎者未退幸納食頗增苦寒可進再望轉機為妙川黃連阿膠生地玄精石黃芩甘草玄參蛤殼雞子黃鄧評上午身熱即偏於陽盛之徵若由乎陰虛者則熱必作於暮夜矣三診舌乾紅知饑善納水虧陽亢土燥於中鹹苦堅陰之劑雖衰其燔亢之勢而未能盡除其焰時當炎暑濕熱與相火蒸騰擬復入清中固下祛濕之法仍不出鹹苦之例洋參石膏知母甘草麥冬川連阿膠生地蛤殼黃柏豬膽汁丸每朝服三錢詒按君相交燔腎陰被灼所謂一水不能勝二火此證是也僅與壯水猶難勝任必得苦以泄之成以制之而火乃退更得苦以堅之成以滋之而陰乃復鄧評此證每多挾濕熱不徒為時令所致孫評苦泄是大黃川連苦堅是黃芩黃柏成制是玄精石玄參鹹滋是阿膠牡蠣營陰虛則氣火易升肝木橫則脾土受侮腹滿頭暈肝脾之病耳鳴喉燥虛火之愆陰虛生內熱腎虛故腰痛擬補陰潛陽扶土抑木法生地砂仁炒四兩茯苓烘三兩山藥炒三兩萸肉酒炒三兩丹皮酒炒二兩澤瀉炒三兩龜板炙三兩沙苑鹽水炒三兩黨參炒三兩杜仲鹽水炒三兩歸身酒炒三兩白芍炒二兩石決明煅四兩上藥為末煉蜜打和為丸曬乾泛上後藥香附三兩分三分一分鹽水炒一分醋炒一分蜜水炒陳皮鹽水炒七錢沉香三錢神麯一兩上藥為末用橘葉湯泛上前丸為衣詒按以補藥為丸而以和氣之藥末泛上為衣與喻嘉言藥用外廓之意相合雖無精義可取而心思靈巧可備一格鄧評藥用外廓固一巧法然證見腹滿陰柔之品終慮礙脾愚擬一方於下以備同學采擇川連益智廣皮茯苓製香附白蒺藜歸身白芍首烏木瓜孫評喻西昌外廓之法用薑附猛烈用參苓為衣過胃入下始露威靈其法本巧今則以呆滯為心而以流動為衣仿其意而變通之真善讀書者也夜涼晝熱熱在上午此東垣所謂勞倦傷脾之證也上午熱屬氣虛用補中益氣湯補氣升補中益氣湯加神麯茯苓詒按論證立方如開門見山心目俱朗鄧評熱在上午責之陽氣斯為不易之理惟虛而發熱當或有形寒見證此病本尚未咳咳則升柴不宜用也寒邪傷陽亦每多上午寒熱泄為脾病嘔為胃病脾胃屬土居中而司升降脾宜升不升則泄胃宜降不降則嘔土衰則木橫木橫而土益衰高年當此頗慮土敗木賊古人治肝當先實脾況茲土弱尤當先補其中稍佐平肝可也理中湯加茯苓橘餅詒按案語理明詞達方法切實不浮但既有嘔惡見證則半夏似不可少擬再加木瓜白芍砂仁鄧評治肝實脾原為脾土弱者而設方於平肝一面自嫌疏漏柳師增味頗合如烏梅防風白蒺藜金鈴子吳萸川連等味均可臨時選用孫評木橫則土益衰所以柳氏加瓜芍平肝於土亦有益大有見解有時驚悸有時肌肉頑木或一日溏泄數次或數日一大便而堅乾惟小便常紅此心氣鬱結脾氣失運失運則生濕鬱結則聚火火則傷津濕則阻氣而氣機不利矣擬荊公妙香散加味以補益心脾山藥洋參黃耆茯神赤苓桔梗炙草遠志麝香朱砂木香川連麥冬上藥為末用藿香陳皮湯泛丸每服三錢開水送下詒按專主心脾立論思路精確鄧評此症心肝有亢火脾家聚濕飲大便之或泄或結即濕與火之造偏也引用是方不免泥古惟心脾虛而鬱結者為宜於此病則未必中窾擬苓桂朮甘湯加川連蒺藜陳皮白芍遠志首烏血不養心則心悸少寐胃有寒飲則嘔吐清水虛火爍金則咽痛肝木乘中則腹脹此時調劑最難熨貼蓋補養心血之藥多嫌其滯清降虛火之藥又恐其滋欲除胃寒慮其溫燥劫液欲平肝木恐其克伐耗氣今仿胡洽居士法專治其胃以胃為氣血之鄉土為萬物之母一舉而三善備焉請試服之黨參冬朮茯苓半夏棗仁扁豆陳皮山藥秫米詒按於無可措手中尋出養胃一法自屬扼要之圖擬再加木瓜白芍以和肝竹茹麥冬以清肺似更周匝鄧評此種醫案便覺強做無歸束參合症情總由木火鬱沖宜增疏泄之品治之方內山藥黨參尚嫌其滯孫評牡蠣一味似屬妙品骨格瘦小先天元氣不足夏秋寒熱至今不已脈細數弱氣血兩虧頭不痛而但身痛或口沃清水此胃陽虛憊也當商溫補仿東垣法黨參茯苓陳皮桂枝柴胡黃耆半夏神麯當歸乾薑砂仁詒按少陽生氣被鬱故寒熱不已東垣升陽益胃法用之恰合加於薑者助胃陽也鄧評脈既細數似宜兼養營陰不及轉方為妥善孫評認定身痛想法此係久病若暴感宜疏邪而不宜補似可從原方增白朮再診前方補中益胃溫衛氣開腠理諸恙皆減仍依前法前方去神麯乾薑加白朮白芍衛氣虛則灑灑惡寒營氣虛則蒸蒸發熱營衛並出中焦總以脾胃為主補脾胃則金有所恃不必治肝而肝自馴矣黨參冬朮當歸川貝黃耆茯苓白芍陳皮玫瑰花詒按為虛損證探原立論方亦精到鄧評觀方論似挾肝經之氣火荊金致咳乘中作脹之義營陰內虧頭眩心嘈下午微寒內熱能食無力胃中有熱則消穀脾虛氣弱則無力也黨參沙苑茯苓川連棗仁知母女貞子白芍冬朮麥冬竹茹詒按此虛損初萌之侯因脾虛氣弱未便滋補耳鄧評此症究屬陰虛為重既以善消能食冬朮宜易生地左脈空大腎水虧也倦怠無力脾氣弱也食少則陰虛陰虛生內熱證屬內傷補中益氣湯加黑山梔白芍另六味丸每朝服四錢詒按補中益氣補脾氣六味補腎陰立法頗切實惟左脈空大方中升柴兩味尚宜斟酌耳鄧評左脈空大不但腎水虧更知肝陽旺若再投以升柴深恐陽升至極而卒致暈厥矣孫評陰虛內熱黑梔當商易骨皮何如思慮傷脾之營勞碌傷脾之氣歸脾湯補脾之營也補中益氣湯補脾之氣也今將二方併合服之黨參黃耆冬朮茯神歸身炙甘草砂仁棗仁升麻柴胡木香半夏陳皮詒按同是脾病而病原用藥確有氣營之別一經指點便覺頭頭是道鄧評方用棗仁之酸斂想由神魂不寧然勢必難任升柴還望商諸博雅孫評傷營則午後內熱傷氣則倦怠乏力腎氣虛逆非滋不納脾弱運遲滋則呆滯然則如何而可日補腎之陽即可以轉運脾氣從仲景腎氣丸化裁熟地附子三分炒五味子茯苓山藥肉桂心麥冬元米炒牛膝鹽承炒山萸肉陳皮紫石英補骨脂鹽水炒胡桃肉詒按補腎即可補脾益火以生土也用腎氣丸恰合鄧評若肝腎無亢火者惟以此法為上策經是加減較原方更覺切實孫評須看其將兩面合成一氣之法久病之軀去冬常患火升交春木旺肝膽陽升無制倏忽寒熱頭面紅腫延及四肢掀熱癢痛殆即所謂游火遊風之類歟匝月以來腫勢已減四五日前偶然裸體傷風遂增咳嗽音啞痰多口乾舌白續發寒熱胃氣從此不醒元氣愈覺難支風火交煽痰濁復甚陰滓消涸陽不潛藏此時清火養陰計非不善抑恐滋則礙脾化痰扶正勢所必需又恐燥則傷液立法但取其輕靈用藥先求其無過北沙參知母鮮生地蛤殼海浮石蟬衣豆卷青果海蜇地栗百合另珠粉朝晨用燕窩湯送下三分原注上方金匱百合知母地黃湯合本事神效雪羹取其清火化痰不傷脾胃生津養液不礙痰濕酌古參今歸於平正詒按議病用藥均歸精細躁心人不能領取也鄧評風火交煽恰合此病題旨然不祛風而但清火其病根必不除否則亦冀其敷衍而已紫菀款冬應可加入就舌白論即蜜炙薑橘亦為需用孫評豆卷似不若桑葉之妙中風門兩手關脈皆見一粒厥厥動搖之象此土虛木勝內風動躍之候也左半肢體麻木不仁頭眩面麻病屬偏枯慮延僕中首烏當歸白芍茯苓陳皮秦艽菊花天麻石決明鉤鉤刺蒺藜桑枝鄧評論病有卓識立方亦精到再診動搖之脈大減內風有暗熄之機左手屈伸稍安左足麻木未和擬補腎生肝為治本之計地黃飲子地山萸斛蓯桂附麥冬薑五味菖蒲遠志茯巴戟大棗去桂附詒按未雨綢繆故易於奏效兩方用藥亦能與病機宛轉相赴鄧評前方既已中窾再診何必更張孫評原方有薄荷體肥多濕性躁多火十年前小產血崩血去則陰虧而火亢肝風暗動筋絡失養已非一日去秋伏暑後變三瘧瘧久營衛偏虛遂致風痰擾絡右半肢體麻痹而為偏廢之象調理漸愈今但右足麻辣熱痛痛自足大指而起顯係肝經血虛失養據云腿膝常冷足骱常熱此非足骱有火而腿膝有寒也想由濕火乘虛下注故痛處覺熱而腿膝氣血不足則覺寒耳至於左脛外廉皮肉之內結核如棉子發作則痛甚此屬筋箭是風痰瘀血交凝入絡而成與右足之熱痛麻辣不同今且先治其右足生地阿膠五加皮歸身木瓜天麻冬朮獨活絲瓜絡牛膝茯苓萆薢詒按論頗明透方亦平穩鄧評冷熱異處論歸一貫左右雖各異狀方藥實堪並治年已六旬腎肝精血衰微內風痰涎走絡右偏手足無力舌強言澀類中之根萌也溫補精血兼化痰涎冀免偏枯之累然非易事也耐心調理為宜蓯蓉巴戟茯神木瓜半夏枸杞鹽水炒遠志甘草湯制海風藤茱萸酒炒牛膝杜仲鹽水炒詒按此與下條均因有類中之萌作未雨綢繆之計故用藥力求平穩不敢喜事以邀功也鄧評老年得此務須溫補兼化為治方從地黃飲子加減殊有斟酌腎藏精而主骨肝藏血而主筋腎肝精血衰微筋骨自多空隙濕熱痰涎乘虛入絡右偏手足無力舌根牽強類中之根溫補精血宣通經絡兼化痰涎守服不懈加以靜養庶幾卻病延年蓯蓉黨參元米拌炒牛膝半夏杞子鹽水炒陳皮續斷茯苓巴戟桑枝又丸方蓯蓉二兩酒煮爛搗入黨參三兩元米炒熟地四兩砂仁末陳酒拌麥冬二兩去心元米炒棗仁三兩炒研巴戟三兩鹽水炒歸身二兩酒炒萆薢三兩炒首烏四兩制炒茯神三兩牛膝三兩鹽水炒半夏二兩天冬二兩去心元米炒陳皮二兩五錢杜仲三兩鹽水炒虎骨三兩炙菖蒲一兩杞子四兩鹽水炒上藥各選道地如法制炒共研細末用竹瀝四兩薑汁三兩搗入再將白蜜為丸如黍米大用磁器裝好每朝服五錢開水送下鄧評方論均平正通達與上一案大略相同蓋用古期乎能化者丸方更為周匝孫評右偏手足無力有由脾胃氣衰夾痰入絡者用玉屏風散溫膽湯而愈者又是一格痿痹門先天不足骨髓空虛常以後天滋補栽培脾胃脾胃得補濕熱壅滯形體驟然充壯而舌本牽強兩足痿軟不能行走上盛下虛病屬痿壁經云濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿是也今擬法補先天之精氣強筋壯骨以治其下扶後天之脾胃運化濕熱以治其中然必耐心久服確守弗懈庶克獲效倘朝秦而暮楚恐難許收攻也熟地四錢附子三分煎汁炒茯苓三錢牛膝一錢五分鹽水炒桑枝一兩虎脛骨炙三錢川斷二錢酒炒巴戟三錢鹽水炒黃柏一錢薑汁炒蒼朮一錢五分萆薢二錢鹽水炒竹瀝二十匙薑汁一匙另洗方獨活三錢當歸五錢紅花一錢陳酒糟兩豬後腳骨二隻蔥白頭三個煎湯日洗一次詒按此等證本難奏效其立方仍從丹溪虎潛法加味用藥固未嘗不切當也鄧評先天未足濕熱已壅此種弊端醫家最易犯及直可以東垣清燥湯治之伏熱留於肺胃胃熱則消穀易饑肺熱則躄痿難行熱氣熏於胸中故內熱不已延今半載節屆春分天氣暴熱病加不寐據述先前舌苔黃黑今則舌心乾紅其陰更傷仿仲景意用甘寒法生地三錢知母一錢五分茯神三錢棗仁一錢五分麥冬二錢滑石三錢夜合花五分沙參三錢百合一兩泉水煎服詒按金匱百合病篇有以百合配知母地黃滑石等法此方即用其意鄧評痿躄一症本屬陰虛挾濕熱居多甚且有夾內風者今見舌乾易饑是風火內擾有灼陰化燥之象無濕壅之咎故立方專主甘寒以養陰清燥為主務再診經云肺熱葉焦則生痿跫前方清心肺而退熱已能起床步履但夜不安寐是腎氣不交於心陰虛陽亢故也清金麗水取坎填離為治生地天冬麥冬棗仁山藥玄參沙參洋參百合另虎潛丸三錢詒按經云肺熱葉焦則生痿躄又云治痿必取陽明經訓照然守此二語治法不外是矣鄧評不寐症每多挾痰或可參入二陳一或用半夏秫米法而於大劑甘涼內增此區區之辛燥當無劫液之弊此丸為治痿之專方三診陰虛未復夜寐未安熱退不清仍宜養陰自云腹中微微撐痛此屬中虛治當補益脾陰兼清心肺之熱生地沙參洋參山藥麥冬棗仁薏米茯神甘草白芍赤苓百合另歸脾丸鄧評腹之撐痛固屬中虛木乘抑或前方純用甘寒之咎乎擬去洋參山藥增陳皮木瓜金鈴子冷雨淋背於先竭力鼓棹於後勞碌入房挾雜於中病起身熱咳嗽至今四十餘日痰氣腥臭飲食能進臥床不起形肉消脫是肺先受邪而復傷其陰也經云陰虛者陽必湊之肺熱葉焦則生痿蹙又云一損損於肺皮聚毛落至骨痿不能起床者死合經旨而互參之分明棘手重證矣沙參紫菀茯苓地骨皮川貝玉竹薏仁另八仙長壽丸四錢鄧評腎虛精虧邪乃深入症情至此固亦難矣計惟四十餘日飲食能進養陰散邪並投猶可冀幸萬一當時立方非不善也竊思如葛氏保和湯或者較能著力耳果係入房受寒而正氣未至竭盡者則麻辛用於地麥五味內尤屬切實再診肺為水源百脈朝宗於肺猶眾水朝宗於誨也肺熱葉焦則津液不能灌輸於經脈而為痿蹙臥床不能行動形肉消削咳嗽痰臭舌紅無苔脈細而數是皆津液消耗燥火內灼之象考經論治痿獨取陽明者以陽明主潤宗筋胃為氣血之源耳今擬生胃津以供於肺仿西昌喻氏意沙參阿膠杏仁甘草玄參火麻仁天冬麥冬玉竹茯苓桑葉枇杷葉詒按議病立方深合內經痿論之旨鄧評據此苔脈火灼陰損已極然風寒究竟閉鬱倘痰黏厚而腥臭重者如萎蕤湯法亦可出入仿用乎愚不揣鄙陋粗備法則以侯有識者采擇三診投清燥救肺法病情稍安仍宗前制桑葉杏仁麥冬川貝百合玄精石阿膠沙參玄參枇杷葉野茭白根鄧評迭次三診方法平穩有餘但可以扶持時日未必能拔除根蒂噫殆亦限於時勢迫促耶孫評用茭白根諒因腥氣未清仍參紫菀薏仁何如長齋廿載精血久枯大雨淋身濕侵入骨腿股疫重不能舉動法以宣通關節佐以養血生津
